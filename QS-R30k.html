<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Quantum Sands - Revised</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1e3a5f;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Segoe UI', Arial, sans-serif;
}
canvas {
  display:block;
  width:100vw; height:100vh;
  object-fit:contain;
  image-rendering:pixelated;
}
#hud {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:13px; background:rgba(0,0,0,0.55);
  padding:6px 18px; border-radius:20px; white-space:nowrap;
  user-select:none; pointer-events:none;
}
#legend {
  position:absolute; bottom:20px; left:20px;
  background:rgba(10,25,50,0.82);
  border-radius:10px; padding:10px 14px;
  border:1px solid rgba(255,255,255,0.10);
  user-select:none; pointer-events:none;
}
#legend .leg-item {
  display:flex; align-items:center; gap:8px;
  margin:3px 0; font-size:12px; color:#e8eef5;
}
#legend .leg-swatch {
  width:14px; height:14px; border-radius:2px; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.25);
}
/* 背包欄位 HUD（右上角，格子橫排，每5格一排，超過往左延伸） */
#inventory-hud {
  position:absolute; top:14px; right:62px;
  display:none;
  flex-direction:row-reverse;
  flex-wrap:wrap;
  align-items:flex-start;
  justify-content:flex-start;
  gap:4px;
  max-width: calc(5 * 32px + 4 * 4px);
  user-select:none; pointer-events:auto;
}
.inv-slot {
  display:block; width:32px; height:32px;
  border-radius:6px; overflow:hidden;
  cursor:default;
  transition: outline 0.05s;
}
.inv-slot.empty {
  background:rgba(255,255,255,0.18); border:1.5px solid rgba(255,255,255,0.35);
}
.inv-slot.filled {
  background:rgba(255,200,80,0.18); border:1.5px solid rgba(255,200,80,0.7);
  cursor:pointer;
}
.inv-slot.filled:hover {
  outline: 2.5px solid rgba(255,200,80,0.95);
}
.inv-slot.filled.blocked {
  cursor:not-allowed;
  outline: 2.5px solid rgba(255,60,60,0.95) !important;
}
/* 淡黑過場覆蓋層（由 JS 控制 opacity） */
#fade-overlay {
  position:absolute; inset:0;
  background:#000; opacity:0; pointer-events:none;
  transition:none;
}
/* 量子錨點傳送按鈕 */
#anchor-btn {
  position:absolute;
  top:14px; right:14px;
  width:44px; height:44px;
  display:none;
  cursor:pointer;
  user-select:none;
  filter: drop-shadow(0 0 6px rgba(180,220,255,0.7));
  transition: filter 0.2s;
  z-index: 10;
}
#anchor-btn:hover {
  filter: drop-shadow(0 0 14px rgba(180,220,255,1));
}
/* 白色閃光覆蓋層 */
#flash-overlay {
  position:absolute; inset:0;
  background:#fff; opacity:0; pointer-events:none;
  transition:none;
}
</style>
</head>
<body>
<div id="inventory-hud"></div>
<canvas id="gameCanvas"></canvas>

<div id="fade-overlay"></div>
<div id="flash-overlay"></div>

<!-- 量子錨點傳送按鈕（等角鑽石外框，右上角） -->
<svg id="anchor-btn" viewBox="-2 -2 54 54" xmlns="http://www.w3.org/2000/svg" title="傳送回錨定地圖">
  <polygon points="25,1 49,25 25,49 1,25"
    fill="rgba(255,255,255,0.07)"
    stroke="rgba(255,255,255,0.85)"
    stroke-width="2.5"
    stroke-linejoin="round"/>
  <polygon points="25,8 42,25 25,42 8,25"
    fill="none"
    stroke="rgba(180,220,255,0.5)"
    stroke-width="1"
    stroke-dasharray="3,4"/>
  <circle cx="25" cy="25" r="4"
    fill="rgba(180,220,255,0.7)"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="1"/>
</svg>

<script>

// ████████████████████████████████████████████████████████████
// § 00  全域設定（Canvas、精靈圖、地圖常數、顏色表）
// ████████████████████████████████████████████████████████████
// 全域狀態速查（所有系統共用的可變變數，集中於下方各 § 區塊宣告）：
//   地圖：MAP, cachedMapSeedNum
//   玩家：player{gx,gy,tx,ty,frame,dir}, held
//   生存：playerThirst, playerHunger, playerOxygen, isDead
//   背包：playerHasBackpack, playerCarryCapacity, playerCarryCount, playerInventoryItems
//         playerEquippedKnife, playerHoldingPebble
//   物件：pebbleObjects/pebbleSet, shellObjects, shellShards/shellShardSet
//         coconutTrees/coconutTreeSet, coconuts, fallingCoconuts
//         cutVines/cutVineSet, cottonYarnObjects/cottonYarnSet
//         basketObjects, meatObjects/meatSet
//   特效：footprints, ripples, splashDrops, bodyDroplets, surfaceBubbles
//         pebbleSplashes, secondaryThrows, coconutSmokes, shellFragments
//   生物：fishes, seagull
//   錨點：quantumAnchor, anchorSnapshot, isAnchorMap, anchorReturnPos
//   過場：fadeState/fadeAlpha, flashState/flashAlpha
//   動畫：throwAnim, exclamationState, wavePhase
// ████████████████████████████████████████████████████████████
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = 1280;
canvas.height = 720;

// 背景漸層固定不變，只建立一次（效能優化）
const bgGradient = ctx.createLinearGradient(0, 0, 0, canvas.height * 0.6);
bgGradient.addColorStop(0, 'rgb(15,39,68)');
bgGradient.addColorStop(1, 'rgb(46,96,128)');

const playerSprite = new Image();
playerSprite.src = 'savage.png';
const SPRITE_COLUMNS = 4, SPRITE_ROWS = 4;
let SPRITE_FRAME_W = 0, SPRITE_FRAME_H = 0;
playerSprite.onload = () => {
  SPRITE_FRAME_W = playerSprite.naturalWidth  / SPRITE_COLUMNS;
  SPRITE_FRAME_H = playerSprite.naturalHeight / SPRITE_ROWS;
};

const ROWS = 18, COLS = 20;
const TW = 56, TH = 28, HW = TW/2, HH = TH/2;
const ELEV = { '-1':10, '0':10, '1':10, '2':20, '3':30 };
const BASE_BOTTOM = 1;

function getThick(type) { return BASE_BOTTOM + (ELEV[String(type)] ?? 0); }

const COLOR = {
  '-1': { top:'#0b2f52', left:'#061c33', right:'#092540' },
   '0': { top:'#38bdf8', left:'#0369a1', right:'#0284c7' },
   '1': { top:'#f5dfa0', left:'#b5935a', right:'#d4aa6a' },
   '2': { top:'#5cd67a', left:'#1a7a35', right:'#22a048' },
   '3': { top:'#c8cdd4', left:'#5a6070', right:'#8a909a' },
};

let MAP = [];
let cachedMapSeedNum = 0;

// ── 淡黑過場 ─────────────────────────────────────────────

// ████████████████████████████████████████████████████████████
// § 01  量子錨點系統
//        狀態：quantumAnchor, anchorSnapshot, isAnchorMap, anchorReturnPos
//        過場：flashOverlay, flashAlpha, flashState
//        驚嘆號：exclamationState
// ████████████████████████████████████████████████████████████
const fadeOverlay = document.getElementById('fade-overlay');

// ═══════════════════════════════════════════════════════
// ⚓ 量子錨點系統
// ═══════════════════════════════════════════════════════
const flashOverlay  = document.getElementById('flash-overlay');
const anchorBtn     = document.getElementById('anchor-btn');

// 地圖上的錨點物件（同時只有一個）
let quantumAnchor   = null; // { gx, gy, born }
let anchorPending   = false; // 錨點煙霧期間（投石落地→煙霧結束前），禁止馬鞍藤切割

// 錨定地圖快照
let anchorSnapshot  = null; // { MAP, seed, pebbleObjects, pebbleSet, shellObjects, shellShards, shellShardSet, coconutTrees, coconutTreeSet, coconuts, grassClusterSet }
let isAnchorMap     = false; // 目前所在地圖是否為錨定地圖
let anchorReturnPos = null;  // { gx, gy } 傳送回去時玩家位置（拾取錨點的格子）

// 白色閃光狀態
let flashAlpha      = 0;
let flashState      = 'idle'; // 'idle' | 'in' | 'out'
const FLASH_IN      = 0.09;
const FLASH_OUT     = 0.035;

function tickFlash() {
  if (flashState === 'idle') return;
  if (flashState === 'in') {
    flashAlpha = Math.min(1, flashAlpha + FLASH_IN);
    flashOverlay.style.opacity = flashAlpha;
    if (flashAlpha >= 1) flashState = 'out';
  } else {
    flashAlpha = Math.max(0, flashAlpha - FLASH_OUT);
    flashOverlay.style.opacity = flashAlpha;
    if (flashAlpha <= 0) { flashState = 'idle'; flashOverlay.style.opacity = 0; }
  }
}

function startFlash() {
  flashAlpha = 0;
  flashState = 'in';
}

// 頭頂驚嘆號閃爍（3下後消失）
let exclamationState = null; // { born, count, visible }
const EXCL_BLINK_MS  = 280;  // 每次閃爍間隔
const EXCL_TOTAL     = 3;    // 閃爍次數

function startExclamation() {
  exclamationState = { born: performance.now(), count: 0, visible: true };
}

function updateExclamation(now) {
  if (!exclamationState) return;
  const elapsed = now - exclamationState.born;
  const cycle   = Math.floor(elapsed / EXCL_BLINK_MS);
  exclamationState.visible = (cycle % 2 === 0);
  if (cycle >= EXCL_TOTAL * 2) exclamationState = null;
}

function drawExclamation() {
  if (!exclamationState || !exclamationState.visible) return;
  const rGx  = Math.round(player.gx), rGy = Math.round(player.gy);
  const type  = tileAt(rGx, rGy);
  const p     = toScreen(player.gx, player.gy, type);

  // 若飢渴圖示正在顯示，驚嘆號往更高處
  const showingSurvival = (playerThirst < 8 || playerHunger < 8);
  const ix = p.x;
  const iy = showingSurvival ? p.y - 102 : p.y - 78;

  ctx.save();
  // 紅色背景圓
  ctx.beginPath();
  ctx.arc(ix, iy, 9, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 30, 30, 0.90)';
  ctx.shadowColor = 'rgba(255,60,60,0.8)';
  ctx.shadowBlur  = 10;
  ctx.fill();
  ctx.shadowBlur  = 0;
  // 驚嘆號（!）
  ctx.fillStyle   = '#fff';
  ctx.font        = 'bold 13px Arial';
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';
  ctx.fillText('!', ix, iy + 0.5);
  ctx.restore();
}

// 量子錨點繪製（等角鑽石形，帶脈衝光圈）
function drawQuantumAnchor() {
  if (!quantumAnchor) return;
  const { gx, gy, born } = quantumAnchor;
  const type = tileAt(gx, gy);
  const p    = toScreen(gx, gy, type);
  const now  = performance.now();
  const t    = ((now - born) % 2000) / 2000; // 0→1 循環
  const pulse= 0.5 + 0.5 * Math.sin(t * Math.PI * 2);

  const cx = p.x;
  const cy = p.y - 10;

  ctx.save();

  // 外圍脈衝光圈
  const ringR  = 14 + pulse * 10;
  const ringAlpha = 0.55 * (1 - pulse * 0.6);
  ctx.globalAlpha = ringAlpha;
  ctx.strokeStyle = `rgba(120,200,255,1)`;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4, ringR * 1.0, ringR * 0.5, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 鑽石主體（等角鑽石：上下左右4頂點）
  const dw = 10, dh = 7; // 等角比例
  ctx.globalAlpha = 0.85 + pulse * 0.15;

  // 外層發光
  ctx.shadowColor = `rgba(120,200,255,${0.6 + pulse * 0.4})`;
  ctx.shadowBlur  = 10 + pulse * 8;

  // 填充（藍白漸層）
  const grad = ctx.createLinearGradient(cx - dw, cy - dh * 2, cx + dw, cy + dh * 2);
  grad.addColorStop(0,   `rgba(220,240,255,${0.85 + pulse * 0.15})`);
  grad.addColorStop(0.5, `rgba(100,180,255,${0.70 + pulse * 0.20})`);
  grad.addColorStop(1,   `rgba(60,130,230,${0.85 + pulse * 0.15})`);

  ctx.beginPath();
  ctx.moveTo(cx,      cy - dh * 2.5); // 頂
  ctx.lineTo(cx + dw, cy);            // 右
  ctx.lineTo(cx,      cy + dh * 2.5); // 底
  ctx.lineTo(cx - dw, cy);            // 左
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // 邊框
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = `rgba(200,235,255,0.9)`;
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  // 高光線（上半部白線，增加寶石感）
  ctx.globalAlpha = 0.5 + pulse * 0.3;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth   = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - dw * 0.5, cy - dh * 1.0);
  ctx.lineTo(cx,             cy - dh * 2.5);
  ctx.lineTo(cx + dw * 0.5, cy - dh * 1.0);
  ctx.stroke();

  ctx.restore();
}

// 判斷目標格是否有任何地面物件（貝殼/石頭/馬鞍藤/碎片刀/椰子）
function isTileClearForAnchor(gx, gy) {
  if (pebbleSet.has(`${gx},${gy}`)) return false;          // 石頭
  if (shellShardSet.has(`${gx},${gy}`)) return false;      // 碎片刀
  if (shellObjects.some(s => s.gx === gx && s.gy === gy)) return false; // 貝殼
  if (coconuts.some(c => c.gx === gx && c.gy === gy)) return false;    // 椰子
  return true;
}

// 判斷錨點觸發條件：footprintBudget > 0（剛從水走上陸），落點是沙地(1)，距離2~5格，且格子淨空
function checkAnchorThrow(tgx, tgy) {
  if (quantumAnchor) return false;            // 已有錨點
  if (isAnchorMap)   return false;            // 本圖已是錨定地圖
  if (anchorSnapshot) return false;           // 已有錨定地圖
  if (footprintBudget <= 0) return false;     // 不在「剛上岸」狀態
  if (tileAt(tgx, tgy) !== 1) return false;  // 落點必須是沙地
  const dist = Math.round(Math.hypot(tgx - player.tx, tgy - player.ty));
  if (dist < 2 || dist > 5) return false;    // 距離2~5格
  if (!isTileClearForAnchor(tgx, tgy)) return false; // 格子必須淨空
  return true;
}

// 量子錨點專用煙霧（比椰子煙霧更誇張：粒子更多、範圍更大、帶彩色）
function addAnchorSmoke(gx, gy) {
  const particles = [];
  for (let i = 0; i < 38; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.8 + Math.random() * 2.8;
    // 顏色：混合藍白、青藍、淡紫三種，製造神秘感
    const colorRoll = Math.random();
    const color = colorRoll < 0.45
      ? `rgba(140,210,255,1)`   // 藍白
      : colorRoll < 0.75
        ? `rgba(80,200,230,1)`  // 青藍
        : `rgba(200,170,255,1)`;// 淡紫
    particles.push({
      ox: (Math.random() - 0.5) * 18,
      oy: (Math.random() - 0.5) * 12 - 6,
      vx: Math.cos(angle) * speed * 0.9,
      vy: Math.sin(angle) * speed * 0.5 - 1.2,
      r: 5 + Math.random() * 11,
      alpha: 0.7 + Math.random() * 0.3,
      color,
    });
  }
  coconutSmokes.push({ gx, gy, born: performance.now(), duration: 1400, particles, isAnchor: true });
}

// 生成量子錨點（石頭落地後呼叫）
function spawnQuantumAnchor(gx, gy) {
  // 移除原本會放上去的石頭（在呼叫處不放）
  quantumAnchor = { gx, gy, born: performance.now() };
  anchorPending = false; // 錨點已落地，清除 pending 狀態
  startExclamation();
}

// 嘗試拾取量子錨點
function tryPickupQuantumAnchor() {
  if (!quantumAnchor) return false;
  const dx = Math.abs(quantumAnchor.gx - player.tx);
  const dy = Math.abs(quantumAnchor.gy - player.ty);
  if (dx > 1 || dy > 1) return false;

  // 拾取成功：建立快照、發光、顯示按鈕
  anchorReturnPos = { gx: player.tx, gy: player.ty };
  saveAnchorSnapshot();
  isAnchorMap    = true;
  quantumAnchor  = null;
  startFlash();
  anchorBtn.style.display = 'block';
  return true;
}

// 儲存當前地圖快照
function saveAnchorSnapshot() {
  anchorSnapshot = {
    MAP:              MAP.map(row => [...row]),
    seed:             cachedMapSeedNum,
    pebbleObjects:    JSON.parse(JSON.stringify(pebbleObjects)),
    pebbleSetArr:     [...pebbleSet],
    shellObjects:     JSON.parse(JSON.stringify(shellObjects)),
    shellShards:      JSON.parse(JSON.stringify(shellShards)),
    coconutTrees:     JSON.parse(JSON.stringify(coconutTrees)),
    coconutTreeArr:   [...coconutTreeSet],
    coconuts:         JSON.parse(JSON.stringify(coconuts)),
    grassClusterArr:  [...grassClusterSet],
    cottonYarnObjects:JSON.parse(JSON.stringify(cottonYarnObjects)),
    cottonYarnSetArr: [...cottonYarnSet],
  };
}

// 恢復錨定地圖快照（進入錨定地圖時呼叫，取代 resetMapObjects）
function restoreAnchorSnapshot() {
  const s = anchorSnapshot;
  MAP              = s.MAP.map(row => [...row]);
  cachedMapSeedNum = s.seed;

  pebbleObjects    = JSON.parse(JSON.stringify(s.pebbleObjects));
  pebbleSet        = new Set(s.pebbleSetArr);

  shellObjects     = JSON.parse(JSON.stringify(s.shellObjects));
  shellShards      = JSON.parse(JSON.stringify(s.shellShards));
  shellShardSet    = new Map(shellShards.map(sh => [`${sh.gx},${sh.gy}`, sh]));

  coconutTrees     = JSON.parse(JSON.stringify(s.coconutTrees));
  coconutTreeSet   = new Set(s.coconutTreeArr);
  coconuts         = JSON.parse(JSON.stringify(s.coconuts));

  grassClusterSet  = new Set(s.grassClusterArr);

  cottonYarnObjects = JSON.parse(JSON.stringify(s.cottonYarnObjects ?? []));
  cottonYarnSet     = new Set(s.cottonYarnSetArr ?? []);

  // 清除純視覺特效（腳印、漣漪等），但保留物件狀態
  footprints.length = 0; footprintMap.clear();
  ripples.length = 0;
  surfaceBubbles.length = 0; surfaceBubbleMap.clear();
  splashDrops.length = 0; splashDropMap.clear();
  bodyDroplets.length = 0; bodyDripActive = false;
  secondaryThrows.length = 0; pebbleSplashes.length = 0;
  floatingWoods.length = 0; floatingWoodSet.clear();
  fallingCoconuts.length = 0; shellFragments.length = 0;
  throwAnim = null;
  if (coconutCuttingTimer) { clearTimeout(coconutCuttingTimer.timer); coconutCuttingTimer = null; }
  if (vineCuttingTimer) { clearTimeout(vineCuttingTimer.timer); vineCuttingTimer = null; }
  cutVines = []; cutVineSet = new Set(); consumedVineSet = new Set(); ipomoaBlockSet = new Set();
  anchorPending = false;
  isAnchorMap = true;
  // 若玩家仍持刀，傳送回錨點地圖後立即重建馬鞍藤阻擋集合
  if (playerEquippedKnife) rebuildIpomoaBlockSet();
}

// 傳送回錨定地圖
function teleportToAnchor() {
  if (!anchorSnapshot) return;
  startFadeTransition(() => {
    restoreAnchorSnapshot();
    // 玩家位置：回到拾取錨點時的格子
    const sp = anchorReturnPos ?? { gx: Math.floor(COLS / 2), gy: Math.floor(ROWS / 2) };
    let px = sp.gx, py = sp.gy;
    if (!isWalkable(px, py)) {
      const found = findSpawnNear(px, py);
      px = found.x; py = found.y;
    }
    player.gx = px; player.gy = py;
    player.tx = px; player.ty = py;
    // 傳送到錨定地圖後，按鈕變暗（已在此圖）
    anchorBtn.style.opacity = '0.35';
    anchorBtn.style.cursor  = 'default';
    anchorBtn.title = '已在錨定地圖';
  });
}

// 錨點按鈕點擊
anchorBtn.addEventListener('click', () => {
  if (isAnchorMap) return;   // 已在錨定地圖，不需傳送
  if (!anchorSnapshot) return;
  if (fadeState !== 'idle') return;
  teleportToAnchor();
});

// ── 更新快照中可變狀態（玩家仍在錨定地圖時持續同步）──
// 離開前在 crossMapBoundary 呼叫
function updateAnchorSnapshotBeforeLeave() {
  if (!isAnchorMap || !anchorSnapshot) return;
  saveAnchorSnapshot(); // 重新存一份最新狀態
}

// ████████████████████████████████████████████████████████████
// § 02  過場動畫（淡黑 fade）
//        狀態：fadeState, fadeAlpha, pendingTransition
// ████████████████████████████████████████████████████████████
let fadeState = 'idle'; // 'idle' | 'fadein' | 'fadeout'
let fadeAlpha  = 0;
const FADE_SPEED = 0.045; // 每幀增減量（~22幀完成）
let pendingTransition = null; // 過場完成後要執行的 callback

function tickFade() {
  if (fadeState === 'idle') return;
  if (fadeState === 'fadein') {
    fadeAlpha = Math.min(1, fadeAlpha + FADE_SPEED);
    fadeOverlay.style.opacity = fadeAlpha;
    if (fadeAlpha >= 1) {
      // 全黑時執行地圖切換
      if (pendingTransition) { pendingTransition(); pendingTransition = null; }
      fadeState = 'fadeout';
    }
  } else if (fadeState === 'fadeout') {
    fadeAlpha = Math.max(0, fadeAlpha - FADE_SPEED);
    fadeOverlay.style.opacity = fadeAlpha;
    if (fadeAlpha <= 0) { fadeState = 'idle'; }
  }
}

// 觸發過場：cb 在全黑那一刻被呼叫（切地圖、移玩家都在此）
function startFadeTransition(cb) {
  if (fadeState !== 'idle') return;
  pendingTransition = cb;
  fadeState = 'fadein';
  fadeAlpha = 0;
}



// ████████████████████████████████████████████████████████████
// § 03  地面特效引擎
//        腳印：footprints, footprintMap, footprintBudget, stepFoot
//        漣漪：ripples
//        水花：splashDrops, splashDropMap
//        身體水滴：bodyDroplets, bodyDripActive, bodyDripUntil
//        水面泡泡：surfaceBubbles, surfaceBubbleMap
// ████████████████████████████████████████████████████████████
const footprints = [];
const footprintMap = new Map(); // "gx,gy" → footprint[]，供 drawFootprints O(1) 查詢
let footprintBudget = 0;
let stepFoot = 0;
const FOOTPRINT_FADE_MS = 1500;
const FOOTPRINT_COUNT   = 7;

function footOffset(dir, foot) {
  const side = foot === 0 ? -1 : 1;
  switch (dir) {
    case 0: return { ox: side * 4,  oy:  side * 2  };
    case 1: return { ox: side * 4,  oy: -side * 2  };
    case 2: return { ox: -side * 4, oy: -side * 2  };
    case 3: return { ox: -side * 4, oy:  side * 2  };
    default: return { ox: 0, oy: 0 };
  }
}

function addFootprint(gx, gy, foot, dir) {
  const type = tileAt(gx, gy);
  if (type < 1) return;
  const fp = {
    gx, gy, foot, dir, type,
    alpha: 0.70,
    born: performance.now(),
    maxLifetime: FOOTPRINT_FADE_MS * (0.85 + Math.random() * 0.30)
  };
  footprints.push(fp);
  const key = `${gx},${gy}`;
  if (!footprintMap.has(key)) footprintMap.set(key, []);
  footprintMap.get(key).push(fp);
}

function updateFootprints(now) {
  for (let i = footprints.length - 1; i >= 0; i--) {
    const fp = footprints[i];
    const elapsed = now - fp.born;
    const fadeStart = fp.maxLifetime * 0.30;
    if (elapsed >= fp.maxLifetime) {
      footprints.splice(i, 1);
      const key = `${fp.gx},${fp.gy}`;
      const arr = footprintMap.get(key);
      if (arr) {
        const fi = arr.indexOf(fp);
        if (fi !== -1) arr.splice(fi, 1);
        if (arr.length === 0) footprintMap.delete(key);
      }
    } else if (elapsed > fadeStart) {
      fp.alpha = 0.70 * (1 - (elapsed - fadeStart) / (fp.maxLifetime - fadeStart));
    }
  }
}

function drawFootprint(fp) {
  const type = tileAt(fp.gx, fp.gy);
  if (type < 1) return;
  const p = toScreen(fp.gx, fp.gy, type);
  const { ox, oy } = footOffset(fp.dir, fp.foot);

  let r = 80, g = 120, b = 160;
  if (type === 1) { r = 155; g = 130; b = 90;  }
  if (type === 2) { r = 55;  g = 95;  b = 75;  }
  if (type === 3) { r = 95;  g = 105; b = 125; }

  ctx.save();
  ctx.globalAlpha = fp.alpha;
  ctx.translate(p.x + ox, p.y + oy - 4);
  const isoAngle = Math.atan2(HH, HW);
  const rotDir = (fp.dir === 0 || fp.dir === 1) ? 1 : -1;
  ctx.rotate(rotDir * isoAngle * 0.5);

  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 3.2, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fill();
  ctx.restore();
}

function drawFootprints(gx, gy) {
  const arr = footprintMap.get(`${gx},${gy}`);
  if (!arr) return;
  for (const fp of arr) drawFootprint(fp);
}

const ripples = [];
const RIPPLE_DURATION = 3000;

function addRipple(gx, gy) {
  const p = toScreen(gx, gy, 0);
  ripples.push({
    x: p.x,
    y: p.y,
    born: performance.now(),
    duration: RIPPLE_DURATION * (0.8 + Math.random() * 0.4)
  });
}

function updateRipples(now) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (now - ripples[i].born >= ripples[i].duration) ripples.splice(i, 1);
  }
}

function drawRipplesAt(gx, gy, p) {
  const now = performance.now();
  if (ripples.length === 0) return;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - HH);
  ctx.lineTo(p.x + HW, p.y);
  ctx.lineTo(p.x, p.y + HH);
  ctx.lineTo(p.x - HW, p.y);
  ctx.closePath();
  ctx.clip();

  for (const rp of ripples) {
    const distSq = (rp.x - p.x)**2 + (rp.y - p.y)**2;
    if (distSq > 5000) continue; 

    const t = (now - rp.born) / rp.duration;  
    if (t < 0 || t >= 1) continue;

    const maxRx = HW * 2.2;
    const maxRy = HH * 2.2;
    const rx = maxRx * t;
    const ry = maxRy * t;
    const alpha = 0.55 * (1 - t) * (1 - t);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(180, 230, 255, 1)';
    ctx.lineWidth = 1.2 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (t > 0.15) {
      const t2 = (t - 0.15) / 0.85;
      const rx2 = maxRx * t2 * 0.6;
      const ry2 = maxRy * t2 * 0.6;
      ctx.globalAlpha = alpha * 0.6;
      ctx.lineWidth = 0.8 * (1 - t2 * 0.5);
      ctx.beginPath();
      ctx.ellipse(rp.x, rp.y, rx2, ry2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}

const splashDrops = [];
const splashDropMap = new Map(); // "gx,gy" → drop[]，供 drawSplashDropsAt O(1) 查詢

function addSplash(gx, gy) {
  const p = toScreen(gx, gy, -1);
  const key = `${gx},${gy}`;
  if (!splashDropMap.has(key)) splashDropMap.set(key, []);
  const bucket = splashDropMap.get(key);

  const count = 1 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    const vx = Math.cos(angle) * speed * 0.7;
    const vy = Math.sin(angle) * speed * 0.35 - (2.5 + Math.random() * 3.5);
    const d = {
      gx, gy,
      x: p.x + (Math.random() - 0.5) * 12,
      y: p.y + (Math.random() - 0.5) * 6,
      vx, vy,
      gravity: 0.18 + Math.random() * 0.10,
      r: 1.2 + Math.random() * 2.0,
      alpha: 0.85 + Math.random() * 0.15,
      born: performance.now(),
      life: 500 + Math.random() * 400,
      isLanding: false
    };
    splashDrops.push(d);
    bucket.push(d);
  }
  const crown = {
    gx, gy,
    x: p.x, y: p.y,
    vx: 0, vy: 0,
    gravity: 0,
    r: 0,
    alpha: 0.7,
    born: performance.now(),
    life: 350,
    isCrown: true,
    maxR: 14
  };
  splashDrops.push(crown);
  bucket.push(crown);
}

function updateSplashDrops(now) {
  for (let i = splashDrops.length - 1; i >= 0; i--) {
    const d = splashDrops[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) {
      splashDrops.splice(i, 1);
      const key = `${d.gx},${d.gy}`;
      const arr = splashDropMap.get(key);
      if (arr) {
        const di = arr.indexOf(d);
        if (di !== -1) arr.splice(di, 1);
        if (arr.length === 0) splashDropMap.delete(key);
      }
      continue;
    }
    if (!d.isCrown) {
      d.x += d.vx;
      d.y += d.vy;
      d.vy += d.gravity;
      d.alpha = 0.85 * (1 - elapsed / d.life);
    } else {
      d.r = d.maxR * (elapsed / d.life);
      d.alpha = 0.7 * (1 - elapsed / d.life);
    }
  }
}

function drawSplashDropsAt(gx, gy) {
  const arr = splashDropMap.get(`${gx},${gy}`);
  if (!arr || arr.length === 0) return;
  for (const d of arr) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    if (d.isCrown) {
      ctx.strokeStyle = 'rgba(140, 210, 255, 1)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(160, 220, 255, 1)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

const bodyDroplets = [];
let bodyDripActive = false;
let bodyDripUntil = 0;
let bodyDripIntensity = 0; 

function startBodyDrip(intensity) {
  bodyDripActive = true;
  bodyDripUntil = performance.now() + (200 + Math.random() * 10);
  bodyDripIntensity = intensity;
}

function updateBodyDroplets(now) {
  if (bodyDripActive && now < bodyDripUntil) {
    const remaining = (bodyDripUntil - now) / 1800;
    const spawnRate = Math.ceil(bodyDripIntensity * remaining * 3);
    if (player.frame % Math.max(1, 4 - spawnRate) === 0) {
      const rGx = Math.round(player.gx), rGy = Math.round(player.gy);
      const type = tileAt(rGx, rGy);
      const p = toScreen(player.gx, player.gy, type);
      const dw = 10;
      const spot = { ox: (Math.random() - 0.5) * dw * 0.4, oy: -12 + Math.random() * 6  };
      bodyDroplets.push({
        x: p.x + spot.ox,
        y: p.y + spot.oy,
        vy: 0.3 + Math.random() * 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        r: 1.0 + Math.random() * 1.5,
        alpha: 0.7 + Math.random() * 0.3,
        born: now,
        life: 400 + Math.random() * 150,
        streakLen: 1 + Math.random() * 1
      });
    }
  } else if (now >= bodyDripUntil) {
    bodyDripActive = false;
  }

  for (let i = bodyDroplets.length - 1; i >= 0; i--) {
    const d = bodyDroplets[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { bodyDroplets.splice(i, 1); continue; }
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.08;
    d.alpha = 0.7 * (1 - elapsed / d.life);
  }
}

function drawBodyDroplets() {
  for (const d of bodyDroplets) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    const speed = d.vy;
    const stretchY = Math.min(d.streakLen, speed * 2.5);
    ctx.fillStyle = 'rgba(180, 230, 255, 0.9)';
    // TODO: 若要簡化，可移除 strokeStyle + stroke()，水滴僅用 fill 即可，差異幾乎不可見
    ctx.strokeStyle = 'rgba(120, 190, 240, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, d.r * 0.6, d.r + stretchY * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

const surfaceBubbles = [];
const surfaceBubbleMap = new Map(); // "gx,gy" → bubble[]，供 drawSurfaceBubblesAt O(1) 查詢
function updateSurfaceBubbles() {
  const now = performance.now();
  for (let i = surfaceBubbles.length - 1; i >= 0; i--) {
    const b = surfaceBubbles[i];
    const elapsed = now - b.born;
    if (elapsed > b.life) {
      surfaceBubbles.splice(i, 1);
      const key = `${b.gx},${b.gy}`;
      const arr = surfaceBubbleMap.get(key);
      if (arr) {
        const bi = arr.indexOf(b);
        if (bi !== -1) arr.splice(bi, 1);
        if (arr.length === 0) surfaceBubbleMap.delete(key);
      }
    } else {
      b.oy -= 0.15; 
      b.alpha = 1 - (elapsed / b.life);
    }
  }
}

function drawSurfaceBubblesAt(gx, gy, p) {
  const arr = surfaceBubbleMap.get(`${gx},${gy}`);
  if (!arr || arr.length === 0) return;
  for (const b of arr) {
      ctx.save();
      // 氧氣歸零時：紅色脈衝閃爍
      const oxygenCritical = (isDeepSea && playerOxygen <= 0);
      if (oxygenCritical) {
        const pulse = (Math.sin(statusIconPhase * 5) + 1) / 2;
        ctx.globalAlpha = b.alpha * (0.55 + pulse * 0.45);
        ctx.fillStyle   = `rgba(255,${Math.floor(40 + pulse * 30)},${Math.floor(40 + pulse * 20)},1)`;
        ctx.strokeStyle = `rgba(255,100,80,0.9)`;
        ctx.shadowColor = `rgba(255,60,60,${0.7 + pulse * 0.3})`;
        ctx.shadowBlur  = 4 + pulse * 5;
      } else {
        ctx.globalAlpha = b.alpha * 0.6;
        ctx.fillStyle   = '#fff';
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      }
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(p.x + b.ox, p.y + b.oy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// 🐟 淺海魚群系統 (修正：僅在非交界區活動)
// ═══════════════════════════════════════════════════════

// ████████████████████████████████████████████████████████████
// § 04  魚群系統
//        狀態：fishes, pebbleScarePosGx/Gy, pebbleScareUntil
// ████████████████████████████████████████████████████████████
const fishes = [];
const FISH_FLEE_DIST_SQ = 3.5 * 3.5; 
const FISH_NORMAL_SPEED = 0.006;      
const FISH_FLEE_SPEED   = 0.085;      
const FISH_DIVE_INTERVAL_MIN = 4000;  
const FISH_DIVE_INTERVAL_MAX = 9000;
const FISH_DIVE_DURATION_MIN = 2000;
const FISH_DIVE_DURATION_MAX = 5000;
const FISH_MAX_COUNT = 12;

// 鵝卵石落水後的短暫驚嚇座標
let pebbleScarePosGx = -999;
let pebbleScarePosGy = -999;
let pebbleScareUntil = 0;

// 判斷是否為淺海交界
function isShallowBorder(gx, gy) {
  if (tileAt(gx, gy) !== 0) return false;
  const neighbors = [
    tileAt(gx + 1, gy), tileAt(gx - 1, gy),
    tileAt(gx, gy + 1), tileAt(gx, gy - 1)
  ];
  return neighbors.some(t => t !== 0);
}

function spawnFishesOnMap() {
  fishes.length = 0;
  const shallowTiles = [];
  for (let gy = 0; gy < ROWS; gy++)
    for (let gx = 0; gx < COLS; gx++)
      // 修正：必須是淺海且非交界
      if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
  
  const count = Math.min(FISH_MAX_COUNT, Math.floor(shallowTiles.length * 0.05));
  for (let i = 0; i < count; i++) {
    const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
    const angle = Math.random() * Math.PI * 2;
    const now = performance.now();
    fishes.push({
      gx: tile.gx + (Math.random() - 0.5) * 0.7,
      gy: tile.gy + (Math.random() - 0.5) * 0.7,
      angle: angle, targetAngle: angle,
      speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
      diving: false, diveAlpha: 0,
      nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
      diveEndAt: 0,
      bodyLen: 12 + Math.random() * 4, bodyW: 4 + Math.random() * 1.5,
      hue: 200 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
    });
  }
}

function updateFishes(now) {
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];

    if (f.vanishing) {
      f.diveAlpha -= 0.1;
      if (f.diveAlpha <= 0) {
        fishes.splice(i, 1);
        // 補生至合格區域
        const shallowTiles = [];
        for (let gy = 0; gy < ROWS; gy++)
          for (let gx = 0; gx < COLS; gx++)
            if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
        if (shallowTiles.length > 0) {
          const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
          const angle = Math.random() * Math.PI * 2;
          fishes.push({
            gx: tile.gx + (Math.random() - 0.5) * 0.7, gy: tile.gy + (Math.random() - 0.5) * 0.7,
            angle, targetAngle: angle, speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
            diving: false, diveAlpha: 0,
            nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
            diveEndAt: 0,
            bodyLen: 12 + Math.random() * 4, bodyW: 4 + Math.random() * 1.5,
            hue: 200 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
          });
        }
      }
      continue;
    }

    const dx = f.gx - player.gx, dy = f.gy - player.gy;
    const distSq = dx * dx + dy * dy;

    let scareDistSq = Infinity;
    if (now < pebbleScareUntil) {
      const sdx = f.gx - pebbleScarePosGx, sdy = f.gy - pebbleScarePosGy;
      scareDistSq = sdx * sdx + sdy * sdy;
    }

    if (distSq < FISH_FLEE_DIST_SQ || scareDistSq < FISH_FLEE_DIST_SQ) {
      // 逃離距離更近的威脅
      let fleeFromGx = player.gx, fleeFromGy = player.gy;
      if (scareDistSq < distSq && scareDistSq < FISH_FLEE_DIST_SQ) {
        fleeFromGx = pebbleScarePosGx; fleeFromGy = pebbleScarePosGy;
      }
      f.fleeing = true;
      f.targetAngle = Math.atan2(f.gy - fleeFromGy, f.gx - fleeFromGx);
      f.speed = FISH_FLEE_SPEED;
    } else {
      f.fleeing = false; f.speed = FISH_NORMAL_SPEED;
      if (now > f.turnAt) {
        f.targetAngle = f.angle + (Math.random() - 0.5) * Math.PI * 1.2;
        f.turnAt = now + 1500 + Math.random() * 3000;
      }
    }

    let da = f.targetAngle - f.angle;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    f.angle += da * (f.fleeing ? 0.25 : 0.04);

    const nx = f.gx + Math.cos(f.angle) * f.speed;
    const ny = f.gy + Math.sin(f.angle) * f.speed;
    const tx = Math.round(nx), ty = Math.round(ny);
    const tileCheck = tileAt(tx, ty);
    const isBorder = isShallowBorder(tx, ty);

    // 修正：若前進方向非淺海或屬交界區
    if (tileCheck === 0 && !isBorder) {
      f.gx = nx; f.gy = ny;
    } else {
      if (f.fleeing) {
        f.vanishing = true; // 逃跑時碰到交界直接消失
      } else {
        f.targetAngle = f.angle + Math.PI + (Math.random() - 0.5) * 0.8;
        f.turnAt = now + 200;
      }
    }

    // 潛水邏輯
    if (!f.diving && now > f.nextDiveAt && !f.fleeing) {
      f.diving = true;
      f.diveEndAt = now + FISH_DIVE_DURATION_MIN + Math.random() * (FISH_DIVE_DURATION_MAX - FISH_DIVE_DURATION_MIN);
    }

    if (f.diving) {
      if (f.fleeing) {
        // 被人追趕，強制結束潛水狀態
        f.diving = false; 
        // 移除 f.diveAlpha = 1.0; 讓它自然浮現
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else if (now > f.diveEndAt) {
        // 自然潛水時間到，結束潛水
        f.diving = false; 
        // 移除 f.diveAlpha = 1.0; 讓它自然浮現
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else {
        // 正在下潛：逐漸變淡
        f.diveAlpha = Math.max(0.18, f.diveAlpha - 0.008);
      }
    } else {
      // 正在浮起：逐漸變深（包含逃跑消失後重新生成的魚也會走這段）
      f.diveAlpha = Math.min(1.0, f.diveAlpha + 0.005);
    }
  }
}

function drawAllFishes() {
  const sorted = fishes.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
  for (const f of sorted) {
    if (tileAt(Math.round(f.gx), Math.round(f.gy)) !== 0) continue;
    const p = toScreen(f.gx, f.gy, 0);
    const cosA = Math.cos(f.angle), sinA = Math.sin(f.angle);
    const sdx = (cosA - sinA) * HW, sdy = (cosA + sinA) * HH;
    const len = Math.sqrt(sdx * sdx + sdy * sdy) || 1;
    const ux = sdx/len, uy = sdy/len, px = -uy, py = ux;
    const BL = f.bodyLen, BW = f.bodyW;

    ctx.save();
    ctx.globalAlpha = f.diveAlpha * 0.88;
    ctx.fillStyle = `hsla(${f.hue}, 70%, 40%, ${f.diveAlpha})`;
    ctx.strokeStyle = `hsla(${f.hue}, 55%, 50%, ${f.diveAlpha * 0.8})`;
    ctx.lineWidth = 0.6;

    const hx = p.x + ux * BL * 0.5, hy = p.y + uy * BL * 0.5;
    const tx = p.x - ux * BL * 0.5, ty = p.y - uy * BL * 0.5;

    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.bezierCurveTo(hx + px * BW, hy + py * BW, tx + px * BW * 0.6, ty + py * BW * 0.6, tx, ty);
    ctx.bezierCurveTo(tx - px * BW * 0.6, ty - py * BW * 0.6, hx - px * BW, hy - py * BW, hx, hy);
    ctx.fill(); ctx.stroke();

    const fx1 = tx + px * BW * 0.5 - ux * BL * 0.35, fy1 = ty + py * BW * 0.5 - uy * BL * 0.35;
    const fx2 = tx - px * BW * 1.4 - ux * BL * 0.35, fy2 = ty - py * BW * 1.4 - uy * BL * 0.35;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(fx1, fy1); ctx.lineTo(fx2, fy2); ctx.closePath();
    ctx.fillStyle = `hsla(${f.hue + 10}, 60%, 60%, ${f.diveAlpha * 0.85})`;
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// 🪨 鵝卵石物件系統
// ═══════════════════════════════════════════════════════
// 持有鵝卵石的精靈圖（之後再換成實際畫好的圖）

// ████████████████████████████████████████████████████████████
// § 05  鵝卵石物件系統
//        狀態：pebbleObjects, pebbleSet, playerHoldingPebble, heldPebbleShade
//        精靈圖：pebbleHeldSprite, pebbleThrowSprite, coconutTreeSprite
// ████████████████████████████████████████████████████████████
const pebbleHeldSprite = new Image();
pebbleHeldSprite.src = 'cssavage.png'; // 持有狀態
const pebbleThrowSprite = new Image();
pebbleThrowSprite.src = 'rcssavage.png'; // 投擲動作狀態

// 木頭精靈圖（地圖物件用）
const woodSprite = new Image();
woodSprite.src = 'wt.png'; // 4個朝向（2×2排列），每格約 276×225 px
let WOOD_FRAME_W = 0, WOOD_FRAME_H = 0;
woodSprite.onload = () => {
  WOOD_FRAME_W = woodSprite.naturalWidth  / 2;
  WOOD_FRAME_H = woodSprite.naturalHeight / 2;
};
// 持有木頭的玩家精靈圖
const woodHeldSprite = new Image();
woodHeldSprite.src = 'wtsavage.png'; // 同 savage.png 格式，4×4
// 投擲木頭的玩家精靈圖
const woodThrowSprite = new Image();
woodThrowSprite.src = 'rwtsavage.png'; // 投擲動作專用

// 椰子樹精靈圖
const coconutTreeSprite = new Image();
coconutTreeSprite.src = 'coconuttree.png';

// 地圖上的鵝卵石物件列表：{ gx, gy, shade, sRx, sRy, angle }
let pebbleObjects = [];
// 快速查詢用 Set（key = "gx,gy"），避免 isWalkable 每次線性掃描
let pebbleSet = new Set();
// 玩家是否正在持有鵝卵石
let playerHoldingPebble = false;
// 玩家是否正在持有木頭
let playerHoldingWood = false;

// 建立鵝卵石物件（每張新地圖重新生成）
function buildPebbleObjects() {
  pebbleObjects = [];
  pebbleSet = new Set();
  const mapSeedNum = cachedMapSeedNum;
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 3) continue; // 只在石地上生成
      // 用地圖座標+種子做雜湊，確保每次同種子結果相同
      let h = (gx * 374761393 + gy * 668265263 + mapSeedNum) | 0;
      h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
      // 5% 機率生成
      if ((Math.abs(h) % 100) >= 5) continue;
      const hk2 = Math.abs(Math.imul(h ^ (h >>> 9), 374761393));
      const hk3 = Math.abs(Math.imul(hk2 ^ (hk2 >>> 11), 2246822519));
      // 隨機視覺偏移（不影響格子邏輯位置）
      const ox = ((hk2 % 201) - 100) / 100 * 7;  // ±7 像素
      const oy = ((hk3 % 201) - 100) / 100 * 4;  // ±4 像素
      pebbleObjects.push({
        gx, gy,
        ox, oy,
        sRx: 4,
        sRy: 3,
        angle: 0,
        shade: 171 + (Math.abs(h) % 5)
      });
      pebbleSet.add(`${gx},${gy}`);
    }
  }
}

// 取得玩家附近（切比雪夫距離 1，含斜鄰）的鵝卵石
// 若玩家已持有鵝卵石則一律回傳 null（只能持有一顆）
function getNearbyPebble() {
  if (playerHoldingPebble || playerHoldingWood) return null; // 已持物（石頭/木頭二選一）
  for (const pb of pebbleObjects) {
    const dx = Math.abs(pb.gx - player.tx);
    const dy = Math.abs(pb.gy - player.ty);
    if (dx <= 1 && dy <= 1) return pb;
  }
  return null;
}

// 拾取鵝卵石
function pickUpPebble(pb) {
  const idx = pebbleObjects.indexOf(pb);
  if (idx !== -1) {
    pebbleObjects.splice(idx, 1);
    pebbleSet.delete(`${pb.gx},${pb.gy}`);
    playerHoldingPebble = true;
    heldPebbleShade = pb.shade; // 記住石頭顏色
  }
}

// ═══════════════════════════════════════════════════════
// 🪨 投擲系統
// ═══════════════════════════════════════════════════════

// ████████████████████████████████████████████████████████████
// § 06  投擲系統（主投擲 + 二次彈飛）
//        狀態：throwAnim, heldPebbleShade, pebbleSplashes, secondaryThrows
// ████████████████████████████████████████████████████████████
let throwAnim = null; // 當前投擲動畫狀態

// 投擲動畫持有的靜態鵝卵石資訊（投擲前的shade）
let heldPebbleShade = 170;

// 水花特效（鵝卵石落水）
const pebbleSplashes = [];

function addPebbleSplash(gx, gy) {
  const type = tileAt(gx, gy);
  const p = toScreen(gx, gy, type);
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 3.0;
    pebbleSplashes.push({
      x: p.x + (Math.random() - 0.5) * 10,
      y: p.y + (Math.random() - 0.5) * 5,
      vx: Math.cos(angle) * speed * 0.7,
      vy: Math.sin(angle) * speed * 0.35 - (2.0 + Math.random() * 3.0),
      gravity: 0.16 + Math.random() * 0.12,
      r: 1.0 + Math.random() * 2.2,
      alpha: 0.9,
      born: performance.now(),
      life: 450 + Math.random() * 350,
    });
  }
  // 水面冠狀
  pebbleSplashes.push({
    x: p.x, y: p.y,
    vx: 0, vy: 0, gravity: 0,
    r: 0, alpha: 0.75,
    born: performance.now(),
    life: 400,
    isCrown: true, maxR: 18,
  });
}

function updatePebbleSplashes(now) {
  for (let i = pebbleSplashes.length - 1; i >= 0; i--) {
    const d = pebbleSplashes[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { pebbleSplashes.splice(i, 1); continue; }
    if (!d.isCrown) {
      d.x += d.vx; d.y += d.vy; d.vy += d.gravity;
      d.alpha = 0.9 * (1 - elapsed / d.life);
    } else {
      d.r = d.maxR * (elapsed / d.life);
      d.alpha = 0.75 * (1 - elapsed / d.life);
    }
  }
}

function drawPebbleSplashes() {
  for (const d of pebbleSplashes) {
    if (d.alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    if (d.isCrown) {
      if (d.r < 0.5) { ctx.restore(); continue; } // 半徑太小跳過，避免 ellipse(0,0) 崩潰
      ctx.strokeStyle = 'rgba(120, 200, 255, 1)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, Math.max(0.5, d.r * 0.45), 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      if (d.r < 0.5) { ctx.restore(); continue; }
      ctx.fillStyle = 'rgba(150, 215, 255, 1)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, Math.max(0.5, d.r * 0.6), 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// 觸發投擲：目標為 (tgx, tgy)
function throwPebble(tgx, tgy) {
  if (!playerHoldingPebble || throwAnim) return;
  // 投擲方向：讓玩家面向目標
  const dx = tgx - player.gx, dy = tgy - player.gy;
  if (Math.abs(dx) >= Math.abs(dy)) {
    player.dir = dx > 0 ? 1 : 3;
  } else {
    player.dir = dy > 0 ? 2 : 0;
  }

  const startType = tileAt(Math.round(player.gx), Math.round(player.gy));
  const startP = toScreen(player.gx, player.gy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);

  const THROW_DURATION = 520; // ms
  const now = performance.now();

  // 鵝卵石落地後是否沉入水中
  const targetTile = tileAt(tgx, tgy);
  const sinksInWater = (targetTile === 0 || targetTile === -1);

  // 落地視覺偏移（水中不需要，陸地上隨機偏一點）
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;

  // 若目標是椰子樹，石頭終點改為樹冠（椰子叢）高度，而非地面
  const isTargetCoconutTree = coconutTreeSet.has(`${tgx},${tgy}`);
  const groundY = targetP.y + HH + 20; // 同 drawCoconutTree 的 groundY
  const coconutCanopyOffsetY = isTargetCoconutTree ? (groundY - 150 - (targetP.y - 4)) : 0;

  throwAnim = {
    startX: startP.x,
    startY: startP.y - 20, // 從角色手部高度拋出
    endX: targetP.x + landOx,
    endY: targetP.y - 4 + landOy + coconutCanopyOffsetY,
    tgx, tgy,
    landOx, landOy,
    born: now,
    duration: THROW_DURATION,
    done: false,
    sinksInWater,
    shade: heldPebbleShade,
    phase: 'throwing', // 'throwing' | 'landed'
  };

  playerHoldingPebble = false;
}

// 投擲木頭：拋物線 + 旋轉
function throwWood(tgx, tgy) {
  if (!playerHoldingWood || throwAnim) return;
  // 投擲方向
  const dx = tgx - player.gx, dy = tgy - player.gy;
  if (Math.abs(dx) >= Math.abs(dy)) {
    player.dir = dx > 0 ? 1 : 3;
  } else {
    player.dir = dy > 0 ? 2 : 0;
  }

  const startType = tileAt(Math.round(player.gx), Math.round(player.gy));
  const startP = toScreen(player.gx, player.gy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);
  const THROW_DURATION = 540;
  const now = performance.now();
  const targetTile = tileAt(tgx, tgy);
  const sinksInWater = (targetTile === 0 || targetTile === -1);
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;
  const isTargetCoconutTree = coconutTreeSet.has(`${tgx},${tgy}`);
  const groundY = targetP.y + HH + 20;
  const coconutCanopyOffsetY = isTargetCoconutTree ? (groundY - 150 - (targetP.y - 4)) : 0;

  throwAnim = {
    startX: startP.x, startY: startP.y - 20,
    endX: targetP.x + landOx, endY: targetP.y - 4 + landOy + coconutCanopyOffsetY,
    tgx, tgy, landOx, landOy,
    born: now, duration: THROW_DURATION,
    done: false, sinksInWater,
    shade: 0, // 木頭不用 shade
    phase: 'throwing',
    isWood: true,           // 標記為木頭投擲
    woodFrameIdx: heldWoodFrameIdx,
    woodRotation: 0,        // 當前旋轉角度
  };

  playerHoldingWood = false;
}

function updateThrowAnim(now) {
  if (!throwAnim) return;
  if (throwAnim.done) { throwAnim = null; return; }

  const elapsed = now - throwAnim.born;
  const t = Math.min(elapsed / throwAnim.duration, 1);

// 【TODO】若未來要加「投擲中途可被打斷」功能，在此加入 phase 判斷切換點
if (t >= 1) {
  throwAnim.done = true;
  const tgx = throwAnim.tgx, tgy = throwAnim.tgy;
  const type = tileAt(tgx, tgy);

  // ── 木頭落地邏輯（與石頭互動完全相同）──
  if (throwAnim.isWood) {
    // 命中椰子樹
    if (handleWoodLandOnCoconutTree(tgx, tgy, throwAnim.woodFrameIdx)) {
      throwAnim = null; return;
    }
    // 命中地面椰子 → 彈開
    const hitCoconutIdxW = coconuts.findIndex(c => c.gx === tgx && c.gy === tgy);
    if (hitCoconutIdxW !== -1) {
      launchKnockedWood({ gx: tgx, gy: tgy, frameIdx: throwAnim.woodFrameIdx, ox: throwAnim.landOx ?? 0, oy: throwAnim.landOy ?? 0 }, tgx, tgy);
      throwAnim = null; return;
    }
    // 命中海鷗（與石頭一致）
    const seagullHitW = tryHitSeagullWithPebble(tgx, tgy);
    if (seagullHitW) {
      if (type >= 1) {
        const existingPbW = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
        if (existingPbW && Math.random() < 0.9) launchKnockedPebble(existingPbW, tgx, tgy);
        // 木頭落地（打死海鷗後彈走）
        const newWd = { gx: tgx, gy: tgy, frameIdx: Math.floor(Math.random() * 4), ox: throwAnim.landOx ?? 0, oy: throwAnim.landOy ?? 0 };
        woodObjects.push(newWd); woodSet.add(`${tgx},${tgy}`);
        launchKnockedWood(newWd, tgx, tgy);
      }
      throwAnim = null; return;
    }
    // 命中石頭 → 石頭彈走，木頭也彈走（互打反彈）
    const existingPbW2 = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
    if (existingPbW2 && Math.random() < 0.9) launchKnockedPebble(existingPbW2, tgx, tgy);
    // 命中貝殼
    handlePebbleHitShell(tgx, tgy, false);

    if (type < 1) {
      addPebbleSplash(tgx, tgy);
      addFloatingWood(tgx, tgy, throwAnim.woodFrameIdx ?? 0);
      pebbleScarePosGx = tgx; pebbleScarePosGy = tgy; pebbleScareUntil = performance.now() + 1200;
    } else {
      // 命中石頭時木頭反彈
      if (existingPbW2) {
        launchKnockedWood({ gx: tgx, gy: tgy, frameIdx: throwAnim.woodFrameIdx, ox: throwAnim.landOx ?? 0, oy: throwAnim.landOy ?? 0 }, tgx, tgy);
        throwAnim = null; return;
      }
      const landOx = throwAnim.landOx ?? 0, landOy = throwAnim.landOy ?? 0;
      // 命中已有木頭時打飛
      const existingWd = woodObjects.find(w => w.gx === tgx && w.gy === tgy);
      if (existingWd && Math.random() < 0.9) launchKnockedWood(existingWd, tgx, tgy);
      woodObjects.push({ gx: tgx, gy: tgy, frameIdx: Math.floor(Math.random() * 4), ox: landOx, oy: landOy });
      woodSet.add(`${tgx},${tgy}`);
      if (type === 2) trampleGrass(tgx, tgy);
    }
    throwAnim = null;
    return;
  }

  // 先判斷是否命中椰子樹（優先處理）
  if (handlePebbleLandOnCoconutTree(tgx, tgy, throwAnim.shade, false)) {
    throwAnim = null;
    return;
  }

  // 判斷是否命中地面椰子（whole/split/eaten 都觸發彈開）
  const hitCoconutIdx = coconuts.findIndex(c => c.gx === tgx && c.gy === tgy);
  if (hitCoconutIdx !== -1) {
    // 石頭彈開：使用 launchKnockedPebble 機制，先臨時放一個石頭再彈走
    const tmpPb = { gx: tgx, gy: tgy, ox: throwAnim.landOx ?? 0, oy: throwAnim.landOy ?? 0, shade: throwAnim.shade, sRx: 4, sRy: 3, angle: 0 };
    // 直接呼叫飛行動畫（不真正放到 pebbleObjects）
    const startType2 = tileAt(tgx, tgy);
    const startP2 = toScreen(tgx, tgy, startType2);
    const dist2 = 2 + Math.floor(Math.random() * 3);
    const angle2 = Math.random() * Math.PI * 2;
    let bx2 = Math.round(Math.cos(angle2) * dist2), by2 = Math.round(Math.sin(angle2) * dist2);
    if (Math.abs(bx2) < 1 && Math.abs(by2) < 1) bx2 = 1;
    let nx2 = Math.max(0, Math.min(COLS-1, tgx + bx2)), ny2 = Math.max(0, Math.min(ROWS-1, tgy + by2));
    const targetType2 = tileAt(nx2, ny2);
    const targetP2 = toScreen(nx2, ny2, targetType2);
    const sinksInWater2 = (targetType2 === 0 || targetType2 === -1);
    const landOx2 = sinksInWater2 ? 0 : (Math.random()-0.5)*14, landOy2 = sinksInWater2 ? 0 : (Math.random()-0.5)*8;
    secondaryThrows.push({
      startX: startP2.x, startY: startP2.y - 4,
      endX: targetP2.x + landOx2, endY: targetP2.y - 4 + landOy2,
      tgx: nx2, tgy: ny2, landOx: landOx2, landOy: landOy2,
      born: performance.now(), duration: 300 + Math.random() * 100,
      done: false, sinksInWater: sinksInWater2, shade: throwAnim.shade, arcScale: 0.7,
    });
    throwAnim = null;
    return;
  }

  // 判斷是否命中海鷗（20%機率）
  const seagullHit = tryHitSeagullWithPebble(tgx, tgy);
  if (seagullHit) {
    // 命中：羽毛噴散、海鷗消失，石頭彈往鄰近格子（與打中石頭時的行為一致）
    const hitLandOx = throwAnim.landOx ?? 0;
    const hitLandOy = throwAnim.landOy ?? 0;
    if (type >= 1) {
      // 陸地上才放石頭再彈走（不放水中）
      const existingHit = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
      if (existingHit && Math.random() < 0.9) {
        launchKnockedPebble(existingHit, tgx, tgy);
      }
      const newPb = {
        gx: tgx, gy: tgy,
        ox: hitLandOx, oy: hitLandOy,
        shade: throwAnim.shade,
        sRx: 4, sRy: 3, angle: 0
      };
      pebbleObjects.push(newPb);
      pebbleSet.add(`${tgx},${tgy}`);
      // 打死海鷗的石頭隨即彈往鄰近格子
      launchKnockedPebble(newPb, tgx, tgy);
    }
    throwAnim = null;
    return;
  }

  // 判斷是否命中貝殼
  handlePebbleHitShell(tgx, tgy, false);

  if (type < 1) {
    // 原有的水花處理
    addPebbleSplash(tgx, tgy);
    pebbleScarePosGx = tgx; 
    pebbleScarePosGy = tgy;
    pebbleScareUntil = now + 1200;
  } else {
    // ── 量子錨點觸發檢查 ──
    if (checkAnchorThrow(tgx, tgy)) {
      // 落地煙霧後生成錨點，石頭不放回地圖
      addAnchorSmoke(tgx, tgy);
      const _tgx = tgx, _tgy = tgy;
      anchorPending = true; // 標記為 pending，阻止馬鞍藤切割/椰子剖開消耗刀
      setTimeout(() => { spawnQuantumAnchor(_tgx, _tgy); }, 700);
      throwAnim = null;
      return;
    }

    // 落地在陸地上時的原本邏輯
    const landOx = throwAnim.landOx ?? 0;
    const landOy = throwAnim.landOy ?? 0;

    // ── 打飛判斷：目標格已有石頭時，90% 機率打飛它 ──
    const existing = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
    if (existing && Math.random() < 0.9) {
      launchKnockedPebble(existing, tgx, tgy);
    }

    // ── 打飛判斷：目標格已有木頭時，石頭反彈（打木頭互打）──
    const existingWoodHit = woodObjects.find(w => w.gx === tgx && w.gy === tgy);
    if (existingWoodHit && Math.random() < 0.9) {
      launchKnockedWood(existingWoodHit, tgx, tgy);
      // 石頭也彈走
      const tmpPbHit = { gx: tgx, gy: tgy, ox: throwAnim.landOx ?? 0, oy: throwAnim.landOy ?? 0, shade: throwAnim.shade, sRx: 4, sRy: 3, angle: 0 };
      launchKnockedPebble(tmpPbHit, tgx, tgy);
      throwAnim = null;
      return;
    }

    pebbleObjects.push({
      gx: tgx, gy: tgy,
      ox: landOx, oy: landOy,
      shade: throwAnim.shade,
      sRx: 4, sRy: 3, angle: 0
    });
    pebbleSet.add(`${tgx},${tgy}`);

    // 如果落地的格子是草地 (type 2)，觸發搖晃效果
    if (type === 2) {
      trampleGrass(tgx, tgy); 
    }
  }
  
  // 【說明】playerHoldingPebble 已在 throwPebble() 呼叫時設為 false，此處無需再設
  throwAnim = null;
}
}

function drawThrowAnim(now) {
  if (!throwAnim || throwAnim.done) return;
  const elapsed = now - throwAnim.born;
  const t = Math.min(elapsed / throwAnim.duration, 1);

  // 拋物線插值
  const lx = throwAnim.startX + (throwAnim.endX - throwAnim.startX) * t;
  const ly = throwAnim.startY + (throwAnim.endY - throwAnim.startY) * t;
  const arcHeight = 55 + Math.abs(throwAnim.endX - throwAnim.startX) * 0.18;
  const arcY = ly - Math.sin(Math.PI * t) * arcHeight;
  const scale = 0.9 + 0.1 * (1 - Math.sin(Math.PI * t) * 0.5);

  // 木頭投擲：旋轉繪製
  if (throwAnim.isWood) {
    if (!woodSprite.complete || WOOD_FRAME_W === 0) return;
    throwAnim.woodRotation = t * Math.PI * 4; // 旋轉兩圈
    const fi = throwAnim.woodFrameIdx ?? 0;
    const srcCol = fi % 2, srcRow = Math.floor(fi / 2);
    const dw = WOOD_FRAME_W * 0.5 * scale * 0.26;
    const dh = WOOD_FRAME_H * 0.5 * scale * 0.26;
    // 陰影
    ctx.save();
    ctx.globalAlpha = 0.18 * (1 - t * 0.4);
    ctx.beginPath();
    ctx.ellipse(lx + 2, arcY + 4, dw * 0.5, dh * 0.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)'; ctx.fill();
    ctx.restore();
    // 木頭本體（旋轉）
    ctx.save();
    ctx.translate(lx, arcY);
    ctx.rotate(throwAnim.woodRotation);
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(
      woodSprite,
      srcCol * WOOD_FRAME_W, srcRow * WOOD_FRAME_H, WOOD_FRAME_W, WOOD_FRAME_H,
      -dw / 2, -dh / 2, dw, dh
    );
    ctx.restore();
    return;
  }

  const g = throwAnim.shade;
  const r = 3 * scale;
  // 陰影
  ctx.save();
  ctx.globalAlpha = 0.25 * (1 - t * 0.3);
  ctx.beginPath();
  ctx.ellipse(lx + 2, arcY + 4, r * 0.9, r * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
  ctx.restore();
  // 鵝卵石本體
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(lx, arcY, r, r * 0.67, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
  ctx.fill();
  ctx.strokeStyle = '#000000'; // 邊框顏色
  ctx.lineWidth = 0.2;           // 邊框粗細
  ctx.stroke();                // 執行繪製邊框
  // 高光
  ctx.beginPath();
  ctx.ellipse(lx - r * 0.25, arcY - r * 0.3, r * 0.38, r * 0.28, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// 🪵 被打飛的木頭動畫（二次飛行）
// ═══════════════════════════════════════════════════════

function launchKnockedWood(wd, fromGx, fromGy) {
  // 從 woodObjects 移除被打飛的木頭
  const idx = woodObjects.indexOf(wd);
  if (idx !== -1) {
    woodObjects.splice(idx, 1);
    woodSet.delete(`${wd.gx},${wd.gy}`);
  }
  const dist = 1 + Math.floor(Math.random() * 3);
  const angle = Math.random() * Math.PI * 2;
  let tgx = Math.max(0, Math.min(COLS - 1, fromGx + Math.round(Math.cos(angle) * dist)));
  let tgy = Math.max(0, Math.min(ROWS - 1, fromGy + Math.round(Math.sin(angle) * dist)));

  const startType = tileAt(fromGx, fromGy);
  const startP = toScreen(fromGx, fromGy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);
  const sinksInWater = (targetType === 0 || targetType === -1);
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;
  const duration = 280 + Math.random() * 120;

  secondaryThrows.push({
    startX: startP.x + (wd.ox ?? 0),
    startY: startP.y + (wd.oy ?? 0) - 4,
    endX: targetP.x + landOx,
    endY: targetP.y - 4 + landOy,
    tgx, tgy, landOx, landOy,
    born: performance.now(), duration,
    done: false, sinksInWater,
    shade: 0,
    isWood: true,
    woodFrameIdx: Math.floor(Math.random() * 4),
  });
}

// 處理木頭打中椰子樹（搖晃 + 石頭彈更遠）
function handleWoodLandOnCoconutTree(tgx, tgy, woodFrameIdx) {
  const ct = coconutTrees.find(c => c.gx === tgx && c.gy === tgy);
  if (!ct) return false;
  shakeCoconutTree(ct, 900);
  tryDropCoconut(ct);
  // 木頭彈走
  const dist = 5 + Math.floor(Math.random() * 4);
  const angle = Math.random() * Math.PI * 2;
  let ax = Math.round(Math.cos(angle) * dist), ay = Math.round(Math.sin(angle) * dist);
  const MIN_BOUNCE = 3;
  const abx = Math.abs(ax), aby = Math.abs(ay);
  if (abx < MIN_BOUNCE && aby < MIN_BOUNCE) { ax = ax >= 0 ? dist : -dist; }
  let nx = Math.max(0, Math.min(COLS - 1, tgx + ax));
  let ny = Math.max(0, Math.min(ROWS - 1, tgy + ay));
  const startType2 = tileAt(tgx, tgy);
  const startP2 = toScreen(tgx, tgy, startType2);
  const targetType2 = tileAt(nx, ny);
  const targetP2 = toScreen(nx, ny, targetType2);
  const sinksInWater2 = (targetType2 === 0 || targetType2 === -1);
  const landOx2 = sinksInWater2 ? 0 : (Math.random() - 0.5) * 14;
  const landOy2 = sinksInWater2 ? 0 : (Math.random() - 0.5) * 8;
  secondaryThrows.push({
    startX: startP2.x, startY: startP2.y + HH + 20 - 130,
    endX: targetP2.x + landOx2, endY: targetP2.y - 4 + landOy2,
    tgx: nx, tgy: ny, landOx: landOx2, landOy: landOy2,
    born: performance.now(), duration: 480 + Math.random() * 120,
    done: false, sinksInWater: sinksInWater2,
    shade: 0, isWood: true, woodFrameIdx: Math.floor(Math.random() * 4),
    arcScale: 2.2,
  });
  return true;
}
const secondaryThrows = [];

function launchKnockedPebble(pb, fromGx, fromGy) {
  // 從 pebbleObjects 移除被打飛的石頭
  const idx = pebbleObjects.indexOf(pb);
  if (idx !== -1) {
    pebbleObjects.splice(idx, 1);
    pebbleSet.delete(`${pb.gx},${pb.gy}`);
  }

  // 隨機飛往 1~3 格外的鄰近格子（8方向加權）
  const dist = 1 + Math.floor(Math.random() * 3); // 1~3 格
  const angle = Math.random() * Math.PI * 2;
  const stepX = Math.round(Math.cos(angle) * dist);
  const stepY = Math.round(Math.sin(angle) * dist);
  let tgx = fromGx + stepX;
  let tgy = fromGy + stepY;
  // 夾在地圖範圍內
  tgx = Math.max(0, Math.min(COLS - 1, tgx));
  tgy = Math.max(0, Math.min(ROWS - 1, tgy));

  const startType = tileAt(fromGx, fromGy);
  const startP = toScreen(fromGx, fromGy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);

  const sinksInWater = (targetType === 0 || targetType === -1);
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;

  // 飛行時間比主投擲短，弧線也矮一些
  const duration = 280 + Math.random() * 120;

  secondaryThrows.push({
    startX: startP.x + (pb.ox ?? 0),
    startY: startP.y + (pb.oy ?? 0) - 4,
    endX: targetP.x + landOx,
    endY: targetP.y - 4 + landOy,
    tgx, tgy, landOx, landOy,
    born: performance.now(),
    duration,
    done: false,
    sinksInWater,
    shade: pb.shade,
  });
}

function updateSecondaryThrows(now) {
  for (let i = secondaryThrows.length - 1; i >= 0; i--) {
    const sa = secondaryThrows[i];
    if (sa.done) { secondaryThrows.splice(i, 1); continue; }
    const elapsed = now - sa.born;
    const t = Math.min(elapsed / sa.duration, 1);
    if (t >= 1) {
      sa.done = true;
      const type = tileAt(sa.tgx, sa.tgy);

      // 木頭落地
      if (sa.isWood) {
        if (handleWoodLandOnCoconutTree(sa.tgx, sa.tgy, sa.woodFrameIdx)) continue;
        // 命中地面椰子
        const hitCocIdxW = coconuts.findIndex(c => c.gx === sa.tgx && c.gy === sa.tgy);
        if (hitCocIdxW !== -1) {
          const tmpWd = { gx: sa.tgx, gy: sa.tgy, frameIdx: Math.floor(Math.random() * 4), ox: sa.landOx, oy: sa.landOy };
          launchKnockedWood(tmpWd, sa.tgx, sa.tgy);
          continue;
        }
        // 命中石頭 → 互打反彈
        const existPbW = pebbleObjects.find(p => p.gx === sa.tgx && p.gy === sa.tgy);
        if (existPbW && Math.random() < 0.9) launchKnockedPebble(existPbW, sa.tgx, sa.tgy);
        // 命中貝殼
        handlePebbleHitShell(sa.tgx, sa.tgy, true);
        if (type < 1) {
          addPebbleSplash(sa.tgx, sa.tgy);
          addFloatingWood(sa.tgx, sa.tgy, sa.woodFrameIdx ?? Math.floor(Math.random() * 4));
          pebbleScarePosGx = sa.tgx; pebbleScarePosGy = sa.tgy; pebbleScareUntil = performance.now() + 1200;
        } else {
          if (existPbW) {
            // 互打：木頭也彈走
            const tmpWd2 = { gx: sa.tgx, gy: sa.tgy, frameIdx: Math.floor(Math.random() * 4), ox: sa.landOx, oy: sa.landOy };
            launchKnockedWood(tmpWd2, sa.tgx, sa.tgy);
            continue;
          }
          const existWdW = woodObjects.find(w => w.gx === sa.tgx && w.gy === sa.tgy);
          if (existWdW && Math.random() < 0.5) launchKnockedWood(existWdW, sa.tgx, sa.tgy);
          woodObjects.push({ gx: sa.tgx, gy: sa.tgy, frameIdx: Math.floor(Math.random() * 4), ox: sa.landOx, oy: sa.landOy });
          woodSet.add(`${sa.tgx},${sa.tgy}`);
          if (type === 2) trampleGrass(sa.tgx, sa.tgy);
        }
        continue;
      }

      // 命中椰子樹
      if (handlePebbleLandOnCoconutTree(sa.tgx, sa.tgy, sa.shade, true)) continue;

      // 命中地面椰子 → 彈開
      const hitCocIdx = coconuts.findIndex(c => c.gx === sa.tgx && c.gy === sa.tgy);
      if (hitCocIdx !== -1) {
        const startType2 = tileAt(sa.tgx, sa.tgy);
        const startP2 = toScreen(sa.tgx, sa.tgy, startType2);
        const dist2 = 1 + Math.floor(Math.random() * 2);
        const angle2 = Math.random() * Math.PI * 2;
        let bx2 = Math.round(Math.cos(angle2) * dist2) || 1, by2 = Math.round(Math.sin(angle2) * dist2);
        let nx2 = Math.max(0, Math.min(COLS-1, sa.tgx + bx2)), ny2 = Math.max(0, Math.min(ROWS-1, sa.tgy + by2));
        const targetType2 = tileAt(nx2, ny2);
        const targetP2 = toScreen(nx2, ny2, targetType2);
        const sinksInWater2 = (targetType2 === 0 || targetType2 === -1);
        const landOx2 = sinksInWater2 ? 0 : (Math.random()-0.5)*14, landOy2 = sinksInWater2 ? 0 : (Math.random()-0.5)*8;
        secondaryThrows.push({
          startX: startP2.x, startY: startP2.y - 4,
          endX: targetP2.x + landOx2, endY: targetP2.y - 4 + landOy2,
          tgx: nx2, tgy: ny2, landOx: landOx2, landOy: landOy2,
          born: performance.now(), duration: 260 + Math.random() * 80,
          done: false, sinksInWater: sinksInWater2, shade: sa.shade, arcScale: 0.5,
        });
        continue;
      }

      // 命中貝殼
      handlePebbleHitShell(sa.tgx, sa.tgy, true);

      if (type < 1) {
        // 落水：水花 + 嚇魚
        addPebbleSplash(sa.tgx, sa.tgy);
        pebbleScarePosGx = sa.tgx;
        pebbleScarePosGy = sa.tgy;
        pebbleScareUntil = now + 1200;
      } else {
        // 落陸：放回 pebbleObjects，並繼續連鎖打飛檢查
        const newPb = {
          gx: sa.tgx, gy: sa.tgy,
          ox: sa.landOx, oy: sa.landOy,
          shade: sa.shade,
          sRx: 4, sRy: 3, angle: 0
        };
        // 連鎖：若該格已有石頭，有 50% 機率再打飛（能量衰減，機率降低）
        const existing = pebbleObjects.find(p => p.gx === sa.tgx && p.gy === sa.tgy);
        if (existing && Math.random() < 0.5) {
          launchKnockedPebble(existing, sa.tgx, sa.tgy);
        }
        // 連鎖：若該格已有木頭，互打反彈
        const existWd = woodObjects.find(w => w.gx === sa.tgx && w.gy === sa.tgy);
        if (existWd && Math.random() < 0.5) {
          launchKnockedWood(existWd, sa.tgx, sa.tgy);
          launchKnockedPebble(newPb, sa.tgx, sa.tgy);
          continue;
        }
        pebbleObjects.push(newPb);
        pebbleSet.add(`${sa.tgx},${sa.tgy}`);
        if (type === 2) trampleGrass(sa.tgx, sa.tgy);
      }
    }
  }
}

function drawSecondaryThrows(now) {
  for (const sa of secondaryThrows) {
    if (sa.done) continue;
    const elapsed = now - sa.born;
    const t = Math.min(elapsed / sa.duration, 1);
    const lx = sa.startX + (sa.endX - sa.startX) * t;
    const ly = sa.startY + (sa.endY - sa.startY) * t;
    // 弧線比主投擲矮（距離短，弧高也小）
    const arcHeight = (sa.arcScale ?? 1) * (20 + Math.abs(sa.endX - sa.startX) * 0.15);
    const arcY = ly - Math.sin(Math.PI * t) * arcHeight;
    const scale = 0.85 + 0.1 * (1 - Math.sin(Math.PI * t) * 0.5);

    // 木頭二次飛行：旋轉繪製
    if (sa.isWood) {
      if (!woodSprite.complete || WOOD_FRAME_W === 0) continue;
      const fi = sa.woodFrameIdx ?? 0;
      const srcCol = fi % 2, srcRow = Math.floor(fi / 2);
      const dw = WOOD_FRAME_W * 0.5 * scale * 0.26;
      const dh = WOOD_FRAME_H * 0.5 * scale * 0.26;
      const rot = t * Math.PI * 3;
      ctx.save();
      ctx.translate(lx, arcY);
      ctx.rotate(rot);
      ctx.imageSmoothingEnabled = true;
      ctx.drawImage(
        woodSprite,
        srcCol * WOOD_FRAME_W, srcRow * WOOD_FRAME_H, WOOD_FRAME_W, WOOD_FRAME_H,
        -dw / 2, -dh / 2, dw, dh
      );
      ctx.restore();
      continue;
    }

    const g = sa.shade;
    const r = 3 * scale;
    // 陰影
    ctx.save();
    ctx.globalAlpha = 0.20 * (1 - t * 0.3);
    ctx.beginPath();
    ctx.ellipse(lx + 2, arcY + 4, r * 0.9, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();
    ctx.restore();
    // 石頭本體
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(lx, arcY, r, r * 0.67, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
    ctx.fill();
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(lx - r * 0.25, arcY - r * 0.3, r * 0.38, r * 0.28, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fill();
    ctx.restore();
  }
}

// 繪製地圖上的鵝卵石物件
// TODO: getNearbyPebble() 在 drawPebbleObject 中被每個石頭呼叫一次，
//       若石頭數量多時建議改為在 render() 前先快取一次結果，再傳入此函式
function drawPebbleObject(pb) {
  const p = toScreen(pb.gx, pb.gy, tileAt(pb.gx, pb.gy));
  const nearby = getNearbyPebble();
  const isNear = nearby === pb;

  // 套用視覺偏移（ox/oy 為像素偏移，預設 0）
  const ox = pb.ox ?? 0;
  const oy = pb.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  // 鵝卵石本體
  ctx.save();
  ctx.translate(px, py - 4);
  // 陰影（固定在右下方，不隨角度旋轉）
  ctx.beginPath();
  ctx.ellipse(-1.5, 2.5, pb.sRx, pb.sRy * 0.55, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fill();
  // 主體（使用固定角度，不旋轉，避免上下顛倒）
  ctx.beginPath();
  ctx.ellipse(0, 0, pb.sRx, pb.sRy, 0, 0, Math.PI * 2);
  const g = pb.shade;
  ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
  ctx.fill();
  ctx.strokeStyle = '#000000'; // 邊框顏色
  ctx.lineWidth = 0.2;           // 邊框粗細
  ctx.stroke();                // 執行繪製邊框
  // 高光（固定在左上方，模擬光源在左上）
  ctx.beginPath();
  ctx.ellipse(-pb.sRx * 0.25, -pb.sRy * 0.3, pb.sRx * 0.38, pb.sRy * 0.28, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,0.28)`;
  ctx.fill();
  ctx.restore();
}

// 繪製玩家持有鵝卵石時的精靈（覆蓋在玩家上方）
// 實際繪製由 drawPlayer 內部判斷，這裡只是定義旗標
// （精靈圖設定：pebbleHeldSprite，格式同 playerSprite，4×4 欄列）


// ████████████████████████████████████████████████████████████
// § 05b 木頭物件系統
//        狀態：woodObjects, woodSet, playerHoldingWood
//        精靈圖：woodSprite（地圖物件）, woodHeldSprite（持有）
// ████████████████████████████████████████████████████████████
// 地圖上的木頭物件列表：{ gx, gy, frameIdx, ox, oy }
// frameIdx: 0~3，對應 wt.png 的四個朝向（2×2排列）
let woodObjects = [];
let woodSet = new Set(); // 快速查詢 "gx,gy"

// 浮在水面的木頭列表：{ gx, gy, frameIdx, born, phase }
// phase: 'sinking'（落水後隱藏）→ 'rising'（浮出）→ 'floating'（緩慢上下晃動，可拾取）
const floatingWoods = [];
const floatingWoodSet = new Set(); // 快速查詢 "gx,gy"，供 isWalkable O(1)

// 判斷某格與水（淺海/深海）的切比雪夫最短距離
function distToWater(gx, gy) {
  for (let d = 1; d <= 3; d++) {
    for (let dy = -d; dy <= d; dy++) {
      for (let dx = -d; dx <= d; dx++) {
        if (Math.max(Math.abs(dx), Math.abs(dy)) !== d) continue; // 只檢查距離恰好為 d 的格
        const nx = gx + dx, ny = gy + dy;
        if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
        if (MAP[ny][nx] <= 0) return d; // 淺海(0)或深海(-1)
      }
    }
  }
  return 99; // 離水很遠
}

// 建立木頭物件（每張新地圖重新生成）
function buildWoodObjects() {
  woodObjects = [];
  woodSet = new Set();
  // 用種子 XOR 固定偏移避免與其他物件衝突
  const mapSeedNum = (cachedMapSeedNum ^ 0x574F4F44) | 0; // XOR "WOOD"

  // 收集沙地候選格（type=1，距水 ≥2 格，且無其他物件）
  const candidates = [];
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 1) continue;
      const wd = distToWater(gx, gy);
      if (wd !== 2) continue; // 只取離水「剛好2格」的沙地（看起來像剛被海浪打上岸）
      if (pebbleSet.has(`${gx},${gy}`)) continue;
      if (shellObjects.some(s => s.gx === gx && s.gy === gy)) continue;
      if (coconutTreeSet.has(`${gx},${gy}`)) continue;
      // 不生成在地圖邊界相鄰格：至少離地圖邊界 2 格以上
      if (gx < 2 || gy < 2 || gx >= COLS - 2 || gy >= ROWS - 2) continue;
      candidates.push({ gx, gy });
    }
  }
  if (candidates.length === 0) return;

  // 決定本圖生成根數（0~2）
  let h = mapSeedNum | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
  const roll = (Math.abs(h) % 100);
  let count = 0;
  if (roll < 80) count = 0;
  else if (roll < 99) count = 1;
  else count = 2;

  if (count === 0) return;

  // 用種子洗牌後取前 count 個，保持間距 ≥ 4
  let hs = (mapSeedNum * 987654321) | 0;
  const placed = [];
  let attempts = 0;
  while (placed.length < count && attempts < candidates.length * 4) {
    hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
    attempts++;
    const idx = Math.abs(hs) % candidates.length;
    const cell = candidates[idx];
    const key = `${cell.gx},${cell.gy}`;
    if (woodSet.has(key)) continue;
    // 檢查與已放置木頭的距離 ≥ 4
    const tooClose = placed.some(p => Math.abs(p.gx - cell.gx) <= 3 && Math.abs(p.gy - cell.gy) <= 3);
    if (tooClose) continue;
    // 隨機朝向（0~3）
    hs = Math.imul(hs ^ (hs >>> 7), 374761393); hs = hs ^ (hs >>> 16);
    const frameIdx = Math.abs(hs) % 4;
    // 視覺偏移
    hs = Math.imul(hs ^ (hs >>> 11), 2246822519); hs = hs ^ (hs >>> 16);
    const ox = ((Math.abs(hs) % 11) - 5);
    hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
    const oy = ((Math.abs(hs) % 7) - 3);
    woodObjects.push({ gx: cell.gx, gy: cell.gy, frameIdx, ox, oy });
    woodSet.add(key);
    placed.push(cell);
  }
}

// 取得玩家附近（切比雪夫距離1）的木頭（未持任何物品時才可拾取）
function getNearbyWood() {
  if (playerHoldingPebble || playerHoldingWood) return null; // 已持物
  for (const wd of woodObjects) {
    const dx = Math.abs(wd.gx - player.tx);
    const dy = Math.abs(wd.gy - player.ty);
    if (dx <= 1 && dy <= 1) return wd;
  }
  // 也檢查浮木
  return getNearbyFloatingWood();
}

// 拾取木頭（支援普通木頭和浮木）
function pickUpWood(wd) {
  // 先嘗試從浮木列表移除
  const fIdx = floatingWoods.indexOf(wd);
  if (fIdx !== -1) {
    floatingWoods.splice(fIdx, 1);
    floatingWoodSet.delete(`${wd.gx},${wd.gy}`);
    playerHoldingWood = true;
    heldWoodFrameIdx = wd.frameIdx;
    return;
  }
  // 否則從普通木頭列表移除
  const idx = woodObjects.indexOf(wd);
  if (idx !== -1) {
    woodObjects.splice(idx, 1);
    woodSet.delete(`${wd.gx},${wd.gy}`);
    playerHoldingWood = true;
    heldWoodFrameIdx = wd.frameIdx;
  }
}

// 繪製地圖上的木頭物件（使用 wt.png 精靈圖，縮小一半）
function drawWoodObject(wd) {
  if (!woodSprite.complete || WOOD_FRAME_W === 0) return;
  const p = toScreen(wd.gx, wd.gy, tileAt(wd.gx, wd.gy));
  const ox = wd.ox ?? 0;
  const oy = wd.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  // 每格精靈尺寸（地面木頭）
  const dw = WOOD_FRAME_W * 0.13;
  const dh = WOOD_FRAME_H * 0.13;

  // frameIdx 0~3 對應 2×2 排列：(col,row) = (frameIdx%2, Math.floor(frameIdx/2))
  const srcCol = wd.frameIdx % 2;
  const srcRow = Math.floor(wd.frameIdx / 2);

  ctx.save();
  // 陰影：依朝向旋轉橢圓（frame 0/2 橫向=-30°，frame 1/3 縱向=+30°）
  const shadowAngles = [Math.PI/6, -Math.PI/6, -Math.PI/6, Math.PI/6];
  const shadowAngle = shadowAngles[wd.frameIdx] ?? 0;
  ctx.globalAlpha = 0.28;
  ctx.translate(px, py - 0.5);
  ctx.rotate(shadowAngle);
  ctx.beginPath();
  ctx.ellipse(0, 0, dw * 0.30, dh * 0.18, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(80, 40, 10, 0.6)';
  ctx.fill();
  ctx.restore();
  ctx.globalAlpha = 1;
  ctx.imageSmoothingEnabled = true;
  ctx.drawImage(
    woodSprite,
    srcCol * WOOD_FRAME_W, srcRow * WOOD_FRAME_H, WOOD_FRAME_W, WOOD_FRAME_H,
    px - dw / 2, py - dh * 0.75, dw, dh
  );
  ctx.restore();
}

// 持有木頭的視覺資訊
let heldWoodFrameIdx = 0;

// ═══════════════════════════════════════════════════════
// 🌊 浮木系統（木頭落入深海/淺海後浮在水面）
// ═══════════════════════════════════════════════════════
const FLOAT_SINK_DELAY  = 500;  // ms：落水後木頭隱沒的時間
const FLOAT_RISE_DURATION = 700; // ms：浮出水面的動畫時間
const FLOAT_BOB_PERIOD  = 1800; // ms：上下晃動週期
const FLOAT_RIPPLE_INTERVAL = 1800; // ms：浮木漣漪發射間隔（僅淺海格）

// 產生浮木（從木頭落水位置呼叫）
function addFloatingWood(gx, gy, frameIdx) {
  floatingWoods.push({
    gx, gy, frameIdx,
    born: performance.now(),
    phase: 'sinking', // 'sinking' → 'rising' → 'floating'
    lastRipple: 0,    // 上次漣漪時間
  });
  // sinking 期間不阻擋，rising/floating 才加入 Set（在 updateFloatingWoods 處理）
}

// 更新浮木狀態
function updateFloatingWoods(now) {
  for (const fw of floatingWoods) {
    const elapsed = now - fw.born;
    if (fw.phase === 'sinking' && elapsed >= FLOAT_SINK_DELAY) {
      fw.phase = 'rising';
      fw.riseStart = now;
      floatingWoodSet.add(`${fw.gx},${fw.gy}`); // 浮出後開始阻擋
    } else if (fw.phase === 'rising') {
      const riseElapsed = now - fw.riseStart;
      if (riseElapsed >= FLOAT_RISE_DURATION) {
        fw.phase = 'floating';
        fw.floatStart = now;
        fw.lastRipple = now; // 進入漂浮態立刻觸發一次漣漪
      }
    } else if (fw.phase === 'floating') {
      // 週期性漣漪（僅淺海格）
      if (tileAt(fw.gx, fw.gy) === 0 && now - fw.lastRipple >= FLOAT_RIPPLE_INTERVAL) {
        addRipple(fw.gx, fw.gy);
        fw.lastRipple = now;
      }
    }
  }
}

// 繪製浮木（在水面上，帶上下晃動，無陰影）
function drawFloatingWoods(now) {
  if (!woodSprite.complete || WOOD_FRAME_W === 0) return;
  for (const fw of floatingWoods) {
    if (fw.phase === 'sinking') continue; // 落水期間隱藏

    const type = tileAt(fw.gx, fw.gy);
    const p = toScreen(fw.gx, fw.gy, type);

    const dw = WOOD_FRAME_W * 0.11; // 浮木略小（在水面）
    const dh = WOOD_FRAME_H * 0.11;
    const srcCol = fw.frameIdx % 2;
    const srcRow = Math.floor(fw.frameIdx / 2);

    let alpha = 1;
    let bobY = 0;

    if (fw.phase === 'rising') {
      // 浮出水面動畫：從水面下方升起
      const t = Math.min((now - fw.riseStart) / FLOAT_RISE_DURATION, 1);
      const ease = 1 - Math.pow(1 - t, 2); // ease-out
      alpha = ease;
      bobY = (1 - ease) * 2; // 從12px下方升起
    } else {
      // floating：持續上下晃動
      const bobT = (now - fw.floatStart) / FLOAT_BOB_PERIOD;
      bobY = Math.sin(bobT * Math.PI * 2) * 2.5; // ±2.5px 緩慢晃動
    }

    const px = p.x;
    const py = p.y + bobY;

    ctx.save();
    ctx.globalAlpha = alpha;

    // 木頭本體
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(
      woodSprite,
      srcCol * WOOD_FRAME_W, srcRow * WOOD_FRAME_H, WOOD_FRAME_W, WOOD_FRAME_H,
      px - dw / 2, py - dh * 0.75, dw, dh
    );
    ctx.restore();
  }
}

// 取得玩家附近的浮木（切比雪夫距離1，只有 floating 相才可拾取）
function getNearbyFloatingWood() {
  if (playerHoldingPebble || playerHoldingWood) return null;
  for (const fw of floatingWoods) {
    if (fw.phase !== 'floating') continue;
    const dx = Math.abs(fw.gx - player.tx);
    const dy = Math.abs(fw.gy - player.ty);
    if (dx <= 1 && dy <= 1) return fw;
  }
  return null;
}

// 拾取浮木
function pickUpFloatingWood(fw) {
  const idx = floatingWoods.indexOf(fw);
  if (idx !== -1) {
    floatingWoods.splice(idx, 1);
    floatingWoodSet.delete(`${fw.gx},${fw.gy}`);
    playerHoldingWood = true;
    heldWoodFrameIdx = fw.frameIdx;
  }
}

// 繪製切割後的藤蔓（S 型綠色曲線，無分叉，帶陰影）
function drawCutVine(cv) {
  const type = tileAt(cv.gx, cv.gy);
  if (type < 0) return;
  const p = toScreen(cv.gx, cv.gy, type);
  // 用格子座標產生穩定亂數，決定 S 曲線的起訖與彎曲方向
  let h = (cv.gx * 1234577 + cv.gy * 7654321 + cachedMapSeedNum) | 0;
  h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
  // S 曲線：兩端點 + 兩個方向相反的控制點
  const flip = (Math.abs(h) % 2 === 0) ? 1 : -1; // 隨機決定 S 彎曲方向
  h = Math.imul(h ^ (h >>> 7), 374761393); h = h ^ (h >>> 16);
  const baseOx = ((Math.abs(h) % 10) - 5);        // 整體橫向微偏移
  h = Math.imul(h ^ (h >>> 11), 2246822519); h = h ^ (h >>> 16);
  const baseOy = ((Math.abs(h) % 8) - 4);         // 整體縱向微偏移

  // S 型固定幾何（相對於格子中心）
  const sx  = p.x + baseOx - 8,  sy  = p.y + baseOy + 8;   // 起點（左下）
  const ex  = p.x + baseOx + 8,  ey  = p.y + baseOy - 8;   // 終點（右上）
  const cp1x = p.x + baseOx + flip * 14, cp1y = p.y + baseOy + 2;  // 第一控制點（偏一側）
  const cp2x = p.x + baseOx - flip * 14, cp2y = p.y + baseOy - 2;  // 第二控制點（偏另一側）

  ctx.save();
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  // 陰影層（深色，稍偏右下）
  ctx.strokeStyle = 'rgba(10,30,8,0.45)';
  ctx.lineWidth = 2.7;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(sx - 0.3, sy - 0.3);
  ctx.bezierCurveTo(cp1x + 1.5, cp1y + 2, cp2x + 1.5, cp2y + 2, ex + 1.5, ey + 2);
  ctx.stroke();

  // 主藤深色輪廓
  ctx.strokeStyle = '#1e4a1a';
  ctx.lineWidth = 2.7;
  ctx.globalAlpha = 0.70;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ex, ey);
  ctx.stroke();

  // 主藤亮綠
  ctx.strokeStyle = '#3d8c30';
  ctx.lineWidth = 1.8;
  ctx.globalAlpha = 0.97;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ex, ey);
  ctx.stroke();

  // 高光細線（中央偏亮）
  ctx.strokeStyle = 'rgba(140,210,100,0.55)';
  ctx.lineWidth = 0.5;
  ctx.globalAlpha = 1;
  ctx.beginPath();
  ctx.moveTo(sx, sy);
  ctx.bezierCurveTo(cp1x, cp1y, cp2x, cp2y, ex, ey);
  ctx.stroke();

  ctx.restore();
}
