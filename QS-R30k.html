}

function launchFallingCoconut(ct, destGx, destGy) {
  const srcType = tileAt(ct.gx, ct.gy);
  const srcP    = toScreen(ct.gx, ct.gy, srcType);
  const dstType = tileAt(destGx, destGy);
  const dstP    = toScreen(destGx, destGy, dstType);

  // 隨機落地偏移（仿石頭落地效果）
  const landOx = (Math.random() - 0.5) * 14;
  const landOy = (Math.random() - 0.5) * 8;

  fallingCoconuts.push({
    tgx: destGx, tgy: destGy,
    landOx, landOy,
    // 起點：樹幹椰子叢處（大約 groundY - 130 的高度，接近樹上椰子位置）
    startX: srcP.x,
    startY: srcP.y + HH + 20 - 130, // 椰子叢處（比樹冠低約80px）
    endX: dstP.x + landOx,
    endY: dstP.y - 6 + landOy,       // 落地高度（與 drawCoconut 一致）
    born: performance.now(),
    duration: 480 + Math.random() * 120, // 約 0.5 秒落下
    phase: 'falling', // 'falling' | 'bouncing' | 'done'
    bounceV: 0,
    bounceY: 0,       // 反彈高度偏移（正值往上）
    bounceCount: 0,
  });
}

function updateFallingCoconuts(now) {
  for (let i = fallingCoconuts.length - 1; i >= 0; i--) {
    const fc = fallingCoconuts[i];
    const elapsed = now - fc.born;

    if (fc.phase === 'falling') {
      if (elapsed >= fc.duration) {
        // 落地：切換到反彈階段
        fc.phase = 'bouncing';
        fc.bounceV = -4.5 - Math.random() * 1.5; // 反彈初速（像素/幀，往上）
        fc.bounceY = 0;
        fc.born = now; // 重置計時
      }
    } else if (fc.phase === 'bouncing') {
      fc.bounceV += 0.45; // 重力
      fc.bounceY += fc.bounceV;
      if (fc.bounceY >= 0) {
        // 碰到地面：若彈太小就停止
        if (Math.abs(fc.bounceV) < 1.2) {
          fc.bounceY = 0;
          fc.phase = 'done';
          // 把椰子加入靜止列表
          coconuts.push({ gx: fc.tgx, gy: fc.tgy, ox: fc.landOx, oy: fc.landOy, state: 'whole' });
          fallingCoconuts.splice(i, 1);
        } else {
          // 繼續反彈（能量衰減）
          fc.bounceY = 0;
          fc.bounceV *= -0.45;
        }
      }
    }
  }
}

// 繪製單顆落下椰子（供 painter's algorithm 使用）
function drawFallingCoconut(fc, now) {
  const elapsed = now - fc.born;
  let cx, cy;

  if (fc.phase === 'falling') {
    const t = Math.min(elapsed / fc.duration, 1);
    cx = fc.startX + (fc.endX - fc.startX) * t;
    // 自由落下感：用 t^2 讓後段加速
    cy = fc.startY + (fc.endY - fc.startY) * (t * t);
  } else if (fc.phase === 'bouncing') {
    cx = fc.endX;
    cy = fc.endY + fc.bounceY;
  } else {
    return;
  }

  ctx.save();
  ctx.translate(cx, cy);
  ctx.beginPath();
  ctx.ellipse(0, 0, 8, 4, Math.PI * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.28)';
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(0, 0, 7, 6, Math.PI * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = '#6b3d1a';
  ctx.fill();
  ctx.strokeStyle = '#3e2008';
  ctx.lineWidth = 0.8;
  ctx.stroke();
  ctx.beginPath();
  ctx.ellipse(-2, -2, 3, 2, Math.PI * 0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,200,120,0.30)';
  ctx.fill();
  ctx.restore();
}

// 嘗試讓椰子樹掉落椰子（30%機率）
function tryDropCoconut(ct) {
  if (Math.random() >= 0.3) return;

  // 計算此樹附近（切比雪夫距離 2 格）已有的椰子數量（含正在落下中的）
  const nearbyCount = coconuts.filter(c => Math.abs(c.gx - ct.gx) <= 2 && Math.abs(c.gy - ct.gy) <= 2).length
    + fallingCoconuts.filter(c => Math.abs(c.tgx - ct.gx) <= 2 && Math.abs(c.tgy - ct.gy) <= 2).length;
  if (nearbyCount >= 3) return; // 已達上限，不再掉落

  // 找椰子樹相鄰的空格（上下左右+斜角，8方向）
  const dirs = [
    { dx: 1, dy: 0 }, { dx: -1, dy: 0 }, { dx: 0, dy: 1 }, { dx: 0, dy: -1 },
    { dx: 1, dy: 1 }, { dx: -1, dy: 1 }, { dx: 1, dy: -1 }, { dx: -1, dy: -1 }
  ];
  const avail = dirs.filter(d => {
    const nx = ct.gx + d.dx, ny = ct.gy + d.dy;
    if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) return false;
    const t = tileAt(nx, ny);
    if (t < 1) return false; // 不落到水中
    if (coconutTreeSet.has(`${nx},${ny}`)) return false;
    if (coconuts.some(c => c.gx === nx && c.gy === ny)) return false;
    if (fallingCoconuts.some(c => c.tgx === nx && c.tgy === ny)) return false;
    // 避開地面物件：石頭、碎片刀、椰子纖維、籃子、切割藤蔓、肉
    if (pebbleSet.has(`${nx},${ny}`)) return false;
    if (shellShardSet.has(`${nx},${ny}`)) return false;
    if (cottonYarnSet.has(`${nx},${ny}`)) return false;
    if (basketObjects.some(b => b.gx === nx && b.gy === ny)) return false;
    if (cutVineSet.has(`${nx},${ny}`)) return false;
    if (meatSet.has(`${nx},${ny}`)) return false;
    return true;
  });
  if (avail.length === 0) return;
  const d = avail[Math.floor(Math.random() * avail.length)];
  launchFallingCoconut(ct, ct.gx + d.dx, ct.gy + d.dy);
}

// 繪製椰子樹
function drawCoconutTree(ct) {
  const type = tileAt(ct.gx, ct.gy);
  const p = toScreen(ct.gx, ct.gy, type);
  const angle = getTreeShakeAngle(ct);

  const tw = 180, th = 250; // 2.5倍大小

  // 格子頂面底邊的 y 座標（等角磚菱形最低點）
  const groundY = p.y + HH + 20;

  // 陰影（繪製在格子頂面中心，與角色陰影風格一致）
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(p.x, p.y, 22, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // 繪製精靈圖
  // 錨點：樹幹底部對齊格子菱形底邊（groundY），搖晃以底部為旋轉軸
  if (coconutTreeSprite.complete && coconutTreeSprite.naturalWidth > 0) {
    ctx.save();
    ctx.translate(p.x, groundY);
    ctx.rotate(angle);
    ctx.drawImage(coconutTreeSprite, -tw / 2, -th, tw, th);
    ctx.restore();
  } else {
    // Fallback
    ctx.save();
    ctx.translate(p.x, groundY);
    ctx.rotate(angle);
    ctx.fillStyle = '#7a4a1e';
    ctx.fillRect(-5, -th, 10, th);
    ctx.fillStyle = '#2a8a20';
    ctx.beginPath();
    ctx.arc(0, -th + 40, 35, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
}

// 繪製地面椰子（落下後的椰子物件）
function drawCoconut(c) {
  const type = tileAt(c.gx, c.gy);
  const p = toScreen(c.gx, c.gy, type);
  const ox = c.ox ?? 0;
  const oy = c.oy ?? 0;
  const cx = p.x + ox;
  const cy = p.y - 6 + oy;
  const state = c.state ?? 'whole';

  ctx.save();
  ctx.translate(cx, cy);

  if (state === 'whole') {
    // 陰影
    ctx.beginPath();
    ctx.ellipse(-2, 4, 8, 4, Math.PI * 0.15, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.32)';
    ctx.fill();
    // 椰子本體
    ctx.beginPath();
    ctx.ellipse(0, 0, 7, 6, Math.PI * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#6b3d1a';
    ctx.fill();
    ctx.strokeStyle = '#3e2008';
    ctx.lineWidth = 0.8;
    ctx.stroke();
    // 高光
    ctx.beginPath();
    ctx.ellipse(-2, -2, 3, 2, Math.PI * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,200,120,0.30)';
    ctx.fill();

  } else if (state === 'split') {
    // 剖開的椰子（半個，有椰子水）
    // 陰影
    ctx.beginPath();
    ctx.ellipse(-1, 5, 9, 4, Math.PI * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.30)';
    ctx.fill();
    // 外殼（半橢圓，棕色）
    ctx.beginPath();
    ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI); // 下半圓
    ctx.fillStyle = '#6b3d1a';
    ctx.fill();
    ctx.strokeStyle = '#3e2008';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    // 截面（橢圓形開口，白色椰肉邊緣）
    ctx.beginPath();
    ctx.ellipse(0, 0, 9, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#e8d8b8'; // 椰肉色
    ctx.fill();
    ctx.strokeStyle = '#b89878';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // 椰子水（淡藍色，橢圓填充在截面中央）
    ctx.beginPath();
    ctx.ellipse(0, 0, 6.5, 2.2, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(180, 225, 245, 0.82)';
    ctx.fill();
    // 椰子水水面反光
    ctx.beginPath();
    ctx.ellipse(-1.5, -0.5, 2.5, 0.8, -0.2, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.fill();

  } else if (state === 'eaten') {
    // 椰子水已喝完（空殼，白色椰肉）
    // 陰影
    ctx.beginPath();
    ctx.ellipse(-1, 5, 9, 4, Math.PI * 0.1, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.28)';
    ctx.fill();
    // 外殼
    ctx.beginPath();
    ctx.ellipse(0, 0, 9, 7, 0, 0, Math.PI);
    ctx.fillStyle = '#6b3d1a';
    ctx.fill();
    ctx.strokeStyle = '#3e2008';
    ctx.lineWidth = 0.9;
    ctx.stroke();
    // 截面（白色椰肉）
    ctx.beginPath();
    ctx.ellipse(0, 0, 9, 3.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#f5f0e8'; // 白色椰肉
    ctx.fill();
    ctx.strokeStyle = '#c8b898';
    ctx.lineWidth = 0.7;
    ctx.stroke();
    // 椰肉紋理（細線條）
    for (let ri = -2; ri <= 2; ri++) {
      ctx.beginPath();
      ctx.moveTo(ri * 2.5, -2.0);
      ctx.lineTo(ri * 2.5 + 0.3, 2.0);
      ctx.strokeStyle = 'rgba(180,160,130,0.28)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
    }
  }

  ctx.restore();

  // 煙霧特效（劈開進行中）
  drawCoconutSmokesAt(c.gx, c.gy, cx, cy);
}

function drawCoconutTreesAndCoconuts() {
  // 依等角順序排序
  const sorted = coconutTrees.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
  for (const ct of sorted) drawCoconutTree(ct);
  const sortedC = coconuts.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
  for (const c of sortedC) drawCoconut(c);
}

// 取得玩家鄰近（切比雪夫距離 1）的掉落椰子
// 優先回傳可互動的椰子：whole > split > eaten，eaten 僅在持刀時可加工
function getNearbyCoconut() {
  let bestWhole = null, bestSplit = null, bestEaten = null;
  for (const c of coconuts) {
    const dx = Math.abs(c.gx - player.tx);
    const dy = Math.abs(c.gy - player.ty);
    if (dx > 1 || dy > 1) continue;
    const state = c.state ?? 'whole';
    if (state === 'whole' && !bestWhole) bestWhole = c;
    else if (state === 'split' && !bestSplit) bestSplit = c;
    else if (state === 'eaten' && !bestEaten) bestEaten = c;
  }
  // 優先剖開整顆，其次喝椰子水，再次（持刀時）加工空殼
  return bestWhole ?? bestSplit ?? bestEaten ?? null;
}

// 玩家用刀與椰子互動
// whole → 開始煙霧，1秒後→ split；split → eaten
// 刀使用一次後損壞，playerEquippedKnife 歸 false，容量歸 0
// 回傳 true 表示有互動發生
let coconutCuttingTimer = null; // { coconut, timer }

function tryInteractCoconut() {
  const c = getNearbyCoconut();
  if (!c) return false;

  // 確保 state 有預設值（舊物件可能缺少 state 欄位）
  if (!c.state) c.state = 'whole';

  if (c.state === 'whole') {
    // 劈開整顆椰子需要刀
    if (!playerEquippedKnife) return false;
    // 投擲動畫進行中或錨點煙霧 pending 期間，禁止消耗刀剖椰子
    // （避免投石後誤觸椰子導致刀提前損毀/ipomoaBlockSet被清空）
    if ((throwAnim && !throwAnim.done) || anchorPending) return false;
    // 防止重複觸發（正在劈開中）
    if (coconutCuttingTimer && coconutCuttingTimer.coconut === c) return true;
    addCoconutSmoke(c.gx, c.gy);
    // 1 秒後變成 split，同時刀子損壞
    const timer = setTimeout(() => {
      c.state = 'split';
      coconutCuttingTimer = null;
      // 消耗一把刀（多刀時只扣一把）
      playerCarryCount = Math.max(0, playerCarryCount - 1);
      const ki1 = playerInventoryItems.lastIndexOf('knife');
      if (ki1 !== -1) playerInventoryItems.splice(ki1, 1);
      playerEquippedKnife = (playerCarryCount > 0);
      updateInventoryHUD();
      rebuildIpomoaBlockSet(); // 刀數量變化後重建阻擋
    }, 1000);
    coconutCuttingTimer = { coconut: c, timer };
    return true;
  }

  if (c.state === 'split') {
    // 喝椰子水：不需要刀，直接互動，口渴度 +3
    c.state = 'eaten';
    drinkCoconutWater();
    return true;
  }

  if (c.state === 'eaten') {
    // 加工空殼→椰子纖維：需要持刀，且消耗一把刀
    if (!playerEquippedKnife) return false;
    if ((throwAnim && !throwAnim.done) || anchorPending) return false;
    if (coconutCuttingTimer && coconutCuttingTimer.coconut === c) return true; // 加工中
    addCoconutSmoke(c.gx, c.gy);
    const cGx = c.gx, cGy = c.gy;
    const timer = setTimeout(() => {
      // 移除椰子空殼
      const idx = coconuts.indexOf(c);
      if (idx !== -1) coconuts.splice(idx, 1);
      coconutCuttingTimer = null;
      // 消耗一把刀
      playerCarryCount = Math.max(0, playerCarryCount - 1);
      const ki2 = playerInventoryItems.lastIndexOf('knife');
      if (ki2 !== -1) playerInventoryItems.splice(ki2, 1);
      playerEquippedKnife = (playerCarryCount > 0);
      updateInventoryHUD();
      rebuildIpomoaBlockSet();
      // 生成椰子纖維物件（放置在原椰子格子）
      if (!cottonYarnSet.has(`${cGx},${cGy}`)) {
        cottonYarnObjects.push({ gx: cGx, gy: cGy });
        cottonYarnSet.add(`${cGx},${cGy}`);
      }
      refreshInventoryBlockedState();
    }, 1000);
    coconutCuttingTimer = { coconut: c, timer };
    return true;
  }

  return false;
}

// tryInteractIpomoea 已移除（馬鞍藤系統已刪除）
function tryInteractIpomoea() { return false; }

// 取得玩家附近（切比雪夫距離 1）可撿拾的切割藤蔓
// 需要有背包格子
function getNearbyVine() {
  if (!playerHasBackpack) return null;
  if (playerCarryCount >= playerCarryCapacity) return null;
  for (const cv of cutVines) {
    if (Math.abs(cv.gx - player.tx) <= 1 && Math.abs(cv.gy - player.ty) <= 1) return cv;
  }
  return null;
}

// 拾取切割藤蔓
function pickUpCutVine(cv) {
  const idx = cutVines.indexOf(cv);
  if (idx !== -1) {
    cutVines.splice(idx, 1);
    // 從 cutVineSet 移除（解除阻擋），並加入 consumedVineSet（防止馬鞍藤重繪）
    const key = `${cv.gx},${cv.gy}`;
    cutVineSet.delete(key);
    consumedVineSet.add(key);
    playerCarryCount++;
    playerInventoryItems.push('vine');
    updateInventoryHUD();
  }
}

// ── 椰子樹投石邏輯（插入 updateThrowAnim 落地判斷後） ──
// 由 handlePebbleLandOnCoconutTree 呼叫
function handlePebbleLandOnCoconutTree(tgx, tgy, throwedPebbleShade, isSecondary) {
  // 找是否命中椰子樹（同格）
  const ct = coconutTrees.find(c => c.gx === tgx && c.gy === tgy);
  if (!ct) return false;

  // 搖晃椰子樹
  shakeCoconutTree(ct, 900);

  // 20%機率掉落椰子
  tryDropCoconut(ct);

  // 石頭彈走 5~8 格（launchBounced 風格：比 knockedPebble 更遠）
  // 修正：避免因角度接近軸向時 Math.round 使某個分量為 0，導致實際彈飛距離不足
  const dist = 5 + Math.floor(Math.random() * 4); // 5~8
  const angle = Math.random() * Math.PI * 2;
  let ax = Math.round(Math.cos(angle) * dist);
  let ay = Math.round(Math.sin(angle) * dist);
  // 保證切比雪夫距離至少 MIN_BOUNCE 格
  const MIN_BOUNCE = 3;
  const abx = Math.abs(ax), aby = Math.abs(ay);
  if (abx < MIN_BOUNCE && aby < MIN_BOUNCE) {
    if (abx >= aby) { ax = ax >= 0 ? dist : -dist; }
    else            { ay = ay >= 0 ? dist : -dist; }
  } else if (abx < MIN_BOUNCE && abx < aby) {
    ax = ax >= 0 ? MIN_BOUNCE : -MIN_BOUNCE;
  } else if (aby < MIN_BOUNCE && aby < abx) {
    ay = ay >= 0 ? MIN_BOUNCE : -MIN_BOUNCE;
  }
  let nx = tgx + ax, ny = tgy + ay;
  nx = Math.max(0, Math.min(COLS - 1, nx));
  ny = Math.max(0, Math.min(ROWS - 1, ny));

  // 建立彈走動畫（複用 secondaryThrows 機制，但距離更遠、弧更高）
  const startType2 = tileAt(tgx, tgy);
  const startP2 = toScreen(tgx, tgy, startType2);
  const targetType2 = tileAt(nx, ny);
  const targetP2 = toScreen(nx, ny, targetType2);
  const sinksInWater2 = (targetType2 === 0 || targetType2 === -1);
  const landOx2 = sinksInWater2 ? 0 : (Math.random() - 0.5) * 14;
  const landOy2 = sinksInWater2 ? 0 : (Math.random() - 0.5) * 8;
  secondaryThrows.push({
    startX: startP2.x, startY: startP2.y + HH + 20 - 130, // 從樹冠（椰子叢）高度彈出
    endX: targetP2.x + landOx2, endY: targetP2.y - 4 + landOy2,
    tgx: nx, tgy: ny, landOx: landOx2, landOy: landOy2,
    born: performance.now(),
    duration: 480 + Math.random() * 120,
    done: false,
    sinksInWater: sinksInWater2,
    shade: throwedPebbleShade,
    arcScale: 2.2, // 彈走弧線比一般高
  });

  return true; // 已命中椰子樹
}


// ████████████████████████████████████████████████████████████
// § 14  海鷗系統
//        狀態：seagull, seagullSpawnTimer, lastSeagullTick
// ████████████████████████████████████████████████████████████
// ═══════════════════════════════════════════════════════
// 🦅 海鷗系統
// ═══════════════════════════════════════════════════════
let seagull = null; // 同時只有一隻
let seagullSpawnTimer = 0; // 距下次生成的倒計時 ms
const SEAGULL_SPAWN_DELAY = 30000; // 無鷗時30秒後生成

// 海鷗狀態：'flying_in' | 'circling' | 'landing' | 'perching' | 'taking_off' | 'flying_out' | 'dead'
// 高空飛行時用浮點格座標（可超出地圖），降落後對齊格子

// 找一格沙地格（供降落用）
function findSandTileForLanding() {
  const sandTiles = [];
  for (let gy = 2; gy < ROWS - 2; gy++) {
    for (let gx = 2; gx < COLS - 2; gx++) {
      if (MAP[gy][gx] !== 1) continue;
      if (pebbleSet.has(`${gx},${gy}`) || shellShardSet.has(`${gx},${gy}`)) continue;
      // 確保鄰近2格範圍內（5x5區域）全部都是沙地（MAP===1），避免海鷗落在沙地邊緣
      let allSand = true;
      outer: for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (tileAt(gx + dx, gy + dy) !== 1) { allSand = false; break outer; }
        }
      }
      if (!allSand) continue;
      // 不選玩家 6 格內的格子，避免降落後立刻被嚇跑
      if (Math.abs(gx - player.tx) <= 6 && Math.abs(gy - player.ty) <= 6) continue;
      sandTiles.push({ gx, gy });
    }
  }
  if (sandTiles.length === 0) {
    // 後備：放寬條件，只確保直接鄰格（1格）是沙地
    for (let gy = 2; gy < ROWS - 2; gy++) {
      for (let gx = 2; gx < COLS - 2; gx++) {
        if (MAP[gy][gx] !== 1) continue;
        if (pebbleSet.has(`${gx},${gy}`) || shellShardSet.has(`${gx},${gy}`)) continue;
        const neighbors = [
          tileAt(gx-1,gy), tileAt(gx+1,gy), tileAt(gx,gy-1), tileAt(gx,gy+1),
          tileAt(gx-1,gy-1), tileAt(gx+1,gy-1), tileAt(gx-1,gy+1), tileAt(gx+1,gy+1)
        ];
        if (neighbors.some(n => n !== 1)) continue;
        sandTiles.push({ gx, gy });
      }
    }
  }
  if (sandTiles.length === 0) return null;
  return sandTiles[Math.floor(Math.random() * sandTiles.length)];
}

function spawnSeagull() {
  const target = findSandTileForLanding();
  if (!target) return;

  // 盤旋圓心：格子中央
  const circleCenterGx = target.gx + 0.5;
  const circleCenterGy = target.gy + 0.5;
  const circleRadius = 2.0 + Math.random() * 2.5;
  const circleTime   = 4000 + Math.random() * 4000;

  // 降落目標：格子正中央（不加隨機偏移，確保命中判定與視覺一致）
  const landGx = target.gx + 0.5;
  const landGy = target.gy + 0.5;

  // 從地圖四邊隨機一邊飛入
  const side = Math.floor(Math.random() * 4);
  let startGx, startGy;
  if (side === 0)      { startGx = Math.random() * COLS; startGy = -3; }
  else if (side === 1) { startGx = Math.random() * COLS; startGy = ROWS + 3; }
  else if (side === 2) { startGx = -3;       startGy = Math.random() * ROWS; }
  else                 { startGx = COLS + 3; startGy = Math.random() * ROWS; }

  // 在生成時就固定好圓周切入點（從出發點往圓心方向，與等角橢圓的交點）
  // 這樣 flying_in 每幀飛向同一個固定點，不會因位置變化而抖動
  const toCx = circleCenterGx - startGx;
  const toCy = circleCenterGy - startGy;
  const entryAngle = Math.atan2(toCy / 0.55, toCx);
  const entryGx = circleCenterGx + Math.cos(entryAngle) * circleRadius;
  const entryGy = circleCenterGy + Math.sin(entryAngle) * circleRadius * 0.55;

  // 起始飛行角度：從出發點指向切入點
  const initAngle = Math.atan2(entryGy - startGy, entryGx - startGx);

  seagull = {
    gx: startGx, gy: startGy,
    altitude: 1.0,
    state: 'flying_in',
    landGx, landGy,
    born: performance.now(),
    wingPhase: Math.random() * Math.PI * 2,
    flightAngle: initAngle,   // 立刻設好，避免第一幀頭朝向錯誤
    feathers: [],
    entryGx, entryGy,         // 固定切入點，flying_in 直接飛向此處
    entryAngle,               // 切入時的 circleAngle
    circleAngle: 0,           // 切換到 circling 時才對齊
    circleRadius,
    circleCenterGx, circleCenterGy,
    circleTime,
    circleStart: 0,
    landProgress: 0,
    scaredSpeed: false,
    landFacingRight: true,    // 落地時的朝向，perching 期間保持不變
  };
}

// 地面肉物件列表

// ████████████████████████████████████████████████████████████
// § 15  肉物件系統（海鷗掉落）
//        狀態：meatObjects, meatSet
// ████████████████████████████████████████████████████████████
let meatObjects = []; // { gx, gy, ox, oy }
let meatSet = new Set(); // 快速查詢用 Set（key = "gx,gy"），供 isWalkable O(1) 查詢

function spawnMeat(gx, gy) {
  const m = {
    gx, gy,
    ox: (Math.random() - 0.5) * 10,
    oy: (Math.random() - 0.5) * 6,
  };
  meatObjects.push(m);
  meatSet.add(`${gx},${gy}`);
}

function getNearbyMeat() {
  for (const m of meatObjects) {
    if (Math.abs(m.gx - player.tx) <= 1 && Math.abs(m.gy - player.ty) <= 1) return m;
  }
  return null;
}

function eatMeat(m) {
  const idx = meatObjects.indexOf(m);
  if (idx === -1) return;
  // 先播煙霧效果（標記 isMeat，供 drawMeatSmokes 獨立繪製）
  addCoconutSmoke(m.gx, m.gy);
  // 取得剛推入的最後一個煙霧物件並標記
  if (coconutSmokes.length > 0) coconutSmokes[coconutSmokes.length - 1].isMeat = true;
  // 延遲後移除肉並補充飢餓度（配合煙霧動畫）
  setTimeout(() => {
    const i2 = meatObjects.indexOf(m);
    if (i2 !== -1) {
      meatSet.delete(`${m.gx},${m.gy}`);
      meatObjects.splice(i2, 1);
      playerHunger = Math.min(HUNGER_MAX, playerHunger + 5);
    }
  }, 350);
}

// 切換到 taking_off 狀態時立刻設好逃離目標與飛行角度，避免第一幀頭朝反向
function startTakingOff(sg, scared) {
  const side = Math.floor(Math.random() * 4);
  if (side === 0)      { sg.exitGx = Math.random() * COLS; sg.exitGy = -8; }
  else if (side === 1) { sg.exitGx = Math.random() * COLS; sg.exitGy = ROWS + 8; }
  else if (side === 2) { sg.exitGx = -8;       sg.exitGy = Math.random() * ROWS; }
  else                 { sg.exitGx = COLS + 8; sg.exitGy = Math.random() * ROWS; }
  sg.flightAngle = Math.atan2(sg.exitGy - sg.gy, sg.exitGx - sg.gx);
  sg.state = 'taking_off';
  sg.scaredSpeed = !!scared;
}

function updateSeagull(now) {
  if (!seagull) return;

  const sg = seagull;
  sg.wingPhase += 0.12;

  if (sg.state === 'flying_in') {
    // 飛向生成時就固定好的圓周切入點（entryGx/Gy），直線前進不抖動
    const speed = 0.055;
    const ex = sg.entryGx - sg.gx;
    const ey = sg.entryGy - sg.gy;
    const distToEntry = Math.sqrt(ex * ex + ey * ey);

    sg.flightAngle = Math.atan2(ey, ex);

    if (distToEntry <= speed * 1.5) {
      // 已到達切入點：精確放置到圓上，直接使用預算好的 entryAngle
      sg.gx = sg.entryGx;
      sg.gy = sg.entryGy;
      sg.circleAngle = sg.entryAngle;
      // 等角橢圓（y軸壓縮0.55）的切線方向：dgx/da = -sin(a), dgy/da = cos(a)*0.55
      sg.flightAngle = Math.atan2(Math.cos(sg.circleAngle) * 0.55, -Math.sin(sg.circleAngle));
      sg.state = 'circling';
      sg.circleStart = now;
    } else {
      sg.gx += (ex / distToEntry) * speed;
      sg.gy += (ey / distToEntry) * speed;
    }
    sg.altitude = 1.0;

  } else if (sg.state === 'circling') {
    // 在降落點正上方繞圈，計時結束後降落
    const elapsed = now - sg.circleStart;
    const angSpeed = 0.022;
    sg.circleAngle += angSpeed;
    sg.gx = sg.circleCenterGx + Math.cos(sg.circleAngle) * sg.circleRadius;
    sg.gy = sg.circleCenterGy + Math.sin(sg.circleAngle) * sg.circleRadius * 0.55;
    // 等角橢圓（y軸壓縮0.55）切線方向：dgx/da = -sin(a), dgy/da = cos(a)*0.55
    sg.flightAngle = Math.atan2(Math.cos(sg.circleAngle) * 0.55, -Math.sin(sg.circleAngle));
    sg.altitude = 1.0;

    if (elapsed >= sg.circleTime) {
      // 盤旋結束：gx/gy 已在圓上（本幀剛算好），直接切換到 landing
      // 記錄出發點；以當前 dist 反算起始 altitude，確保高度連續不跳躍
      sg.landStartGx = sg.gx;
      sg.landStartGy = sg.gy;
      // 記錄切換瞬間到降落點的距離，作為 altitude 插值的基準
      const initDist = Math.sqrt((sg.landGx-sg.gx)**2 + (sg.landGy-sg.gy)**2);
      sg.landAltBaseDist = Math.max(initDist, 0.01); // 避免除以零
      sg.state = 'landing';
      sg.landProgress = 0;
      // altitude 維持 1.0（連續），由 landing 邏輯用 landAltBaseDist 平滑降低
    }

  } else if (sg.state === 'landing') {
    // 從盤旋位置往目標格平滑飛降
    const dx = sg.landGx - sg.gx;
    const dy = sg.landGy - sg.gy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const speed = 0.038;
    // 用目標方向與當前 flightAngle 做角度插值，避免切換第一幀頭部突然翻轉
    const targetAngle = Math.atan2(dy, dx);
    let da = targetAngle - sg.flightAngle;
    // 保持角度差在 [-PI, PI] 範圍內
    while (da > Math.PI) da -= 2 * Math.PI;
    while (da < -Math.PI) da += 2 * Math.PI;
    sg.flightAngle += da * 0.12; // 平滑跟隨，不急轉
    if (dist < 0.12) {
      sg.gx = sg.landGx;
      sg.gy = sg.landGy;
      sg.altitude = 0;
      sg.landFacingRight = (sg.landGx >= sg.landStartGx); // 用降落起點→終點方向決定朝向，不受角度插值誤差影響
      sg.state = 'perching';
      sg.perchStart = now;
    } else {
      sg.gx += (dx / dist) * speed;
      sg.gy += (dy / dist) * speed;
      // 用相對於切換瞬間距離插值，確保從 1.0 平滑降到 0，不跳躍
      sg.altitude = Math.max(0, Math.min(1.0, dist / sg.landAltBaseDist));
    }

  } else if (sg.state === 'perching') {
    sg.altitude = 0;
    const pdx = sg.gx - player.tx;
    const pdy = sg.gy - player.ty;
    const playerDist = Math.sqrt(pdx * pdx + pdy * pdy);
    if (playerDist < 5.0) {
      startTakingOff(sg, true);
    } else if (now - sg.perchStart >= 10000) {
      startTakingOff(sg, false);
    }

  } else if (sg.state === 'taking_off') {
    // exitGx/Gy 與 flightAngle 已在 startTakingOff 或本幀首次進入時設好
    if (sg.exitGx === null || sg.exitGx === undefined) {
      // 後備：理應不會到這裡，但保留安全路徑
      startTakingOff(sg, sg.scaredSpeed);
    }
    sg.altitude = Math.min(1.0, sg.altitude + 0.025);
    const dx = sg.exitGx - sg.gx;
    const dy = sg.exitGy - sg.gy;
    const dist = Math.sqrt(dx * dx + dy * dy);
    // 用角度插值平滑追蹤目標方向，避免起飛瞬間頭部突然翻轉
    const targetAngle = Math.atan2(dy, dx);
    let daTakeoff = targetAngle - sg.flightAngle;
    while (daTakeoff > Math.PI) daTakeoff -= 2 * Math.PI;
    while (daTakeoff < -Math.PI) daTakeoff += 2 * Math.PI;
    sg.flightAngle += daTakeoff * (sg.scaredSpeed ? 0.35 : 0.18);
    const speed = sg.scaredSpeed ? 0.18 : 0.06;
    sg.gx += (dx / dist) * speed;
    sg.gy += (dy / dist) * speed;
    if (sg.gx < -8 || sg.gx > COLS + 8 || sg.gy < -8 || sg.gy > ROWS + 8) {
      seagull = null;
    }

  } else if (sg.state === 'dead') {
    // 更新羽毛粒子
    for (let i = sg.feathers.length - 1; i >= 0; i--) {
      const f = sg.feathers[i];
      f.x += f.vx;
      f.y += f.vy;
      f.vy += 0.15;
      f.vx *= 0.97;
      f.rotation += f.spin;
      f.life -= 1;
      if (f.life <= 0) sg.feathers.splice(i, 1);
    }
    if (sg.feathers.length === 0 && now - sg.deathTime > 400) {
      seagull = null;
    }
  }
}

function drawSeagullAt(sg, now) {
  if (!sg || sg.state === 'dead') {
    // 繪製羽毛
    if (sg && sg.state === 'dead') {
      for (const f of sg.feathers) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, f.w, f.h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    }
    return;
  }

  // 高空高度偏移（altitude=1時上移約80px）
  const altOffset = sg.altitude * 75;

  // 計算螢幕位置
  const type = 1; // 用沙地高度作基準
  const p = toScreen(sg.gx, sg.gy, type);
  const sx = p.x;
  const sy = p.y - altOffset;

  // 縮放：高空時稍大（透視感），但降落後保持固定大小不突變
  // perching/taking_off 狀態固定用落地大小
  let scale;
  if (sg.state === 'perching') {
    scale = 0.55;
  } else {
    // 所有飛行狀態（flying_in, circling, landing, taking_off）統一用 altitude 插值
    // altitude=1.0 → scale=0.85，altitude=0 → scale=0.55，線性過渡
    scale = 0.55 + sg.altitude * 0.30;
  }
  const wingAmp = sg.state === 'perching' ? 0 : (0.3 + sg.altitude * 0.2);
  const wingAngle = Math.sin(sg.wingPhase) * wingAmp;

  ctx.save();
  ctx.translate(sx, sy);
  ctx.scale(scale, scale);

  // 飛行方向決定是否水平翻轉
  // perching 狀態用落地時記錄的朝向，其餘用 flightAngle
  // 等角投影下螢幕水平方向 = cos(angle) - sin(angle)，需同時考慮 gx 與 gy 分量
  const facingRight = (sg.state === 'perching')
    ? (sg.landFacingRight !== undefined ? sg.landFacingRight : true)
    : (Math.cos(sg.flightAngle) - Math.sin(sg.flightAngle) >= 0);
  if (!facingRight) ctx.scale(-1, 1);

  // 陰影（僅落地時）
  if (sg.altitude < 0.3) {
    ctx.save();
    ctx.globalAlpha = 0.18 * (1 - sg.altitude / 0.3);
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.ellipse(0, 22, 16, 5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }

  if (sg.state === 'perching') {
    // 站立狀態：緊湊的鳥形
    // 身體
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.ellipse(0, 0, 12, 8, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c8c8c8';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 頭
    ctx.fillStyle = '#f5f5f5';
    ctx.beginPath();
    ctx.ellipse(12, -6, 7, 6, -0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#c8c8c8';
    ctx.lineWidth = 0.8;
    ctx.stroke();

    // 橙色嘴
    ctx.fillStyle = '#e8820a';
    ctx.beginPath();
    ctx.moveTo(18, -5);
    ctx.lineTo(26, -4);
    ctx.lineTo(18, -2);
    ctx.closePath();
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(14, -7, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // 翅膀（白色主體，僅尖端有黑）
    ctx.fillStyle = '#f8f8f8';
    ctx.beginPath();
    ctx.ellipse(2, 4, 11, 5, 0.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#d0d0d0';
    ctx.lineWidth = 0.6;
    ctx.stroke();
    // 翅膀尖端（僅小塊黑）
    ctx.fillStyle = '#222222';
    ctx.beginPath();
    ctx.ellipse(-6, 7, 4, 2, 0.5, 0, Math.PI * 2);
    ctx.fill();

    // 腳
    ctx.strokeStyle = '#e8820a';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(-2, 7); ctx.lineTo(-4, 16); ctx.moveTo(-4, 16); ctx.lineTo(-8, 18);
    ctx.moveTo(-4, 16); ctx.lineTo(-1, 19);
    ctx.moveTo(4, 7); ctx.lineTo(2, 16); ctx.moveTo(2, 16); ctx.lineTo(-2, 18);
    ctx.moveTo(2, 16); ctx.lineTo(5, 19);
    ctx.stroke();

  } else {
    // 飛行狀態
    // 左翅（下方）
    ctx.save();
    ctx.rotate(-wingAngle);
    ctx.fillStyle = '#e8e8e8';
    ctx.beginPath();
    ctx.moveTo(-2, 0);
    ctx.bezierCurveTo(-8, -4, -28, 2, -30, 8);
    ctx.bezierCurveTo(-20, 4, -6, 2, -2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    // 翅膀尖深色
    ctx.fillStyle = '#505050';
    ctx.beginPath();
    ctx.moveTo(-24, 6);
    ctx.bezierCurveTo(-28, 5, -32, 10, -30, 8);
    ctx.bezierCurveTo(-28, 7, -26, 7, -24, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // 右翅（上方）
    ctx.save();
    ctx.rotate(wingAngle);
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(2, 0);
    ctx.bezierCurveTo(8, -4, 28, 2, 30, 8);
    ctx.bezierCurveTo(20, 4, 6, 2, 2, 0);
    ctx.closePath();
    ctx.fill();
    ctx.strokeStyle = '#aaa';
    ctx.lineWidth = 0.5;
    ctx.stroke();
    ctx.fillStyle = '#505050';
    ctx.beginPath();
    ctx.moveTo(24, 6);
    ctx.bezierCurveTo(28, 5, 32, 10, 30, 8);
    ctx.bezierCurveTo(28, 7, 26, 7, 24, 6);
    ctx.closePath();
    ctx.fill();
    ctx.restore();

    // 身體
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.ellipse(0, 2, 10, 5, 0, 0, Math.PI * 2);
    ctx.fill();

    // 頭
    ctx.fillStyle = '#f5f5f5';
    ctx.beginPath();
    ctx.ellipse(10, -2, 6, 5, -0.2, 0, Math.PI * 2);
    ctx.fill();

    // 嘴
    ctx.fillStyle = '#e8820a';
    ctx.beginPath();
    ctx.moveTo(15, -1);
    ctx.lineTo(22, 0);
    ctx.lineTo(15, 2);
    ctx.closePath();
    ctx.fill();

    // 眼睛
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(12, -3, 1.2, 0, Math.PI * 2);
    ctx.fill();

    // 尾羽
    ctx.fillStyle = '#d8d8d8';
    ctx.beginPath();
    ctx.moveTo(-8, 3);
    ctx.lineTo(-18, 6);
    ctx.lineTo(-16, 2);
    ctx.lineTo(-8, 1);
    ctx.closePath();
    ctx.fill();
  }

  ctx.restore();
}

// 死亡特效：噴出羽毛
function killSeagull(sg) {
  if (sg.state === 'dead') return;
  const type = sg.altitude < 0.1 ? 1 : 1;
  const p = toScreen(sg.gx, sg.gy, type);
  const altOffset = sg.altitude * 75;
  const cx = p.x;
  const cy = p.y - altOffset;

  sg.state = 'dead';
  sg.deathTime = performance.now();
  sg.feathers = [];

  // 噴出 5~10 根羽毛
  const count = 5 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.6 + Math.random() * 1.4; // 速度縮小，範圍集中在 1~2 格附近
    const colors = ['#f0f0f0', '#e8e8e8', '#d0d0d0', '#c8c8c8', '#a0a0a0'];
    sg.feathers.push({
      x: cx + (Math.random() - 0.5) * 6,
      y: cy + (Math.random() - 0.5) * 4,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed * 0.5 - 0.8,
      rotation: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 0.25,
      w: 4 + Math.random() * 2,
      h: 1.5 + Math.random() * 0.5,
      life: 20 + Math.random() * 10,
      maxLife: 55,
      color: colors[Math.floor(Math.random() * colors.length)],
    });
  }

  // 肉落在降落格（若還在高空就落在目前格附近的沙地）
  let meatGx = Math.round(sg.gx), meatGy = Math.round(sg.gy);
  meatGx = Math.max(0, Math.min(COLS - 1, meatGx));
  meatGy = Math.max(0, Math.min(ROWS - 1, meatGy));
  if (tileAt(meatGx, meatGy) < 1) {
    // 找鄰近陸地格
    const dirs = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1}];
    for (const {dx, dy} of dirs) {
      if (tileAt(meatGx + dx, meatGy + dy) >= 1) {
        meatGx += dx; meatGy += dy; break;
      }
    }
  }
  spawnMeat(meatGx, meatGy);
}

// 嘗試讓投出的石頭打中海鷗（20% 命中率）
// 回傳 true 表示命中
function tryHitSeagullWithPebble(tgx, tgy) {
  if (!seagull) return false;
  if (seagull.state === 'dead') return false;
  // 只有海鷗已降落（perching）才能被石頭影響
  if (seagull.state !== 'perching') return false;
  const dx = Math.abs(seagull.gx - tgx);
  const dy = Math.abs(seagull.gy - tgy);
  // 剛好命中降落格（≤0.5格）：有20%機率殺死，否則嚇跑
  if (dx < 0.6 && dy < 0.6) {
    if (Math.random() < 0.2) {
      killSeagull(seagull);
      return true; // 已殺死，呼叫端跳過後續嚇跑邏輯
    } else {
      startTakingOff(seagull, true); // 命中格但未殺死 → 嚇跑
      return false;
    }
  }
  // 1~4 格內：嚇跑但不殺死
  if (dx <= 4 && dy <= 4) {
    startTakingOff(seagull, true);
  }
  return false;
}

// 繪製地面肉物件（縮小至原本 1/2）
function drawMeatObject(m) {
  const type = tileAt(m.gx, m.gy);
  const p = toScreen(m.gx, m.gy, type);
  const mx = p.x + (m.ox ?? 0);
  const my = p.y + (m.oy ?? 0);

  ctx.save();
  ctx.translate(mx, my - 5);
  ctx.scale(0.5, 0.5); // 縮小至 1/2

  // 陰影
  ctx.globalAlpha = 0.22;
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.ellipse(0, 8, 10, 3.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.globalAlpha = 1;

  // 骨柄
  ctx.rotate(-0.5);
  ctx.fillStyle = '#e8d5b0';
  ctx.beginPath();
  ctx.roundRect(-2.5, 0, 5, 9, 2);
  ctx.fill();
  ctx.strokeStyle = '#b8a070';
  ctx.lineWidth = 0.7;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(2, 9, 3, 0, Math.PI * 2);
  ctx.fillStyle = '#e8d5b0';
  ctx.fill();
  ctx.strokeStyle = '#b8a070';
  ctx.lineWidth = 0.7;
  ctx.stroke();
  ctx.beginPath();
  ctx.arc(-3, 8, 2.5, 0, Math.PI * 2);
  ctx.fillStyle = '#e8d5b0';
  ctx.fill();
  ctx.stroke();

  // 肉塊
  ctx.fillStyle = '#c8622a';
  ctx.beginPath();
  ctx.ellipse(0, -7, 9, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#8a3a10';
  ctx.lineWidth = 0.9;
  ctx.stroke();

  // 高光
  ctx.globalAlpha = 0.4;
  ctx.fillStyle = 'rgba(255,200,150,0.9)';
  ctx.beginPath();
  ctx.ellipse(-2.5, -5, 3.5, 3.5, -0.4, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

// 海鷗計時（用獨立 lastSeagullTick）
let lastSeagullTick = null;
function updateSeagullTimer(now) {
  if (lastSeagullTick === null) { lastSeagullTick = now; return; }
  const delta = now - lastSeagullTick;
  lastSeagullTick = now;

  if (!seagull) {
    seagullSpawnTimer += delta;
    if (seagullSpawnTimer >= SEAGULL_SPAWN_DELAY) {
      seagullSpawnTimer = 0;
      spawnSeagull();
    }
  } else {
    seagullSpawnTimer = 0;
    updateSeagull(now);
    // 若海鷗死亡且設置為 null，需要重置計時
    if (seagull === null) seagullSpawnTimer = 0;
  }
}


// ████████████████████████████████████████████████████████████
// § 16  地面視覺裝飾（沙粒閃光、草地踩壓）
//        狀態：trampledGrass, grassClusterSet
// ████████████████████████████████████████████████████████████
function drawSandGrains(gx, gy, p) {
  let h = (gx * 374761393 + gy * 668265263 + cachedMapSeedNum) | 0;
  
  const count = 3 + (Math.abs(h) % 3);
  
  for (let i = 0; i < count; i++) {
    h = Math.imul(h ^ (h >>> 13), 1274126177);
    const rx = (h % 56) - 28;
    const ry = ((h >> 5) % 28) - 14;
    if (Math.abs(rx) * 14 + Math.abs(ry) * 28 <= 28 * 14) {
      const flicker = Math.sin(wavePhase * 3 + (h % 10));
    
    // 只在 sin 波峰時顯示（模擬反光瞬間）
    if (flicker > 0.95) {
      const alpha = (flicker - 0.9) * 8; // 讓閃爍更銳利
      ctx.fillStyle = `rgba(230, 230, 220, ${alpha})`;
      // 畫一個極小的點 (1x1 像素)
      ctx.fillRect(p.x + rx, p.y + ry, 3, 3);
    }
    }
  }
}

// ═══════════════════════════════════════════════════════
// ④ 草地踩壓系統（劇烈搖晃版）
// ═══════════════════════════════════════════════════════
const trampledGrass = new Map();
const GRASS_SHAKE_DUR = 800;   // 搖晃持續時間 ms
const GRASS_CLUSTER_MAX = 10;   // 每張地圖最多草叢數量
let grassClusterSet = new Set(); // 本地圖實際顯示草叢的格子 "gx,gy"

// TODO: 若未來想依踩踏方向決定搖晃方向（如從哪側倒），可在此補充 dir 邏輯
function trampleGrass(gx, gy) {
  if (tileAt(gx, gy) !== 2) return;
  trampledGrass.set(`${gx},${gy}`, { trampledAt: performance.now() });
}

function grassShakeIntensity(gx, gy) {
  const key = `${gx},${gy}`;
  if (!trampledGrass.has(key)) return 0;
  const { trampledAt } = trampledGrass.get(key);
  const elapsed = performance.now() - trampledAt;
  if (elapsed >= GRASS_SHAKE_DUR) { trampledGrass.delete(key); return 0; }
  // 先快速衝到最大強度，再逐漸衰退
  const t = elapsed / GRASS_SHAKE_DUR;
  return (1 - t) * (1 - t);
}

function buildGrassClusters() {
  const mapSeedNum = cachedMapSeedNum;
  const candidates = [];
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 2) continue;             // 只長在草地(2)
      if (pebbleSet.has(`${gx},${gy}`)) continue;  // 不與石頭同格
      let h = (gx * 374761393 + gy * 668265263 + mapSeedNum) | 0;
      h = Math.imul(h ^ (h >>> 13), 12741261); h = h ^ (h >>> 16);
      const clusterHash = Math.abs(h);
      if ((clusterHash % 100) < 50) candidates.push({ gx, gy, hash: clusterHash });
    }
  }
  // 依 hash 穩定排序後，取前 GRASS_CLUSTER_MAX 個（結果依地圖種子決定，不隨機）
  candidates.sort((a, b) => a.hash - b.hash);
  grassClusterSet = new Set(candidates.slice(0, GRASS_CLUSTER_MAX).map(c => `${c.gx},${c.gy}`));
}

function drawGrassOnTile(gx, gy, p) {
  if (!grassClusterSet.has(`${gx},${gy}`)) return;
  let h = (gx * 374761393 + gy * 668265263 + cachedMapSeedNum) | 0;
  h = Math.imul(h ^ (h >>> 13), 12741261); h = h ^ (h >>> 16);
  const clusterHash = Math.abs(h);

  const shakeAmt = grassShakeIntensity(gx, gy);
  // 無風，踩踏時疊加高頻不規則搖晃
  const baseWind = 0;
  const count = 2 + (clusterHash % 1);

  ctx.lineCap = 'round';
  for (let i = 0; i < count; i++) {
    const subSeed = (clusterHash >> i) + i;
    const rx = (subSeed % 26) - 13;
    const ry = ((subSeed * 7) % 14) - 7;
    const px = p.x + rx;
    const py = p.y + ry;

    // 草叢底部橢圓陰影(暫時先隱藏)
    // ctx.save();
    // ctx.globalAlpha = 0.22;
    // ctx.fillStyle = '#1a3a18';
    // ctx.beginPath();
    // ctx.ellipse(px, py + 1, 5, 2.5, 0, 0, Math.PI * 2);
    // ctx.fill();
    // ctx.restore();

    const h1 = 5 + (subSeed % 3);
    const h2 = 7 + (subSeed % 6);
    const h3 = 5 + (subSeed % 4);

    // 每根草葉有非常細微的顏色差異製造層次感
    const colorVar = ((subSeed * 13 + i * 7) % 17) - 8; // -8 ~ +8
    const gr = Math.min(255, Math.max(0, 75 + Math.floor(colorVar * 2.4)));
    const gg = Math.min(255, Math.max(0, 155 + colorVar));
    const gb = Math.min(255, Math.max(0, 65 + Math.floor(colorVar * 3.6)));
    ctx.strokeStyle = `rgb(${gr},${gg},${gb})`;
    ctx.lineWidth = 1.5;

    // 每根草葉各有自己的相位偏移，製造不規則感
    const phaseOffset = (subSeed % 13) * 0.48;
    // 搖晃頻率高、幅度大、各葉方向略不同
    const shakeFreq = 18 + (subSeed % 7) * 2;   // 高頻
    const shakeMag  = shakeAmt * (8 + (subSeed % 5) * 1.5);
    const shakeX = Math.sin(wavePhase * shakeFreq + phaseOffset) * shakeMag;
    const wind = baseWind + shakeX;

    ctx.beginPath();
    ctx.moveTo(px - 2, py);
    ctx.lineTo(px - 4 + wind * 0.6, py - h1);
    ctx.moveTo(px, py);
    ctx.lineTo(px + wind, py - h2);
    ctx.moveTo(px + 2, py);
    ctx.lineTo(px + 4 + wind * 0.6, py - h3);
    ctx.stroke();
  }
}

// 馬鞍藤系統已移除（drawIpomoea 函式已刪除）


// ████████████████████████████████████████████████████████████
// § 17  地形生成引擎
//        工具：seedFromString, makePRNG, smoothstep, lerp, buildNoise2D
//        演算：smoothTerrainMap, enforceMinBandWidth, generateMapWithBorder
//        狀態：MAP, cachedMapSeedNum
// ████████████████████████████████████████████████████████████
function seedFromString(str) {
  let h = 0; for (let i = 0; i < str.length; i++) h = Math.imul(31,h) + str.charCodeAt(i) | 0;
  return h >>> 0;
}
function makePRNG(seed) {
  let s = seed; return () => {
    s |= 0; s = s + 0x6D2B79F5 | 0; let t = Math.imul(s ^ s>>>15, 1|s);
    t = t + Math.imul(t ^ t>>>7, 61|t) ^ t; return ((t ^ t>>>14) >>> 0) / 4294967296;
  };
}
function smoothstep(t) { return t*t*(3-2*t); }
function lerp(a,b,t) { return a+(b-a)*t; }
function buildNoise2D(rng, size) {
  const g = Array.from({length:size}, ()=>Array.from({length:size}, ()=>rng()*2-1));
  return (x,y) => {
    const xi=Math.floor(x)%size, yi=Math.floor(y)%size, xf=x-Math.floor(x), yf=y-Math.floor(y);
    const xi1=(xi+1)%size, yi1=(yi+1)%size;
    return lerp(lerp(g[yi][xi],g[yi][xi1],smoothstep(xf)),lerp(g[yi1][xi],g[yi1][xi1],smoothstep(xf)),smoothstep(yf));
  };
}

// ── 地形降階平滑 ─────────────────────────────────────────
// 地形等級：-1(深海) < 0(淺海) < 1(沙灘) < 2(草地) < 3(石地)
// 規則：任一格不得比「8方向（含對角）」鄰格高超過1階
// 等角視圖中對角鄰格視覺上也緊鄰，必須納入檢查
// 演算法：重複掃描直到穩定
function smoothTerrainMap(map, locked) {
  const DIRS8 = [
    {dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},
    {dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}
  ];
  let changed = true;
  while (changed) {
    changed = false;
    for (let gy = 0; gy < ROWS; gy++) {
      for (let gx = 0; gx < COLS; gx++) {
        if (locked && locked.has(`${gx},${gy}`)) continue; // 鎖定格不修改
        for (const {dx, dy} of DIRS8) {
          const nx = gx + dx, ny = gy + dy;
          if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) continue;
          if (map[gy][gx] - map[ny][nx] > 1) {
            map[gy][gx] = map[ny][nx] + 1;
            changed = true;
            break;
          }
        }
      }
    }
  }
}

// ── 最小帶寬強制：8方向，確保每種地形至少 MIN_BAND 格寬才能切換 ──
// 做法：對每個格子，在 8 個方向分別往外掃，
//       若在 MIN_BAND 格內就碰到差距 ≥ 2 階的地形，就把自己降/升一階，
//       讓過渡帶「撐寬」至少達到 MIN_BAND 格。
// 每輪結束後重跑 smoothTerrainMap(8方向版)確保相鄰差≤1。
function enforceMinBandWidth(map, locked) {
  const MIN_BAND = 3;
  const DIRS8 = [
    {dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},
    {dx:1,dy:1},{dx:1,dy:-1},{dx:-1,dy:1},{dx:-1,dy:-1}
  ];

  let changed = true;
  let iters = 0;
  while (changed && iters < 40) {
    changed = false;
    iters++;
    for (let gy = 0; gy < ROWS; gy++) {
      for (let gx = 0; gx < COLS; gx++) {
        if (locked && locked.has(`${gx},${gy}`)) continue; // 鎖定格不修改
        const t = map[gy][gx];
        let dominated = false;
        for (const {dx, dy} of DIRS8) {
          // 往此方向掃 MIN_BAND 格，看是否在範圍內遇到差≥2的地形
          for (let step = 1; step <= MIN_BAND; step++) {
            const nx = gx + dx * step, ny = gy + dy * step;
            if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) break;
            const nt = map[ny][nx];
            if (nt === t) continue; // 同種地形，繼續延伸
            // 遇到不同地形
            if (nt < t - 1) {
              // 在 MIN_BAND 格內有比自己低2+階的地形 → 降自己一階
              map[gy][gx] = t - 1;
              dominated = true;
            } else if (nt > t + 1) {
              // 在 MIN_BAND 格內有比自己高2+階的地形 → 升自己一階
              map[gy][gx] = t + 1;
              dominated = true;
            }
            // 不管觸發與否，遇到不同地形就不再往這個方向掃
            break;
          }
          if (dominated) { changed = true; break; }
        }
      }
    }
    // 每輪後重跑 8方向平滑，確保相鄰差≤1
    smoothTerrainMap(map, locked);
  }
}

// ── 地圖生成（邊界縫合版）────────────────────────────────
// exitSide: 'right'|'left'|'bottom'|'top' — 舊地圖的出口邊
// borderEdge: number[] — 出口邊的地形列（長度 ROWS 或 COLS）
//   exitSide='right'/'left' → 長度 ROWS（每一行的 tile）
//   exitSide='bottom'/'top' → 長度 COLS（每一列的 tile）
// 第一張地圖：exitSide=null → 純噪聲
function generateMapWithBorder(exitSide, borderEdge) {
  // 每次用不同 seed 保證地圖不重複
  const rndSeed = (Math.random() * 0xFFFFFFFF) | 0;
  cachedMapSeedNum = rndSeed >>> 0;
  const n1 = buildNoise2D(makePRNG(rndSeed ^ 0xAABBCC), 16);
  const n2 = buildNoise2D(makePRNG(rndSeed ^ 0x112233),  8);
  const n3 = buildNoise2D(makePRNG(rndSeed ^ 0xDEADBEEF), 32);

  // 純噪聲地圖
  const raw = Array.from({length: ROWS}, (_, gy) =>
    Array.from({length: COLS}, (_, gx) => {
      const n = n1(gx*.18, gy*.18)*.55 + n2(gx*.35, gy*.35)*.25 + n3(gx*.08, gy*.08)*.20;
      const h = ((gx - gy) / (COLS + ROWS)) * 1.8 + n * 0.7;
      return h < -0.7 ? -1 : h < -0.15 ? 0 : h < 0.67 ? 1 : h < 0.95 ? 2 : 3;
    }));

  // ── 地形降階平滑（確保鄰格地形差不超過1階）──────────────
  // 抽成獨立函式，生成後和邊界繼承後各跑一次
  smoothTerrainMap(raw);
  // ── 最小帶寬強制（確保同種地形至少3格才能過渡）───────────
  enforceMinBandWidth(raw);

  if (!exitSide || !borderEdge) return raw;

  // ── 邊界繼承 + 2格過渡漸變 ──────────────────────────────
  // BLEND_DEPTH: 繼承的格數（格0=完全繼承，格1=75%舊，格2=40%舊）
  const BLEND = [1.0, 0.75, 0.40];

  // 依穿越方向決定新地圖的「入口邊」在哪，並做漸變覆蓋
  // blend(oldTile, newTile, t): t=1→完全舊, t=0→完全新
  // 由於地形是整數，用機率決定取哪個值
  const prng = makePRNG(rndSeed ^ 0xC0FFEE);
  function blendTile(oldT, newT, strength) {
    if (oldT === newT) return oldT;
    return prng() < strength ? oldT : newT;
  }

  for (let depth = 0; depth < BLEND.length; depth++) {
    const strength = BLEND[depth];
    if (exitSide === 'right') {
      // 舊地圖右側穿出 → 新地圖左側（col=0）為入口
      const col = depth;
      for (let gy = 0; gy < ROWS; gy++) {
        raw[gy][col] = blendTile(borderEdge[gy], raw[gy][col], strength);
      }
    } else if (exitSide === 'left') {
      // 舊地圖左側穿出 → 新地圖右側（col=COLS-1）為入口
      const col = COLS - 1 - depth;
      for (let gy = 0; gy < ROWS; gy++) {
        raw[gy][col] = blendTile(borderEdge[gy], raw[gy][col], strength);
      }
    } else if (exitSide === 'bottom') {
      // 舊地圖下側穿出 → 新地圖上側（row=0）為入口
      const row = depth;
      for (let gx = 0; gx < COLS; gx++) {
        raw[row][gx] = blendTile(borderEdge[gx], raw[row][gx], strength);
      }
    } else if (exitSide === 'top') {
      // 舊地圖上側穿出 → 新地圖下側（row=ROWS-1）為入口
      const row = ROWS - 1 - depth;
      for (let gx = 0; gx < COLS; gx++) {
        raw[row][gx] = blendTile(borderEdge[gx], raw[row][gx], strength);
      }
    }
  }

  // 建立 depth=0（完全繼承）格子的鎖定集合，保護邊界地形不被平滑降階
  const borderLocked = new Set();
  if (exitSide === 'right') {
    for (let gy = 0; gy < ROWS; gy++) borderLocked.add(`0,${gy}`);
  } else if (exitSide === 'left') {
    for (let gy = 0; gy < ROWS; gy++) borderLocked.add(`${COLS-1},${gy}`);
  } else if (exitSide === 'bottom') {
    for (let gx = 0; gx < COLS; gx++) borderLocked.add(`${gx},0`);
  } else if (exitSide === 'top') {
    for (let gx = 0; gx < COLS; gx++) borderLocked.add(`${gx},${ROWS-1}`);
  }

  // 邊界繼承後再跑一次平滑，修正繼承格與內部格之間可能產生的跳階
  // 傳入 borderLocked 確保 depth=0 格子不被平滑覆蓋
  smoothTerrainMap(raw, borderLocked);
  // 再次強制最小帶寬（邊界繼承可能打破帶寬規則）
  enforceMinBandWidth(raw, borderLocked);
  return raw;
}

// 抽取地圖某邊的地形列
function extractEdge(map, side) {
  if (side === 'right')  return Array.from({length: ROWS}, (_, gy) => map[gy][COLS - 1]);
  if (side === 'left')   return Array.from({length: ROWS}, (_, gy) => map[gy][0]);
  if (side === 'bottom') return Array.from({length: COLS}, (_, gx) => map[ROWS - 1][gx]);
  if (side === 'top')    return Array.from({length: COLS}, (_, gx) => map[0][gx]);
}

// 穿越方向 → 對面方向
const OPPOSITE = { right:'left', left:'right', bottom:'top', top:'bottom' };

// ── 地圖重置（共用清場邏輯）────────────────────────────────

// ████████████████████████████████████████████████████████████
// § 18  地圖管理（重置、生成物件、邊界穿越、初始化）
// ████████████████████████████████████████████████████████████
function resetMapObjects() {
  footprints.length = 0; footprintMap.clear();
  ripples.length = 0;
  surfaceBubbles.length = 0; surfaceBubbleMap.clear();
  splashDrops.length = 0; splashDropMap.clear();
  bodyDroplets.length = 0; bodyDripActive = false;
  secondaryThrows.length = 0;
  trampledGrass.clear(); pebbleSplashes.length = 0; throwAnim = null;
  coconutTrees = []; coconuts = []; fallingCoconuts.length = 0;
  shellObjects = []; shellShards = []; shellShardSet = new Map(); shellFragments.length = 0;
  meatObjects.length = 0; meatSet = new Set();
  cutVines = []; cutVineSet = new Set(); consumedVineSet = new Set(); ipomoaBlockSet = new Set(); basketObjects = [];
  cottonYarnObjects = []; cottonYarnSet = new Set();
  woodObjects = []; woodSet = new Set(); floatingWoods.length = 0; floatingWoodSet.clear(); // 換地圖清除木頭
  anchorPending = false; // 換地圖時清除 pending 狀態
  if (vineCuttingTimer) { clearTimeout(vineCuttingTimer.timer); vineCuttingTimer = null; }
  if (coconutCuttingTimer) { clearTimeout(coconutCuttingTimer.timer); coconutCuttingTimer = null; }
  buildGrassClusters(); buildPebbleObjects(); buildShellObjects(); buildCoconutTrees(); buildWoodObjects(); spawnFishesOnMap();
  // 若玩家仍持刀，切換地圖後立即重建馬鞍藤阻擋集合（新地圖地形不同需重算）
  if (playerEquippedKnife) rebuildIpomoaBlockSet();
}

// 找最近可站格（從指定座標向外搜尋沙地/草地）
function findSpawnNear(sx, sy) {
  // 找最近的可走格（包含水格，排除物件阻擋）
  for (let r = 0; r < Math.max(ROWS, COLS); r++) {
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
      if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
      if (isWalkable(sx + dx, sy + dy)) return { x: sx + dx, y: sy + dy };
    }
  }
  return { x: sx, y: sy };
}
// 僅限沙灘/草地的初始出生點（第一張地圖用）
function findLandSpawnNear(sx, sy) {
  for (let r = 0; r < Math.max(ROWS, COLS); r++) {
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
      if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
      const t = tileAt(sx + dx, sy + dy);
      if (t === 1 || t === 2) return { x: sx + dx, y: sy + dy };
    }
  }
  return { x: sx, y: sy };
}

// ── 第一張地圖初始化 ────────────────────────────────────────
function initFirstMap() {
  MAP = generateMapWithBorder(null, null);
  resetMapObjects();
  const sp = findLandSpawnNear(Math.floor(COLS * .55), Math.floor(ROWS * .45));
  player.gx = sp.x; player.gy = sp.y; player.tx = sp.x; player.ty = sp.y;
  resetSurvivalStats();
  // 重置錨點系統
  quantumAnchor   = null;
  anchorSnapshot  = null;
  isAnchorMap     = false;
  anchorReturnPos = null;
  anchorBtn.style.display = 'none';
  exclamationState = null;
}

// ── 穿越地圖邊界（核心）────────────────────────────────────
// exitSide: 玩家往哪個方向出去（'right'|'left'|'bottom'|'top'）
// playerEdgeCoord: 玩家沿邊界方向的座標（用來決定新地圖出現位置）
function crossMapBoundary(exitSide, playerEdgeCoord) {
  // 離開前：若正在錨定地圖，先儲存最新快照
  updateAnchorSnapshotBeforeLeave();
  // 離開錨定地圖
  const wasAnchorMap = isAnchorMap;
  isAnchorMap = false;
  // 量子錨點跟著地圖清掉（換圖後不留存）
  quantumAnchor = null;
  // 若剛離開錨定地圖，按鈕恢復可點狀態
  if (wasAnchorMap && anchorSnapshot) {
    anchorBtn.style.opacity = '1';
    anchorBtn.style.cursor  = 'pointer';
    anchorBtn.title = '傳送回錨定地圖';
  }

  const edge   = extractEdge(MAP, exitSide);
  const inSide = OPPOSITE[exitSide]; // 新地圖的入口邊

  startFadeTransition(() => {
    MAP = generateMapWithBorder(exitSide, edge);
    resetMapObjects();
    // 穿越地圖時立刻清除海鷗，重新計時讓新地圖重新生成
    seagull = null;
    seagullSpawnTimer = 0;
    lastSeagullTick = null;

    // 決定玩家新位置：鏡像邊 + 保留沿邊座標
    let nx, ny;
    if (exitSide === 'right')  { nx = 0;        ny = playerEdgeCoord; }
    if (exitSide === 'left')   { nx = COLS - 1; ny = playerEdgeCoord; }
    if (exitSide === 'bottom') { nx = playerEdgeCoord; ny = 0; }
    if (exitSide === 'top')    { nx = playerEdgeCoord; ny = ROWS - 1; }

    // 夾在範圍內
    nx = Math.max(0, Math.min(COLS - 1, nx));
    ny = Math.max(0, Math.min(ROWS - 1, ny));
    // 優先放在對應位置（包含水格），只有被障礙物擋住才往外找
    let spx = nx, spy = ny;
    if (!isWalkable(nx, ny)) {
      const sp = findSpawnNear(nx, ny);
      spx = sp.x; spy = sp.y;
    }
    player.gx = spx; player.gy = spy;
    player.tx = spx; player.ty = spy;
  });
}



// ████████████████████████████████████████████████████████████
// § 19  座標轉換工具（tileAt, isWalkable, toScreen, mapOrigin）
//        狀態：wavePhase
// ████████████████████████████████████████████████████████████
function tileAt(gx,gy) { if(gx<0||gy<0||gx>=COLS||gy>=ROWS) return -2; return MAP[gy]?MAP[gy][gx]:-2; }
function isWalkable(gx,gy) {
  if (tileAt(gx,gy) < -1) return false;
  // 鵝卵石物件阻擋移動（O(1) Set 查詢）
  if (pebbleSet.has(`${gx},${gy}`)) return false;
  // 木頭阻擋移動
  if (woodSet.has(`${gx},${gy}`)) return false;
  // 浮木阻擋移動（rising/floating 相才有值）
  if (floatingWoodSet.has(`${gx},${gy}`)) return false;
  // 椰子樹阻擋移動（O(1) Set 查詢）
  if (coconutTreeSet.has(`${gx},${gy}`)) return false;
  // 貝殼碎片刀：持刀時才阻擋（無刀時無法互動，設為無阻擋）
  if (playerEquippedKnife && shellShardSet.has(`${gx},${gy}`)) return false;
  // 持石頭時貝殼設阻擋（未持石時不阻擋）
  if (playerHoldingPebble && shellObjects.some(s => s.gx === gx && s.gy === gy)) return false;
  // 量子錨點阻擋移動（需走近才能拾取）
  if (quantumAnchor && quantumAnchor.gx === gx && quantumAnchor.gy === gy) return false;
  // 肉物件阻擋移動（O(1) Set 查詢）
  if (meatSet.has(`${gx},${gy}`)) return false;
  // 持刀時馬鞍藤設阻擋
  if (ipomoaBlockSet.has(`${gx},${gy}`)) return false;
  // 切割後留下的藤蔓（永久阻擋）
  if (cutVineSet.has(`${gx},${gy}`)) return false;
  // 椰子纖維：地圖上有 ≥2 個時才阻擋（≥2 個才可製作籃子；只有 1 個時無法互動，設為無阻擋）
  if (cottonYarnObjects.length >= 2 && cottonYarnSet.has(`${gx},${gy}`)) return false;
  // 編織籃子阻擋移動
  if (basketObjects.some(b => b.gx === gx && b.gy === gy)) return false;
  // 地面椰子阻擋規則：
  //   持石時：所有狀態皆阻擋（可投石彈開）
  //   持刀時：whole/split/eaten 皆阻擋（可用刀互動）
  //   split（有椰子水）：永遠阻擋（可直接喝水）
  //   whole/eaten 無刀無石：無阻擋
  if (coconuts.some(c => {
    if (c.gx !== gx || c.gy !== gy) return false;
    if (playerHoldingPebble) return true;            // 持石：所有椰子皆阻擋
    const state = c.state ?? 'whole';
    if (state === 'split') return true;              // 有水可喝，永遠阻擋
    return playerEquippedKnife;                      // whole/eaten 需持刀才阻擋
  })) return false;
  return true;
}
function mapOrigin() { return { ox:canvas.width/2.1, oy:Math.floor((canvas.height-(COLS+ROWS)*HH)/2)+45 }; }
function toScreen(fx,fy,type) {
  const {ox,oy}=mapOrigin(); return { x:ox+(fx-fy)*HW, y:oy+(fx+fy)*HH-(ELEV[String(type)]??0) };
}

let wavePhase=0;

// ── 滑鼠懸停格子標示系統 ─────────────────────────────────
let hoverTile = { gx: -1, gy: -1 };

canvas.addEventListener('mousemove', e => {
  const {sx, sy} = getCanvasPos(e.clientX, e.clientY);
  const iso = screenToIso(sx, sy);
  const hgx = Math.round(iso.gx), hgy = Math.round(iso.gy);
  if (hgx >= 0 && hgy >= 0 && hgx < COLS && hgy < ROWS) {
    hoverTile.gx = hgx; hoverTile.gy = hgy;
  } else {
    hoverTile.gx = -1; hoverTile.gy = -1;
  }
});
canvas.addEventListener('mouseleave', () => { hoverTile.gx = -1; hoverTile.gy = -1; });

// ████████████████████████████████████████████████████████████
// § 20  渲染：地板格子 & 懸停高亮
// ████████████████████████████████████████████████████████████
function drawTile(gx,gy) {
  const type=tileAt(gx,gy); if(type===-2) return;
  const p=toScreen(gx,gy,type), thick=getThick(type);
  ctx.beginPath(); ctx.moveTo(p.x,p.y-HH); ctx.lineTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x-HW,p.y); ctx.closePath();
  if(type===-1){ ctx.fillStyle=`rgb(${13+Math.sin(wavePhase+gx*.7+gy*.5)*10},${26+Math.sin(wavePhase+gx*.7+gy*.5)*20},${71+Math.sin(wavePhase+gx*.7+gy*.5)*10})`; }
  else if(type===0){ ctx.fillStyle=`rgb(28,${Math.floor(150+Math.sin(wavePhase*1.2-gx*.9+gy*.6)*12)},${Math.floor(195+Math.sin(wavePhase*1.2-gx*.9+gy*.6)*12)})`; }
  else { ctx.fillStyle=COLOR[String(type)].top; }
  ctx.fill();
  if(type===2) drawGrassOnTile(gx, gy, p);
  if(type===1) drawSandGrains(gx, gy, p);
  if(type>=1) drawFootprints(gx,gy);
  if(type===0) drawRipplesAt(gx, gy, p);
  if(type===-1||type===0) drawSurfaceBubblesAt(gx, gy, p);
  if(type===-1) drawSplashDropsAt(gx, gy);
  // ── 懸停格子高亮邊框 ──
  if (gx === hoverTile.gx && gy === hoverTile.gy) {
    const isThrowMode = (playerHoldingPebble || playerHoldingWood) && !throwAnim;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - HH);
    ctx.lineTo(p.x + HW, p.y);
    ctx.lineTo(p.x, p.y + HH);
    ctx.lineTo(p.x - HW, p.y);
    ctx.closePath();
    ctx.strokeStyle = isThrowMode ? 'rgba(255, 120, 60, 0.92)' : 'rgba(255, 255, 255, 0)';
    ctx.lineWidth = isThrowMode ? 3.0 : 2.2;
    ctx.lineCap = "round"; // 讓線段末端圓潤一點比較美觀

    // 定義格子的四個頂點
    const top = { x: p.x, y: p.y - HH };
    const right = { x: p.x + HW, y: p.y };
    const bottom = { x: p.x, y: p.y + HH };
    const left = { x: p.x - HW, y: p.y };

    // gap 控制線段的長度，0.3 代表畫出邊長的 30%
    const gap = 0.3; 

    // 開始繪製四個角落的 L 型線段
    ctx.beginPath();

    // 1. 上頂點的角落
    ctx.moveTo(top.x - HW * gap, top.y + HH * gap);
    ctx.lineTo(top.x, top.y);
    ctx.lineTo(top.x + HW * gap, top.y + HH * gap);

    // 2. 下頂點的角落
    ctx.moveTo(bottom.x - HW * gap, bottom.y - HH * gap);
    ctx.lineTo(bottom.x, bottom.y);
    ctx.lineTo(bottom.x + HW * gap, bottom.y - HH * gap);

    // 3. 左頂點的角落
    ctx.moveTo(left.x + HW * gap, left.y - HH * gap);
    ctx.lineTo(left.x, left.y);
    ctx.lineTo(left.x + HW * gap, left.y + HH * gap);

    // 4. 右頂點的角落
    ctx.moveTo(right.x - HW * gap, right.y - HH * gap);
    ctx.lineTo(right.x, right.y);
    ctx.lineTo(right.x - HW * gap, right.y + HH * gap);

    ctx.stroke();
    ctx.restore();
  }
  // ────────────────────────
  ctx.beginPath(); ctx.moveTo(p.x-HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x-HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].left; ctx.fill();
  ctx.beginPath(); ctx.moveTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x+HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].right; ctx.fill();
}


// ████████████████████████████████████████████████████████████
// § 21  渲染：玩家角色
// ████████████████████████████████████████████████████████████
function drawPlayer(gx,gy,frame) {
  const p=toScreen(gx,gy,tileAt(Math.round(gx),Math.round(gy)));
  const isMoving=Math.abs(player.tx-player.gx)>0.01||Math.abs(player.ty-player.gy)>0.01;
  const bob=isMoving?Math.sin(frame*.18)*2.5:0;
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(p.x,p.y,14,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // --- 修改後的邏輯 ---
  let activeSprite, fi;
  if (throwAnim && !throwAnim.done) {
    // 1. 投擲動作期間：使用投擲專用的 rcssavage.png（石頭）或 rwtsavage.png（木頭）
    if (throwAnim.isWood) {
      activeSprite = (woodThrowSprite.complete && woodThrowSprite.naturalWidth > 0)
                     ? woodThrowSprite : playerSprite;
    } else {
      activeSprite = (pebbleThrowSprite.complete && pebbleThrowSprite.naturalWidth > 0)
                     ? pebbleThrowSprite : playerSprite;
    }
    fi = 1; // 投擲動作幀
  } else if (playerHoldingWood) {
    // 2. 持有木頭期間：使用 wtsavage.png
    activeSprite = (woodHeldSprite.complete && woodHeldSprite.naturalWidth > 0)
                   ? woodHeldSprite : playerSprite;
    fi = isMoving ? Math.floor(frame/6)%SPRITE_COLUMNS : 0;
  } else if (playerHoldingPebble) {
    // 3. 僅持有石頭期間：使用 cssavage.png
    activeSprite = (pebbleHeldSprite.complete && pebbleHeldSprite.naturalWidth > 0) 
                   ? pebbleHeldSprite : playerSprite;
    fi = isMoving ? Math.floor(frame/6)%SPRITE_COLUMNS : 0;
  } else {
    // 4. 一般狀態：使用預設的 savage.png
    activeSprite = playerSprite;
    fi = isMoving ? Math.floor(frame/6)%SPRITE_COLUMNS : 0;
  }
  // ------------------
  if(!activeSprite.complete||SPRITE_FRAME_W===0) return;
  const dh=80, dw=(SPRITE_FRAME_W/SPRITE_FRAME_H)*dh;
  const type=tileAt(Math.round(gx),Math.round(gy));
  if(type===0||type===-1){
    const sd=(type===-1)?40:10, wy=p.y-0.2+(type===-1?-5:0);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,canvas.width,wy); ctx.clip();
    ctx.imageSmoothingEnabled=false; ctx.drawImage(activeSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10+sd,dw,dh);
    ctx.restore();
  } else {
    ctx.save(); ctx.imageSmoothingEnabled=false; ctx.drawImage(activeSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10,dw,dh);
    ctx.restore();
  }
}


// ████████████████████████████████████████████████████████████
// § 22  生存系統（飢渴 & 氧氣 & 死亡）
//        狀態：playerThirst, playerHunger, playerOxygen
//               thirstTimer, hungerTimer, oxygenTimer
//               deathTimer, drowningTimer, isDead
//               statusIconPhase, lastSurvivalTick, lastOxygenTick
// ████████████████████████████████████████████████████████████
const player={gx:12,gy:8,tx:12,ty:8,frame:0,dir:1};
const held=new Set();

// ═══════════════════════════════════════════════════════
// 💧🍖 飢渴系統
// ═══════════════════════════════════════════════════════
const THIRST_MAX = 10;
const HUNGER_MAX = 10;
let playerThirst = 10;   // 口渴度（10=最飽水）
let playerHunger = 10;   // 飢餓度（10=最飽）

// ═══════════════════════════════════════════════════════
// 🫧 閉氣系統
// ═══════════════════════════════════════════════════════
const OXYGEN_MAX = 10;
let playerOxygen = 10;        // 氧氣值（10=滿）

let drowningTimer = null;     // 歸零後3秒淹死計時
const DROWN_COUNTDOWN_MS = 3000;
let isDeepSea = false;        // 目前是否在深海區


// 計時器（以 ms 為單位）
let thirstTimer = 0;     // 每 60000ms(1分) 口渴度 -1
let hungerTimer = 0;     // 每 120000ms(2分) 飢餓度 -1

// 歸零後的死亡倒計時
let deathTimer = null;   // null=無，值=倒計時開始時間 (performance.now)
const DEATH_COUNTDOWN_MS = 60000; // 1分鐘

// 標誌：已觸發死亡（避免重複）
let isDead = false;

// 圖示跳動動畫相位
let statusIconPhase = 0;

// 重置飢渴系統（新遊戲時呼叫）
function resetSurvivalStats() {
  playerThirst = THIRST_MAX;
  playerHunger = HUNGER_MAX;
  thirstTimer = 0;
  hungerTimer = 0;
  deathTimer = null;
  isDead = false;
  // 重置閉氣系統
  playerOxygen = OXYGEN_MAX;
  oxygenTimer = 0;
  drowningTimer = null;
  isDeepSea = false;
  lastOxygenTick = null;
  // 清空玩家持有物品狀態
  playerHoldingPebble = false;
  playerHoldingWood = false;

  playerHasBackpack = false;
  playerCarryCapacity = 1;
  playerCarryCount = 0;
  playerInventoryItems = [];
  coconutCuttingTimer = null;
  if (vineCuttingTimer) { clearTimeout(vineCuttingTimer.timer); vineCuttingTimer = null; }
  cutVines = []; cutVineSet = new Set(); ipomoaBlockSet = new Set(); basketObjects = [];
  cottonYarnObjects = []; cottonYarnSet = new Set(); // 死亡重置清除椰子纖維
  anchorPending = false; // 重置時清除 pending 狀態
  updateInventoryHUD();
}

// 更新飢渴計時（每幀呼叫，deltaMs = 毫秒增量）
let lastSurvivalTick = null;
function updateSurvivalStats() {
  if (isDead) return;
  const now = performance.now();
  if (lastSurvivalTick === null) { lastSurvivalTick = now; return; }
  const delta = now - lastSurvivalTick;
  lastSurvivalTick = now;

  thirstTimer += delta;
  hungerTimer += delta;

  // 口渴度：每60秒 -1
  if (thirstTimer >= 60000) {
    thirstTimer -= 60000;
    playerThirst = Math.max(0, playerThirst - 1);
  }
  // 飢餓度：每120秒 -1
  if (hungerTimer >= 120000) {
    hungerTimer -= 120000;
    playerHunger = Math.max(0, playerHunger - 1);
  }

  // 若有任何一項歸零，啟動死亡倒計時
  const anyZero = (playerThirst <= 0 || playerHunger <= 0);
  if (anyZero) {
    if (deathTimer === null) deathTimer = now; // 開始計時
    // 超過1分鐘後死亡
    if (now - deathTimer >= DEATH_COUNTDOWN_MS) {
      triggerPlayerDeath();
    }
  } else {
    // 兩項都不為零，取消倒計時
    deathTimer = null;
  }

  statusIconPhase += 0.08;
}

// 喝椰子水：口渴度 +3（上限10）
function drinkCoconutWater() {
  playerThirst = Math.min(THIRST_MAX, playerThirst + 3);
}

// ── 閉氣系統更新 ──────────────────────────────────────────
let lastOxygenTick = null;
function updateOxygenSystem() {
  if (isDead) return;
  const now = performance.now();
  if (lastOxygenTick === null) { lastOxygenTick = now; return; }
  const delta = now - lastOxygenTick;
  lastOxygenTick = now;

  const rGx = Math.round(player.gx), rGy = Math.round(player.gy);
  const curType = tileAt(rGx, rGy);
  isDeepSea = (curType === -1);

  if (isDeepSea) {
    // 每秒扣1點氧氣
    oxygenTimer += delta;
    while (oxygenTimer >= 1000) {
      oxygenTimer -= 1000;
      playerOxygen = Math.max(0, playerOxygen - 1);
    }

    // 氧氣歸零 → 啟動3秒淹死倒計時
    if (playerOxygen <= 0) {
      if (drowningTimer === null) drowningTimer = now;
      if (now - drowningTimer >= DROWN_COUNTDOWN_MS) {
        triggerDrowning();
      }
    } else {
      drowningTimer = null;
    }
  } else {
    // 不在深海 → 快速恢復氧氣
    oxygenTimer = 0;
    drowningTimer = null;
    if (playerOxygen < OXYGEN_MAX) {
      playerOxygen = Math.min(OXYGEN_MAX, playerOxygen + delta / 500);
    }
  }
}
