// 獲得背包（備用接口，目前尚未決定取得方式）
function givePlayerBackpack(extraCapacity) {
  playerHasBackpack = true;
  playerCarryCapacity = 1 + (extraCapacity ?? 2); // 背包預設額外+2格
  updateInventoryHUD();
}

// 更新 HUD 上的背包欄位顯示（有背包才顯示）
function updateInventoryHUD() {
  const inv = document.getElementById('inventory-hud');
  if (!inv) return;
  if (!playerHasBackpack) {
    inv.style.display = 'none';
    return;
  }
  inv.style.display = 'flex';
  // 清除舊 slot（保留背包圖示 div）
  const oldSlots = inv.querySelectorAll('.inv-slot');
  oldSlots.forEach(s => s.remove());
  // row-reverse 佈局：倒序加入，讓視覺上第1格在最左、最後格在靠近錨點側
  const slotElements = [];
  for (let i = 0; i < playerCarryCapacity; i++) {
    const slotCv = document.createElement('canvas');
    slotCv.className = 'inv-slot ' + (i < playerCarryCount ? 'filled' : 'empty');
    slotCv.width = 32;
    slotCv.height = 32;
    const itemType = playerInventoryItems[i]; // 'knife' | 'vine' | 'yarn' | undefined
    if (i < playerCarryCount) {
      // 動態加上 blocked class（根據當下鄰近格子狀態）
      if (isDropBlocked()) slotCv.classList.add('blocked');
      // 點擊丟出物品
      const slotIndex = i;
      slotCv.addEventListener('click', (e) => {
        e.stopPropagation();
        if (isDead || fadeState !== 'idle') return;
        dropInventorySlot(slotIndex);
      });
      // hover 時更新 blocked 狀態
      slotCv.addEventListener('mouseenter', () => {
        if (isDropBlocked()) slotCv.classList.add('blocked');
        else slotCv.classList.remove('blocked');
      });
    }
    if (itemType === 'knife') {
      slotCv.title = '貝殼碎片刀';
      const sc = slotCv.getContext('2d');
      sc.save();
      sc.translate(16, 18);
      sc.scale(1.7, 1.7);
      sc.save();
      sc.globalAlpha = 0.38;
      sc.beginPath();
      sc.ellipse(1, 5, 6, 2.5, 0, 0, Math.PI * 2);
      sc.fillStyle = 'rgba(0,0,0,0.7)';
      sc.fill();
      sc.restore();
      sc.beginPath();
      sc.moveTo(5, -6); sc.lineTo(5, 4); sc.lineTo(-4, 3);
      sc.closePath();
      sc.fillStyle = '#ddd0a8'; sc.fill();
      sc.strokeStyle = '#8a7040'; sc.lineWidth = 0.7; sc.stroke();
      sc.beginPath();
      sc.moveTo(4, -4); sc.lineTo(4, 3); sc.lineTo(-2, 2.5);
      sc.closePath();
      sc.fillStyle = 'rgba(255,248,220,0.45)'; sc.fill();
      sc.restore();
    } else if (itemType === 'vine') {
      slotCv.title = 'S形馬鞍藤';
      const sc = slotCv.getContext('2d');
      sc.save();
      sc.translate(16, 16);
      // S 形藤蔓小圖示
      sc.strokeStyle = '#3d8c30';
      sc.lineWidth = 2.2;
      sc.lineCap = 'round';
      sc.beginPath();
      sc.moveTo(-7, 8);
      sc.bezierCurveTo(8, 6, -8, -4, 7, -8);
      sc.stroke();
      sc.strokeStyle = 'rgba(140,210,100,0.55)';
      sc.lineWidth = 0.6;
      sc.beginPath();
      sc.moveTo(-7, 8);
      sc.bezierCurveTo(8, 6, -8, -4, 7, -8);
      sc.stroke();
      sc.restore();
    } else if (itemType === 'yarn') {
      slotCv.title = '椰子纖維';
      const sc = slotCv.getContext('2d');
      sc.save();
      sc.translate(16, 17);
      // 椰子纖維小圖示（深淺咖啡色細絲）
      const iconColors = [
        'rgba(90,55,20,0.90)', 'rgba(120,78,32,0.85)',
        'rgba(150,100,48,0.80)', 'rgba(175,130,65,0.75)',
        'rgba(200,160,90,0.70)', 'rgba(105,65,24,0.88)',
        'rgba(160,108,52,0.78)', 'rgba(185,145,75,0.72)',
      ];
      const iconStrands = 8;
      for (let i = 0; i < iconStrands; i++) {
        const rf = (n) => Math.abs(Math.sin((i * 127.1 + n) * 43758.5453) % 1);
        const angle = rf(3) * Math.PI * 2;
        const len = 6 + rf(11) * 6;
        const sx = (rf(19) - 0.5) * 18;
        const sy = (rf(29) - 0.5) * 9;
        const ex = sx + Math.cos(angle) * len;
        const ey = sy + Math.sin(angle) * len * 0.5;
        const cpx = (sx + ex) * 0.5 + (rf(37) - 0.5) * 5;
        const cpy = (sy + ey) * 0.5 + (rf(43) - 0.5) * 3;
        const col = iconColors[Math.floor(rf(53) * iconColors.length)];
        sc.beginPath();
        sc.moveTo(sx, sy);
        sc.quadraticCurveTo(cpx, cpy, ex, ey);
        sc.strokeStyle = col;
        sc.lineWidth = 0.8 + rf(59) * 0.7;
        sc.lineCap = 'round';
        sc.stroke();
      }
      sc.restore();
    }
    slotElements.push(slotCv);
  }
  // row-reverse：倒序插入，視覺上 slot 0 在最左，slot N-1 在靠近錨點側
  for (let i = slotElements.length - 1; i >= 0; i--) {
    inv.appendChild(slotElements[i]);
  }
}
// 即時同步所有背包格子的 blocked 狀態（不重建 DOM，只更新 class）

// ─────────────────────────────────────────────────────────

// 丟出背包中第 index 格的物品（隨機掉落在玩家鄰近空格）
// 回傳 'ok' | 'blocked'（8格都有物件）| 'water'（掉入水中消失）
function dropInventorySlot(index) {
  if (index < 0 || index >= playerInventoryItems.length) return 'noop';
  const dirs8 = [
    {dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},
    {dx:0,dy:1},{dx:-1,dy:1},{dx:-1,dy:0},{dx:-1,dy:-1}
  ];
  // 收集鄰近 8 格可放物品的格子（非阻擋）
  function isTileOccupied(gx, gy) {
    if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) return true;
    if (pebbleSet.has(`${gx},${gy}`)) return true;
    if (woodSet.has(`${gx},${gy}`)) return true;
    if (shellShardSet.has(`${gx},${gy}`)) return true;
    if (shellObjects.some(s => s.gx === gx && s.gy === gy)) return true;
    if (coconuts.some(c => c.gx === gx && c.gy === gy)) return true;
    if (coconutTreeSet.has(`${gx},${gy}`)) return true;
    if (cutVines.some(v => v.gx === gx && v.gy === gy)) return true;
    if (basketObjects.some(b => b.gx === gx && b.gy === gy)) return true;
    if (cottonYarnSet.has(`${gx},${gy}`)) return true;
    return false;
  }
  const available = dirs8.filter(d => !isTileOccupied(player.tx + d.dx, player.ty + d.dy));
  if (available.length === 0) return 'blocked';

  // 隨機選一格
  const pick = available[Math.floor(Math.random() * available.length)];
  const tgx = player.tx + pick.dx, tgy = player.ty + pick.dy;
  const tileType = tileAt(tgx, tgy);

  const item = playerInventoryItems[index];
  // 從背包移除（index 格，下方物品往上移）
  playerInventoryItems.splice(index, 1);
  playerCarryCount = Math.max(0, playerCarryCount - 1);
  // 同步 knife 裝備狀態
  playerEquippedKnife = playerInventoryItems.some(it => it === 'knife');
  updateInventoryHUD();
  rebuildIpomoaBlockSet();

  // 掉入水格 → 消失 + 水花（用 addPebbleSplash 確保淺水/深水都能顯示）
  if (tileType <= 0) {
    addPebbleSplash(tgx, tgy);
    return 'water';
  }

  // 放置物品到地面
  const ox = (Math.random() - 0.5) * 10;
  const oy = (Math.random() - 0.5) * 6;
  if (item === 'knife') {
    const shard = { gx: tgx, gy: tgy, ox, oy, angle: Math.random() * Math.PI * 2 };
    shellShards.push(shard);
    shellShardSet.set(`${tgx},${tgy}`, shard);
  } else if (item === 'vine') {
    cutVines.push({ gx: tgx, gy: tgy });
    // cutVineSet 已含此格（切割時加入），若不含則補上
    cutVineSet.add(`${tgx},${tgy}`);
  } else if (item === 'yarn') {
    if (!cottonYarnSet.has(`${tgx},${tgy}`)) {
      cottonYarnObjects.push({ gx: tgx, gy: tgy });
      cottonYarnSet.add(`${tgx},${tgy}`);
    }
  }
  refreshInventoryBlockedState();
  return 'ok';
}

// 判斷玩家 8 格鄰近是否全部被佔用
function isDropBlocked() {
  const dirs8 = [
    {dx:0,dy:-1},{dx:1,dy:-1},{dx:1,dy:0},{dx:1,dy:1},
    {dx:0,dy:1},{dx:-1,dy:1},{dx:-1,dy:0},{dx:-1,dy:-1}
  ];
  function isTileOccupied(gx, gy) {
    if (gx < 0 || gy < 0 || gx >= COLS || gy >= ROWS) return true;
    if (pebbleSet.has(`${gx},${gy}`)) return true;
    if (shellShardSet.has(`${gx},${gy}`)) return true;
    if (shellObjects.some(s => s.gx === gx && s.gy === gy)) return true;
    if (coconuts.some(c => c.gx === gx && c.gy === gy)) return true;
    if (coconutTreeSet.has(`${gx},${gy}`)) return true;
    if (cutVines.some(v => v.gx === gx && v.gy === gy)) return true;
    if (basketObjects.some(b => b.gx === gx && b.gy === gy)) return true;
    if (cottonYarnSet.has(`${gx},${gy}`)) return true;
    return false;
  }
  return dirs8.every(d => isTileOccupied(player.tx + d.dx, player.ty + d.dy));
}
// 籃子由兩條切割後的S形馬鞍藤製作，拾取後增加一個背包格子

// 取得離玩家最近的「可製作籃子」的椰子纖維格子
// 條件：地圖上有 ≥2 個椰子纖維
function getBasketCraftTarget() {
  if (playerCarryCapacity >= 10) return null; // 已達上限，停止綠色指標
  if (cottonYarnObjects.length < 2) return null;
  // 找最近椰子纖維格
  let best = null, bestDist = Infinity;
  for (const y of cottonYarnObjects) {
    const dx = y.gx - player.tx, dy = y.gy - player.ty;
    const d = dx * dx + dy * dy;
    if (d < bestDist) { bestDist = d; best = y; }
  }
  return best;
}

// 玩家點擊椰子纖維製作籃子
function tryMakeBasket(gx, gy) {
  if (playerCarryCapacity >= 10) return false; // 已達上限，停止製作籃子
  if (cottonYarnObjects.length < 2) return false;
  const target = getBasketCraftTarget();
  if (!target || target.gx !== gx || target.gy !== gy) return false;
  // 煙霧效果
  addCoconutSmoke(gx, gy);
  if (coconutSmokes.length > 0) coconutSmokes[coconutSmokes.length - 1].isVine = true;
  // 消耗兩個椰子纖維（指標目標優先，再取另一個）
  const targetIdx = cottonYarnObjects.indexOf(target);
  const otherIdx = cottonYarnObjects.findIndex((_, i) => i !== targetIdx);
  // 從大到小刪除，避免 index 位移
  const idxA = Math.max(targetIdx, otherIdx);
  const idxB = Math.min(targetIdx, otherIdx);
  const usedA = cottonYarnObjects.splice(idxA, 1)[0];
  cottonYarnSet.delete(`${usedA.gx},${usedA.gy}`);
  const usedB = cottonYarnObjects.splice(idxB, 1)[0];
  cottonYarnSet.delete(`${usedB.gx},${usedB.gy}`);
  // 在點擊格子生成籃子
  setTimeout(() => {
    basketObjects.push({ gx, gy });
  }, 400);
  return true;
}

// 拾取籃子：增加一個背包格子，上限10
function pickUpBasket(bk) {
  const idx = basketObjects.indexOf(bk);
  if (idx !== -1) basketObjects.splice(idx, 1);
  const MAX_CAPACITY = 10;
  if (playerCarryCapacity >= MAX_CAPACITY) return; // 已達上限
  playerHasBackpack = true;
  playerCarryCapacity = Math.min(playerCarryCapacity + 1, MAX_CAPACITY);
  updateInventoryHUD();
}

// 取得附近（切比雪夫距離1）的籃子
function getNearbyBasket() {
  for (const bk of basketObjects) {
    if (Math.abs(bk.gx - player.tx) <= 1 && Math.abs(bk.gy - player.ty) <= 1) return bk;
  }
  return null;
}

// 繪製編織籃子（等角視角，綠棕色編織籃外形）
function drawBasketObject(bk) {
  const type = tileAt(bk.gx, bk.gy);
  if (type < 0) return;
  const p = toScreen(bk.gx, bk.gy, type);
  const px = p.x, py = p.y - 4;
  const now = performance.now();
  // 輕微上下浮動
  const float = Math.sin(now * 0.002 + bk.gx * 0.5) * 1.5;

  ctx.save();
  ctx.translate(px, py + float);

  // 陰影
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.beginPath();
  ctx.ellipse(0, 8, 13, 4, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#000';
  ctx.fill();
  ctx.restore();

  // 籃身（等角橢圓形）
  const bw = 16, bh = 10, depth = 9;
  // 底部橢圓
  ctx.beginPath();
  ctx.ellipse(0, depth/2, bw, bh * 0.55, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#8B6340';
  ctx.fill();
  ctx.strokeStyle = '#5a3e20';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // 側面（梯形）
  ctx.beginPath();
  ctx.moveTo(-bw, 0);
  ctx.lineTo(-bw * 0.85, depth);
  ctx.lineTo(bw * 0.85, depth);
  ctx.lineTo(bw, 0);
  ctx.closePath();
  ctx.fillStyle = '#A0784A';
  ctx.fill();
  ctx.strokeStyle = '#5a3e20';
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // 編織紋路（橫線）
  ctx.strokeStyle = 'rgba(70,40,10,0.35)';
  ctx.lineWidth = 0.7;
  for (let yi = 1; yi <= 2; yi++) {
    const yf = yi / 3;
    const xw = bw * (1 - yf * 0.15);
    ctx.beginPath();
    ctx.moveTo(-xw, depth * yf);
    ctx.lineTo(xw, depth * yf);
    ctx.stroke();
  }
  // 編織紋路（斜線）
  ctx.strokeStyle = 'rgba(200,160,80,0.30)';
  for (let xi = -3; xi <= 3; xi++) {
    ctx.beginPath();
    ctx.moveTo(xi * 4.5 - 1, 0);
    ctx.lineTo(xi * 4.5 + 1.5, depth);
    ctx.stroke();
  }

  // 頂部橢圓（籃口）
  ctx.beginPath();
  ctx.ellipse(0, 0, bw, bh * 0.52, 0, 0, Math.PI * 2);
  ctx.fillStyle = '#C49A5A';
  ctx.fill();
  ctx.strokeStyle = '#5a3e20';
  ctx.lineWidth = 1.0;
  ctx.stroke();
  // 籃口高光
  ctx.beginPath();
  ctx.ellipse(-2, -1.5, bw * 0.55, bh * 0.22, -0.2, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220,185,100,0.35)';
  ctx.fill();

  // 把手弧線
  ctx.beginPath();
  ctx.moveTo(-bw * 0.55, -1);
  ctx.bezierCurveTo(-bw * 0.6, -depth * 2.0, bw * 0.6, -depth * 2.0, bw * 0.55, -1);
  ctx.strokeStyle = '#7A5030';
  ctx.lineWidth = 2.2;
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-bw * 0.55, -1);
  ctx.bezierCurveTo(-bw * 0.6, -depth * 2.0, bw * 0.6, -depth * 2.0, bw * 0.55, -1);
  ctx.strokeStyle = 'rgba(200,160,80,0.5)';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  ctx.restore();
}

// 繪製「可製作籃子」的綠色提示箭頭與框框
function drawBasketCraftHint() {
  const target = getBasketCraftTarget();
  if (!target) return;
  const type = tileAt(target.gx, target.gy);
  if (type < 0) return;
  const p = toScreen(target.gx, target.gy, type);
  const now = performance.now();

  // 四角綠色框（與石頭紅框相同結構，只改顏色）
  const HW2 = HW, HH2 = HH;
  const corners = [
    { x: p.x,      y: p.y - HH2 }, // 上
    { x: p.x + HW2, y: p.y },       // 右
    { x: p.x,      y: p.y + HH2 }, // 下
    { x: p.x - HW2, y: p.y },       // 左
  ];
  ctx.save();
  ctx.strokeStyle = 'rgba(60,220,80,0.85)';
  ctx.lineWidth = 2.0;
  const cornerLen = 10;
  for (let ci = 0; ci < 4; ci++) {
    const c0 = corners[ci];
    const c1 = corners[(ci + 1) % 4];
    const c2 = corners[(ci + 3 + 1) % 4]; // prev corner
    // 沿著邊線畫短線（從角點出發）
    const dx01 = c1.x - c0.x, dy01 = c1.y - c0.y;
    const len01 = Math.hypot(dx01, dy01);
    const nx01 = dx01 / len01, ny01 = dy01 / len01;
    ctx.beginPath();
    ctx.moveTo(c0.x, c0.y);
    ctx.lineTo(c0.x + nx01 * cornerLen, c0.y + ny01 * cornerLen);
    ctx.stroke();
    const dx0p = corners[(ci + 3) % 4].x - c0.x, dy0p = corners[(ci + 3) % 4].y - c0.y;
    const len0p = Math.hypot(dx0p, dy0p);
    const nx0p = dx0p / len0p, ny0p = dy0p / len0p;
    ctx.beginPath();
    ctx.moveTo(c0.x, c0.y);
    ctx.lineTo(c0.x + nx0p * cornerLen, c0.y + ny0p * cornerLen);
    ctx.stroke();
  }
  ctx.restore();

  // 上下浮動的綠色箭頭（無旋轉，無桿）
  const floatY = Math.sin(now * 0.0025) * 5;
  const arrowX = p.x;
  const arrowY = p.y - HH2 - 18 + floatY;

  ctx.save();
  ctx.translate(arrowX, arrowY);

  // 箭頭尖（向下三角，無桿）
  ctx.fillStyle = 'rgba(40,210,70,0.92)';
  ctx.strokeStyle = 'rgba(10,80,20,0.7)';
  ctx.lineWidth = 1.0;
  ctx.beginPath();
  ctx.moveTo(-8, 0);
  ctx.lineTo(8, 0);
  ctx.lineTo(0, 10);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  ctx.restore();
}

// 生成貝殼（每張新地圖重新生成，泊松碟取樣精神：均勻分散，最小間距 8 格）
// 地圖級分布：0個（約45%）、1~2個（約50%）、3~5個（約5%）

// ████████████████████████████████████████████████████████████
// § 10  地圖物件生成（貝殼生成、椰子樹生成）
// ████████████████████████████████████████████████████████████
function buildShellObjects() {
  shellObjects = [];
  shellShards = [];
  shellShardSet = new Map();
  const mapSeedNum = (cachedMapSeedNum ^ 0x5348454C) | 0; // XOR "SHEL" 避免與鵝卵石種子衝突
  const MIN_DIST = 8; // 貝殼間最小切比雪夫距離

  // ── 地圖級骰子：用種子決定這張地圖的貝殼上限 ──
  // 0個（45%）、1~2個（50%）、3~5個（5%）
  let mr = (mapSeedNum ^ 0xBEAC01) | 0;
  mr = Math.imul(mr ^ (mr >>> 15), 0xd168aaad); mr = mr ^ (mr >>> 16);
  const roll = (mr >>> 0) % 100; // 0~99
  let MAX_SHELLS;
  if (roll < 45) {
    MAX_SHELLS = 0; // 45%：完全沒有
  } else if (roll < 95) {
    // 50%：1~2個，再擲一次決定是1還是2
    mr = Math.imul(mr ^ (mr >>> 13), 1274126177); mr = mr ^ (mr >>> 16);
    MAX_SHELLS = 1 + ((mr >>> 0) % 2); // 1 或 2
  } else {
    // 5%：3~5個，再擲一次決定確切數量
    mr = Math.imul(mr ^ (mr >>> 13), 1274126177); mr = mr ^ (mr >>> 16);
    MAX_SHELLS = 3 + ((mr >>> 0) % 3); // 3、4 或 5
  }
  if (MAX_SHELLS === 0) return; // 這張地圖不生成貝殼

  // ── 步驟1：收集所有合格候選格（沙地、不緊鄰深水、鄰近1格全為沙地、不與石頭重疊）──
  const candidates = [];
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 1) continue; // 只在沙灘
      // 直接 4 向不能有深水（type -1），避免貝殼貼在懸崖邊緣
      const adjDeepWater = [
        tileAt(gx-1,gy), tileAt(gx+1,gy),
        tileAt(gx,gy-1), tileAt(gx,gy+1)
      ].some(t => t === -1);
      if (adjDeepWater) continue;
      // 鄰近1格（8方向）必須全是沙地(1)
      let allSand = true;
      for (let dy = -1; dy <= 1 && allSand; dy++) {
        for (let dx = -1; dx <= 1 && allSand; dx++) {
          if (dx === 0 && dy === 0) continue;
          if (tileAt(gx + dx, gy + dy) !== 1) allSand = false;
        }
      }
      if (!allSand) continue;
      if (pebbleSet.has(`${gx},${gy}`)) continue; // 不與石頭同格
      candidates.push({ gx, gy });
    }
  }

  // ── 步驟2：用種子做確定性 Fisher-Yates 洗牌（可重現的隨機順序）──
  let rng = (mapSeedNum >>> 0) || 1;
  function nextRng() {
    rng = Math.imul(rng ^ (rng >>> 13), 1274126177);
    rng = rng ^ (rng >>> 16);
    return (rng >>> 0);
  }
  for (let i = candidates.length - 1; i > 0; i--) {
    const j = nextRng() % (i + 1);
    const tmp = candidates[i]; candidates[i] = candidates[j]; candidates[j] = tmp;
  }

  // ── 步驟3：依序挑選，跳過與已選格距離 < MIN_DIST 的候選格，達上限即停──
  const placed = new Set(); // "gx,gy" 快速查詢
  for (const { gx, gy } of candidates) {
    if (shellObjects.length >= MAX_SHELLS) break; // 達到上限
    // 檢查切比雪夫距離
    let tooClose = false;
    for (let dy = -MIN_DIST; dy <= MIN_DIST && !tooClose; dy++) {
      for (let dx = -MIN_DIST; dx <= MIN_DIST && !tooClose; dx++) {
        if (placed.has(`${gx+dx},${gy+dy}`)) tooClose = true;
      }
    }
    if (tooClose) continue;

    // ── 步驟4：用格座標 hash 決定偏移與外形（保留原視覺風格）──
    let h = (gx * 2246822519 + gy * 3266489917 + mapSeedNum) | 0;
    h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
    const hk2 = Math.abs(Math.imul(h ^ (h >>> 9), 374761393));
    const hk3 = Math.abs(Math.imul(hk2 ^ (hk2 >>> 11), 2246822519));
    const ox = ((hk2 % 201) - 100) / 100 * 6;
    const oy = ((hk3 % 201) - 100) / 100 * 3;
    const variant = Math.abs(h) % 3; // 0=螺旋, 1=扇貝, 2=蛤蜊

    shellObjects.push({ gx, gy, ox, oy, variant });
    placed.add(`${gx},${gy}`);
  }
}

// 取得玩家附近（切比雪夫距離 1）可拾取的貝殼碎片刀
function getNearbyShellShard() {
  if (playerCarryCount >= playerCarryCapacity) return null; // 容量已滿不可拾取
  for (const sh of shellShards) {
    const dx = Math.abs(sh.gx - player.tx);
    const dy = Math.abs(sh.gy - player.ty);
    if (dx <= 1 && dy <= 1) return sh;
  }
  return null;
}

// 拾取貝殼碎片刀
function pickUpShellShard(sh) {
  const idx = shellShards.indexOf(sh);
  if (idx !== -1) {
    shellShards.splice(idx, 1);
    shellShardSet.delete(`${sh.gx},${sh.gy}`);
    playerCarryCount++;         // 佔用1格容量
    playerInventoryItems.push('knife'); // 登記物品類型
    playerEquippedKnife = true; // 後台標註：裝備刀子（有刀就算裝備）
    updateInventoryHUD();
    rebuildIpomoaBlockSet();    // 持刀後馬鞍藤變阻擋
  }
}

// 繪製貝殼物件
function drawShellObject(sh) {
  const p = toScreen(sh.gx, sh.gy, tileAt(sh.gx, sh.gy));
  const ox = sh.ox ?? 0;
  const oy = sh.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  // 統一朝向：螺塔左上、開口朝右橫臥
  // variant 只做極小角度微偏（±0.15 rad，約 ±9°）
  const tiltTable = [0.0, 0.12, -0.10];
  const rotAngle = tiltTable[sh.variant % 3];

  ctx.save();
  ctx.translate(px, py - 2);

  // 陰影（左下偏移，等角投影風格）
  ctx.save();
  ctx.globalAlpha = 0.26;
  ctx.beginPath();
  ctx.ellipse(-1, 5, 7, 2.8, Math.PI * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  ctx.rotate(rotAngle);

  // ── 法螺輪廓（橫臥，開口朝右，螺塔朝左上）──

  // 1. 主殼體（橫向膨大橢圓，偏右）
  ctx.beginPath();
  ctx.ellipse(1, 1, 5.5, 4, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#d4a870';
  ctx.fill();
  ctx.strokeStyle = '#8a5c30';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // 2. 螺塔中段（左上方，較小橢圓）
  ctx.beginPath();
  ctx.ellipse(-4, -2, 2.8, 2.0, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#c4926a';
  ctx.fill();
  ctx.strokeStyle = '#7a4c28';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // 3. 螺塔頂尖（最左上，最小）
  ctx.beginPath();
  ctx.ellipse(-6.5, -4, 1.5, 1.1, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#b07850';
  ctx.fill();
  ctx.strokeStyle = '#6a3c20';
  ctx.lineWidth = 0.45;
  ctx.stroke();

  // 4. 開口唇（右側弧線）
  ctx.beginPath();
  ctx.moveTo(5.5, -1.5);
  ctx.bezierCurveTo(8, 0, 8, 3, 5.5, 4.5);
  ctx.strokeStyle = '#6a3c20';
  ctx.lineWidth = 0.9;
  ctx.stroke();

  // 5. 橫紋（螺旋層次）
  for (let ri = 0; ri < 3; ri++) {
    const xt = -1.5 + ri * 1.8;
    ctx.beginPath();
    ctx.ellipse(xt, 1, 0.7, 3.5 - ri * 0.5, Math.PI * 0.08, 0, Math.PI);
    ctx.strokeStyle = `rgba(100,58,25,${0.28 - ri * 0.05})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 6. 高光（左上亮點）
  ctx.beginPath();
  ctx.ellipse(-0.5, -0.5, 2.0, 1.2, Math.PI * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,240,200,0.38)';
  ctx.fill();

  ctx.restore();
}

// 繪製貝殼碎片刀（單一三角形，固定朝向）
function drawShellShard(sh) {
  const p = toScreen(sh.gx, sh.gy, tileAt(sh.gx, sh.gy));
  const ox = sh.ox ?? 0;
  const oy = sh.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  ctx.save();
  ctx.translate(px, py - 3);

  // 陰影
  ctx.save();
  ctx.globalAlpha = 0.22;
  ctx.beginPath();
  ctx.ellipse(1, 5, 6, 2.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  // 固定朝向三角形：尖端右上、底邊左下
  ctx.beginPath();
  ctx.moveTo(5, -6);    // 尖端（右上）
  ctx.lineTo(5, 4);     // 右下
  ctx.lineTo(-4, 3);    // 左下
  ctx.closePath();
  ctx.fillStyle = '#ddd0a8';
  ctx.fill();
  ctx.strokeStyle = '#8a7040';
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // 內側淡色面
  ctx.beginPath();
  ctx.moveTo(4, -4);
  ctx.lineTo(4, 3);
  ctx.lineTo(-2, 2.5);
  ctx.closePath();
  ctx.fillStyle = 'rgba(255,248,220,0.28)';
  ctx.fill();

  ctx.restore();
}

// 更新飛濺碎片動畫
function updateShellFragments(now) {
  for (let i = shellFragments.length - 1; i >= 0; i--) {
    const sf = shellFragments[i];
    const elapsed = now - sf.born;
    if (elapsed >= sf.duration) { shellFragments.splice(i, 1); }
  }
}

// 繪製飛濺碎片動畫
function drawShellFragments(now) {
  for (const sf of shellFragments) {
    const elapsed = now - sf.born;
    const t = Math.min(elapsed / sf.duration, 1);
    // 拋物線飛行
    const lx = sf.startX + (sf.endX - sf.startX) * t;
    const ly = sf.startY + (sf.endY - sf.startY) * t;
    const arcY = ly - Math.sin(Math.PI * t) * sf.arcH;
    const alpha = 1 - t * t;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(lx, arcY);
    ctx.rotate(sf.angle + t * sf.spin);
    // 小碎片
    ctx.beginPath();
    ctx.moveTo(-sf.size, 0); ctx.lineTo(0, -sf.size * 1.5); ctx.lineTo(sf.size, 0); ctx.lineTo(0, sf.size);
    ctx.closePath();
    ctx.fillStyle = sf.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,90,50,0.5)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    ctx.restore();
  }
}

// 處理石頭砸中貝殼
function handlePebbleHitShell(tgx, tgy, isSecondary) {
  const shellIdx = shellObjects.findIndex(s => s.gx === tgx && s.gy === tgy);
  if (shellIdx === -1) return false;

  const shell = shellObjects[shellIdx];
  // 移除貝殼
  shellObjects.splice(shellIdx, 1);

  // 生成 3~4 塊飛濺碎片動畫
  const fragCount = 3 + (Math.random() < 0.5 ? 1 : 0);
  const srcType = tileAt(tgx, tgy);
  const srcP = toScreen(tgx, tgy, srcType);
  const now = performance.now();
  const fragColors = ['#f0c89a', '#e8d8b8', '#f5a07a', '#e8e0cc', '#d0c0a0'];

  const dirs8 = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:1},{dx:-1,dy:1},{dx:1,dy:-1},{dx:-1,dy:-1}];

  // 隨機選 1 個鄰近方向，所有碎片往那個扇區飛
  const baseDir = dirs8[Math.floor(Math.random() * dirs8.length)];
  let landGx = Math.max(0, Math.min(COLS - 1, tgx + baseDir.dx));
  let landGy = Math.max(0, Math.min(ROWS - 1, tgy + baseDir.dy));

  // 若目標格是水，找最近的陸地格
  if (tileAt(landGx, landGy) < 1) {
    const fallback = dirs8.find(d => {
      const nx = tgx + d.dx, ny = tgy + d.dy;
      return tileAt(nx, ny) >= 1;
    });
    if (fallback) {
      landGx = Math.max(0, Math.min(COLS - 1, tgx + fallback.dx));
      landGy = Math.max(0, Math.min(ROWS - 1, tgy + fallback.dy));
    }
  }

  const dstP = toScreen(landGx, landGy, tileAt(landGx, landGy));

  for (let i = 0; i < fragCount; i++) {
    const spread = (Math.random() - 0.5) * 18;
    const spreadY = (Math.random() - 0.5) * 10;
    shellFragments.push({
      startX: srcP.x + (Math.random() - 0.5) * 8,
      startY: srcP.y - 3 + (Math.random() - 0.5) * 4,
      endX: dstP.x + spread,
      endY: dstP.y - 3 + spreadY,
      born: now,
      duration: 280 + Math.random() * 150,
      arcH: 18 + Math.random() * 14,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 8,
      size: 2.5 + Math.random() * 2,
      color: fragColors[Math.floor(Math.random() * fragColors.length)],
    });
  }

  // 80% 機率在鄰近格留下貝殼碎片刀（阻擋）
  if (Math.random() < 0.8) {
    const landType = tileAt(landGx, landGy);
    if (landType >= 1 && !shellShardSet.has(`${landGx},${landGy}`) && !pebbleSet.has(`${landGx},${landGy}`) && !coconutTreeSet.has(`${landGx},${landGy}`)) {
      const newShard = {
        gx: landGx, gy: landGy,
        ox: (Math.random() - 0.5) * 8,
        oy: (Math.random() - 0.5) * 4,
        angle: Math.random() * Math.PI * 2,
      };
      shellShards.push(newShard);
      shellShardSet.set(`${landGx},${landGy}`, newShard);
    }
  }

  return true;
}


// ████████████████████████████████████████████████████████████
// § 11  椰子樹系統
//        狀態：coconutTrees, coconutTreeSet, coconuts
// ████████████████████████████████████████████████████████████
// ═══════════════════════════════════════════════════════
// 🌴 椰子樹系統
// ═══════════════════════════════════════════════════════
let coconutTrees = []; // { gx, gy, shakeAnim: null | {born, dur} }
let coconutTreeSet = new Set(); // 快速查詢用 Set（key = "gx,gy"）
let coconuts = [];     // { gx, gy, ox, oy } 掉落的椰子物件

// 生成椰子樹（每張新地圖重新生成）
function buildCoconutTrees() {
  coconutTrees = [];
  coconutTreeSet = new Set();
  coconuts = [];
  // 用 cachedMapSeedNum XOR 固定偏移，避免與主種子雜湊衝突（原本是 seedFromString(currentSeed + 'CTREE')）
  const mapSeedNum = (cachedMapSeedNum ^ 0x43545245) | 0;
  // 每張地圖決定椰子樹總株數：0株70%, 1株15%, 2株10%, 3株5%
  let h0 = (mapSeedNum * 1234567891) | 0;
  h0 = Math.imul(h0 ^ (h0 >>> 13), 1274126177); h0 = h0 ^ (h0 >>> 16);
  const roll = Math.abs(h0) % 100;
  let treeCount = 0;
  if (roll < 10) treeCount = 0;
  else if (roll < 20) treeCount = 3;
  else if (roll < 50) treeCount = 2;
  else treeCount = 1;
  // else 0

  if (treeCount === 0) return;

  // 計算玩家初始格（與 applySeedStr 邏輯相同）
  let spawnX = Math.floor(COLS * .55), spawnY = Math.floor(ROWS * .45);
  outer2: for (let r = 0; r < Math.max(ROWS, COLS); r++) {
    for (let dy = -r; dy <= r; dy++) for (let dx = -r; dx <= r; dx++) {
      if (Math.abs(dx) !== r && Math.abs(dy) !== r) continue;
      if (tileAt(spawnX + dx, spawnY + dy) === 1 || tileAt(spawnX + dx, spawnY + dy) === 2) {
        spawnX += dx; spawnY += dy; break outer2;
      }
    }
  }

  // 收集可放置的格子（只允許沙地1），且：
  //   - 距海格（type 0 或 -1）> 5 格（切比雪夫距離）
  //   - 不與鵝卵石同格
  //   - 避開玩家初始格
  const candidates = [];
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      const t = MAP[gy][gx];
      if (t !== 1) continue;                          // 只允許沙地
      // 鄰近 2 格內不可是地圖邊界
      if (gx < 2 || gy < 2 || gx >= COLS - 2 || gy >= ROWS - 2) continue;
      // 避開玩家初始格
      if (gx === spawnX && gy === spawnY) continue;
      // 不與鵝卵石同格
      if (pebbleSet.has(`${gx},${gy}`)) continue;
      // 必須距離所有海格（type <= 0）切比雪夫距離 > 5
      let nearWater = false;
      outerWater: for (let dy2 = -5; dy2 <= 5; dy2++) {
        for (let dx2 = -5; dx2 <= 5; dx2++) {
          const nx2 = gx + dx2, ny2 = gy + dy2;
          if (nx2 < 0 || ny2 < 0 || nx2 >= COLS || ny2 >= ROWS) continue;
          if (MAP[ny2][nx2] <= 0) { nearWater = true; break outerWater; }
        }
      }
      if (nearWater) continue;
      // 鄰近 1 格（切比雪夫距離1）不能有草地（type 2）
      let nearGrass = false;
      for (let dy3 = -1; dy3 <= 1 && !nearGrass; dy3++) {
        for (let dx3 = -1; dx3 <= 1 && !nearGrass; dx3++) {
          if (dx3 === 0 && dy3 === 0) continue;
          const nx3 = gx + dx3, ny3 = gy + dy3;
          if (nx3 < 0 || ny3 < 0 || nx3 >= COLS || ny3 >= ROWS) continue;
          if (MAP[ny3][nx3] === 2) nearGrass = true;
        }
      }
      if (nearGrass) continue;
      candidates.push({ gx, gy });
    }
  }

  if (candidates.length === 0) return;

  // 用種子隨機挑選不重複的格子（且與已放置樹保持至少 5 格距離，且距貝殼 > 2 格）
  let hs = (mapSeedNum * 987654321) | 0;
  const placed = new Set();
  const placedCoords = []; // 存已放置樹的座標，供間距檢查
  let attempts = 0;
  let placed_count = 0;
  while (placed_count < treeCount && attempts < candidates.length * 4) {
    hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
    attempts++;
    const idx = Math.abs(hs) % candidates.length;
    const cell = candidates[idx];
    const key = `${cell.gx},${cell.gy}`;
    if (placed.has(key)) continue;
    // 檢查與已放置樹的切比雪夫距離是否至少 5 格
    const tooClose = placedCoords.some(pc => Math.abs(pc.gx - cell.gx) <= 4 && Math.abs(pc.gy - cell.gy) <= 4);
    if (tooClose) continue;
    // 檢查距貝殼必須 > 2 格（切比雪夫距離）
    const nearShell = shellObjects.some(s => Math.abs(s.gx - cell.gx) <= 2 && Math.abs(s.gy - cell.gy) <= 2);
    if (nearShell) continue;
    placed.add(key);
    placedCoords.push({ gx: cell.gx, gy: cell.gy });
    coconutTrees.push({ gx: cell.gx, gy: cell.gy, shakeAnim: null });
    coconutTreeSet.add(key);
    placed_count++;

    // 20% 機率在樹旁鄰近一格生成一顆已掉落的椰子
    hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
    if (((hs >>> 0) % 100) < 20) {
      // 收集鄰近8格中可放的沙地格（type=1，無椰子樹、無石頭）
      const adjCells = [];
      for (let dy3 = -1; dy3 <= 1; dy3++) {
        for (let dx3 = -1; dx3 <= 1; dx3++) {
          if (dx3 === 0 && dy3 === 0) continue;
          const ax = cell.gx + dx3, ay = cell.gy + dy3;
          if (ax < 0 || ay < 0 || ax >= COLS || ay >= ROWS) continue;
          if (MAP[ay][ax] !== 1) continue;
          if (coconutTreeSet.has(`${ax},${ay}`)) continue;
          if (pebbleSet.has(`${ax},${ay}`)) continue;
          adjCells.push({ gx: ax, gy: ay });
        }
      }
      if (adjCells.length > 0) {
        hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
        const pick = adjCells[((hs >>> 0) % adjCells.length)];
        hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
        const landOx = ((hs >>> 0) % 21) - 10; // -10 ~ 10
        hs = Math.imul(hs ^ (hs >>> 13), 1274126177); hs = hs ^ (hs >>> 16);
        const landOy = ((hs >>> 0) % 13) - 6;  // -6 ~ 6
        coconuts.push({ gx: pick.gx, gy: pick.gy, ox: landOx, oy: landOy, state: 'whole' });
      }
    }
  }
}

// 取得玩家一格內的椰子樹（切比雪夫距離1）
function getNearbyCoconutTree() {
  for (const ct of coconutTrees) {
    const dx = Math.abs(ct.gx - player.tx);
    const dy = Math.abs(ct.gy - player.ty);
    if (dx <= 1 && dy <= 1) return ct;
  }
  return null;
}

// 觸發椰子樹搖晃
function shakeCoconutTree(ct, duration) {
  ct.shakeAnim = { born: performance.now(), dur: duration ?? 800 };
}

// 取得椰子樹當前搖晃角度（弧度）
function getTreeShakeAngle(ct) {
  if (!ct.shakeAnim) return 0;
  const elapsed = performance.now() - ct.shakeAnim.born;
  if (elapsed >= ct.shakeAnim.dur) { ct.shakeAnim = null; return 0; }
  const t = elapsed / ct.shakeAnim.dur;
  // 阻尼震盪：從大幅到小幅衰退
  const amp = (1 - t) * 0.04; // 輕微搖晃（原為0.12）
  return Math.sin(t * Math.PI * 6) * amp;
}

// ═══════════════════════════════════════════════════════
// 🥥 椰子落下動畫系統
// ═══════════════════════════════════════════════════════

// ████████████████████████████████████████████████████████████
// § 12  椰子落下動畫 & 椰子纖維系統
//        狀態：fallingCoconuts, cottonYarnObjects, cottonYarnSet
// ████████████████████████████████████████████████████████████
const fallingCoconuts = []; // { startX, startY, endX, endY, tgx, tgy, landOx, landOy, born, duration, phase, bounceV, bounceY }

// ── 椰子纖維系統 ──────────────────────────────────────────
// 從喝空的椰子用刀加工後產生，佔一格背包格子
let cottonYarnObjects = []; // 地圖上的椰子纖維物件 { gx, gy }
let cottonYarnSet = new Set(); // 快速查詢 "gx,gy"

// 繪製椰子纖維（等角視角，深淺咖啡色細絲散佈在格子上）
function drawCottonYarn(cy) {
  const type = tileAt(cy.gx, cy.gy);
  const p = toScreen(cy.gx, cy.gy, type);
  const cx = p.x;
  const cyY = p.y - 2;

  // 用格子座標當 seed，讓每個物件的細絲排列固定但獨特
  const seed = cy.gx * 31 + cy.gy * 17;
  function seededRand(n) {
    let x = Math.sin(seed + n * 127.1) * 43758.5453;
    return x - Math.floor(x);
  }

  ctx.save();
  ctx.translate(cx, cyY);

  // 椰子纖維色盤：深淺不一的咖啡/米色
  const fiberColors = [
    'rgba(90,55,20,0.92)',   // 深棕
    'rgba(110,70,28,0.88)',  // 棕
    'rgba(140,95,45,0.85)',  // 中棕
    'rgba(165,120,60,0.82)', // 淺棕
    'rgba(190,150,85,0.78)', // 米棕
    'rgba(210,175,110,0.72)',// 淺米
    'rgba(100,62,22,0.94)',  // 深棕2
    'rgba(155,105,50,0.84)', // 中棕2
  ];

  const strandCount = 6 + Math.floor(seededRand(0) * 5); // 6~10 條

  // 先繪製陰影（與纖維形狀相同，偏左下方）
  const shadowOX = 2.5, shadowOY = 2.0;
  for (let i = 0; i < strandCount; i++) {
    const baseAngle = seededRand(i * 5 + 2) * Math.PI * 2;
    const len = 12 + seededRand(i * 5 + 3) * 12;
    const startX = (seededRand(i * 5 + 4) - 0.5) * 18;
    const startY = (seededRand(i * 5 + 5) - 0.5) * 8;
    const endX = startX + Math.cos(baseAngle) * len;
    const endY = startY + Math.sin(baseAngle) * len * 0.45;
    const cpX = (startX + endX) * 0.5 + (seededRand(i * 5 + 6) - 0.5) * 9;
    const cpY = (startY + endY) * 0.5 + (seededRand(i * 5 + 7) - 0.5) * 4;

    ctx.beginPath();
    ctx.moveTo(startX + shadowOX, startY + shadowOY);
    ctx.quadraticCurveTo(cpX + shadowOX, cpY + shadowOY, endX + shadowOX, endY + shadowOY);
    ctx.strokeStyle = 'rgba(0,0,0,0.22)';
    ctx.lineWidth = 1.8 + seededRand(i * 5 + 8) * 1.0;
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  // 再繪製纖維本體（較粗）
  for (let i = 0; i < strandCount; i++) {
    const colorIdx = Math.floor(seededRand(i * 5 + 1) * fiberColors.length);
    const col = fiberColors[colorIdx];
    const baseAngle = seededRand(i * 5 + 2) * Math.PI * 2;
    const len = 12 + seededRand(i * 5 + 3) * 12;
    const startX = (seededRand(i * 5 + 4) - 0.5) * 18;
    const startY = (seededRand(i * 5 + 5) - 0.5) * 8;
    const endX = startX + Math.cos(baseAngle) * len;
    const endY = startY + Math.sin(baseAngle) * len * 0.45;
    const cpX = (startX + endX) * 0.5 + (seededRand(i * 5 + 6) - 0.5) * 9;
    const cpY = (startY + endY) * 0.5 + (seededRand(i * 5 + 7) - 0.5) * 4;

    ctx.beginPath();
    ctx.moveTo(startX, startY);
    ctx.quadraticCurveTo(cpX, cpY, endX, endY);
    ctx.strokeStyle = col;
    ctx.lineWidth = 1.8 + seededRand(i * 5 + 8) * 1.0; // 1.8~2.8px（明顯粗）
    ctx.lineCap = 'round';
    ctx.stroke();
  }

  ctx.restore();
}

// 取得玩家鄰近（切比雪夫距離1）的椰子纖維物件（排除製作指標目標）
function getNearbyYarn() {
  const craftTarget = (cottonYarnObjects.length >= 2) ? getBasketCraftTarget() : null;
  for (const y of cottonYarnObjects) {
    // 指標目標不可透過此函式被選中（不可撿）
    if (craftTarget && y.gx === craftTarget.gx && y.gy === craftTarget.gy) continue;
    if (Math.abs(y.gx - player.tx) <= 1 && Math.abs(y.gy - player.ty) <= 1) return y;
  }
  return null;
}

// 拾取椰子纖維（需要背包格子；若為製作指標目標則不可撿）
function pickUpYarn(y) {
  if (!playerHasBackpack) return; // 沒有背包功能則無法拾取
  if (playerCarryCount >= playerCarryCapacity) return; // 背包已滿
  // 若地圖上有 ≥2 個纖維，此物件是製作目標，不可撿取
  if (cottonYarnObjects.length >= 2) {
    const craftTarget = getBasketCraftTarget();
    if (craftTarget && craftTarget.gx === y.gx && craftTarget.gy === y.gy) return;
  }
  const idx = cottonYarnObjects.indexOf(y);
  if (idx === -1) return;
  cottonYarnObjects.splice(idx, 1);
  cottonYarnSet.delete(`${y.gx},${y.gy}`);
  playerCarryCount++;
  playerInventoryItems.push('yarn');
  updateInventoryHUD();
  refreshInventoryBlockedState();
}

// ── 椰子劈開煙霧動畫 ──────────────────────────────────────
// { gx, gy, born, duration, particles: [{ox,oy,vx,vy,r,alpha}] }

// ████████████████████████████████████████████████████████████
// § 13  煙霧特效系統（椰子/錨點/肉/藤蔓煙霧共用）
//        狀態：coconutSmokes
// ████████████████████████████████████████████████████████████
const coconutSmokes = [];

function addCoconutSmoke(gx, gy) {
  const particles = [];
  for (let i = 0; i < 14; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.4 + Math.random() * 0.9;
    particles.push({
      ox: (Math.random() - 0.5) * 10,
      oy: (Math.random() - 0.5) * 6 - 4,
      vx: Math.cos(angle) * speed * 0.7,
      vy: Math.sin(angle) * speed * 0.4 - 0.6,
      r: 3 + Math.random() * 5,
      alpha: 0.55 + Math.random() * 0.25,
    });
  }
  coconutSmokes.push({ gx, gy, born: performance.now(), duration: 1000, particles });
}

function updateCoconutSmokes(now) {
  for (let i = coconutSmokes.length - 1; i >= 0; i--) {
    const sm = coconutSmokes[i];
    const elapsed = now - sm.born;
    if (elapsed >= sm.duration) { coconutSmokes.splice(i, 1); continue; }
    const t = elapsed / sm.duration;
    for (const p of sm.particles) {
      p.ox += p.vx;
      p.oy += p.vy;
      p.vy -= 0.02; // 輕微上浮
      p.alpha = (0.55 + p.alpha * 0.5) * (1 - t * t);
    }
  }
}

function drawCoconutSmokesAt(gx, gy, px, py) {
  for (const sm of coconutSmokes) {
    if (sm.gx !== gx || sm.gy !== gy) continue;
    const elapsed = performance.now() - sm.born;
    const t = elapsed / sm.duration;
    for (const p of sm.particles) {
      const alpha = Math.max(0, (1 - t * t) * (sm.isAnchor ? 0.72 : 0.5));
      ctx.save();
      ctx.globalAlpha = alpha;
      if (sm.isAnchor) {
        // 錨點煙霧：帶色彩、加外光暈
        ctx.shadowColor = p.color;
        ctx.shadowBlur  = 8;
        ctx.fillStyle   = p.color;
      } else {
        ctx.fillStyle   = 'rgba(210,200,180,1)';
      }
      ctx.beginPath();
      ctx.ellipse(px + p.ox, py + p.oy - 6, p.r, p.r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  }
}

// 獨立繪製錨點煙霧（isAnchor:true 的粒子），不依賴椰子繪製流程
function drawAnchorSmokes() {
  for (const sm of coconutSmokes) {
    if (!sm.isAnchor) continue;
    const type = tileAt(sm.gx, sm.gy);
    const p    = toScreen(sm.gx, sm.gy, type);
    drawCoconutSmokesAt(sm.gx, sm.gy, p.x, p.y);
  }
}

// 獨立繪製吃肉煙霧（isMeat:true 的粒子），不依賴椰子繪製流程
function drawMeatSmokes() {
  for (const sm of coconutSmokes) {
    if (!sm.isMeat) continue;
    const type = tileAt(sm.gx, sm.gy);
    const p    = toScreen(sm.gx, sm.gy, type);
    drawCoconutSmokesAt(sm.gx, sm.gy, p.x, p.y);
  }
}

// 獨立繪製切割藤蔓煙霧（isVine:true 的粒子）
function drawVineSmokes() {
  for (const sm of coconutSmokes) {
    if (!sm.isVine) continue;
    const type = tileAt(sm.gx, sm.gy);
    const p    = toScreen(sm.gx, sm.gy, type);
    drawCoconutSmokesAt(sm.gx, sm.gy, p.x, p.y);
