// 繪製玩家頭上的飢渴警示圖示

// ████████████████████████████████████████████████████████████
// § 23  渲染：飢渴警示圖示（水滴 & 雞腿）
// ████████████████████████████████████████████████████████████
function drawSurvivalIcons() {
  const showThirst = playerThirst < 8;
  const showHunger = playerHunger < 8;
  if (!showThirst && !showHunger) return;

  const rGx = Math.round(player.gx), rGy = Math.round(player.gy);
  const type = tileAt(rGx, rGy);
  const p = toScreen(player.gx, player.gy, type);

  // 與 drawPlayer 相同的下沉偏移：深海 +40，淺海 +10，陸地 0
  const sd = (type === -1) ? 40 : (type === 0) ? 10 : 0;

  const baseX = p.x;
  const baseY = p.y - 78 + sd;

  // 各自判斷危急狀態（修正：不再共用同一個 isCritical）
  const thirstCritical = (playerThirst <= 0);
  const hungerCritical = (playerHunger <= 0);

  const icons = [];
  if (showThirst) icons.push({ kind: 'thirst', critical: thirstCritical });
  if (showHunger) icons.push({ kind: 'hunger', critical: hungerCritical });

  const iconW = 13;
  const gap = 4;
  const totalW = icons.length * iconW + (icons.length - 1) * gap;
  const startX = baseX - totalW / 2 + iconW / 2;

  icons.forEach((ic, i) => {
    const ix = startX + i * (iconW + gap);
    // 各自跳動
    const bounce = ic.critical
      ? Math.sin(statusIconPhase * 4) * 4
      : Math.sin(statusIconPhase * 1.5) * 1.5;
    const iy = baseY + bounce;

    ctx.save();
    if (ic.critical) {
      const pulse = (Math.sin(statusIconPhase * 5) + 1) / 2;
      ctx.shadowColor = `rgba(255,60,60,${0.6 + pulse * 0.4})`;
      ctx.shadowBlur = 6 + pulse * 5;
    }
    ctx.translate(ix, iy);
    ctx.scale(0.5, 0.5);
    if (ic.kind === 'thirst') {
      drawThirstIcon(0, 0, ic.critical);
    } else {
      drawHungerIcon(0, 0, ic.critical);
    }
    ctx.restore();
  });
}

// 水滴圖示
function drawThirstIcon(x, y, critical) {
  ctx.save();
  ctx.translate(x, y);

  const alpha = critical ? 0.90 : 0.55;
  ctx.globalAlpha = alpha;

  const dropColor  = critical ? '#e03333' : '#4aaee8';
  const dropStroke = critical ? '#aa1111' : '#2278bb';

  // 水滴主體：尖端朝上，圓弧底部
  ctx.beginPath();
  ctx.moveTo(0, -12);                          // 尖端頂部
  ctx.bezierCurveTo(4, -5,  7,  1,  7,  5); // 右側弧
  ctx.bezierCurveTo(7, 12,  -7, 12, -7,  5); // 底部圓弧
  ctx.bezierCurveTo(-7,  1,  -4, -5,   0, -12); // 左側弧
  ctx.closePath();
  ctx.fillStyle = dropColor;
  ctx.fill();
  ctx.strokeStyle = dropStroke;
  ctx.lineWidth = 1.0;
  ctx.stroke();

  // 白色橢圓高光
  ctx.save();
  ctx.globalAlpha = alpha * 0.75;
  ctx.beginPath();
  ctx.ellipse(3, 4, 1.7, 2.5, -0.3, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fill();
  ctx.restore();

  ctx.restore();
}

// 帶骨雞腿圖示（仿參考圖：斜放雞腿，棕色肉塊+米白骨柄+末端圓球）
function drawHungerIcon(x, y, critical) {
  ctx.save();
  ctx.translate(x, y);

  const alpha = critical ? 0.90 : 0.55;
  ctx.globalAlpha = alpha;

  // 旋轉約 -35度（斜放雞腿，肉朝左上，骨柄朝右下）
  ctx.rotate(-0.6);

  const meatColor  = critical ? '#dd3333' : '#c8622a';
  const meatDark   = critical ? '#aa1111' : '#8a3a10';
  const boneColor  = critical ? '#ffcccc' : '#e8d5b0';
  const boneDark   = critical ? '#cc3333' : '#b8a070';

  // ── 骨柄（下方細長部分）──
  // 主幹（細長矩形圓角）
  ctx.beginPath();
  ctx.roundRect(-2.5, -1, 5, 10, 2.5);
  ctx.fillStyle = boneColor;
  ctx.fill();
  ctx.strokeStyle = boneDark;
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // 骨柄末端大圓球（右下）
  ctx.beginPath();
  ctx.arc(2, 10, 3.5, 0, Math.PI * 2);
  ctx.fillStyle = boneColor;
  ctx.fill();
  ctx.strokeStyle = boneDark;
  ctx.lineWidth = 0.8;
  ctx.stroke();

  // 骨柄末端小副球（側邊）
  ctx.beginPath();
  ctx.arc(-3, 9, 2.8, 0, Math.PI * 2);
  ctx.fillStyle = boneColor;
  ctx.fill();
  ctx.strokeStyle = boneDark;
  ctx.lineWidth = 0.7;
  ctx.stroke();

  // ── 肉塊（上方渾圓部分）──
  ctx.beginPath();
  ctx.ellipse(0, -8, 9, 10, 0, 0, Math.PI * 2);
  ctx.fillStyle = meatColor;
  ctx.fill();
  ctx.strokeStyle = meatDark;
  ctx.lineWidth = 0.9;
  ctx.stroke();

  // 肉塊高光（左上淡色橢圓，仿立體感）
  ctx.save();
  ctx.globalAlpha = alpha * 0.45;
  ctx.beginPath();
  ctx.ellipse(-2.5, -6.5, 3.5, 4, -0.4, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,210,160,0.9)';
  ctx.fill();
  ctx.restore();

  // 肉塊陰影邊（右下深色，增加立體感）
  ctx.save();
  ctx.globalAlpha = alpha * 0.30;
  ctx.beginPath();
  ctx.ellipse(2, -2, 5, 6, 0.3, 0.3, Math.PI);
  ctx.fillStyle = meatDark;
  ctx.fill();
  ctx.restore();

  ctx.restore();
}


// ████████████████████████████████████████████████████████████
// § 24  輸入系統（鍵盤 + 滑鼠 + 觸控）
//        狀態：held, hoverTile, boundaryCooldown, lastTapTime/X/Y
// ████████████████████████████████████████████████████████████
window.addEventListener('keydown', e => {
  // 過場進行中忽略所有鍵盤輸入
  if (fadeState !== 'idle') return;
  if (isDead) return;
  held.add(e.key);
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
  // 空白鍵：優先順序：錨點 > 吃肉 > 可放背包物件(碎片刀/纖維/藤蔓) > 石頭 > 椰子互動(有刀) > 搖樹 > 無法互動物件最後
  if (e.key === ' ') {
    if (tryPickupQuantumAnchor()) { e.preventDefault(); return; }
    const nearMeat = getNearbyMeat();
    if (nearMeat) { eatMeat(nearMeat); e.preventDefault(); return; }
    // 可放進背包的物件優先
    const sh = getNearbyShellShard();
    if (sh) { pickUpShellShard(sh); e.preventDefault(); return; }
    const nearY = getNearbyYarn();
    if (nearY) { pickUpYarn(nearY); e.preventDefault(); return; }
    const nv = getNearbyVine();
    if (nv) { pickUpCutVine(nv); e.preventDefault(); return; }
    // 石頭（不放背包，優先於搖樹但低於背包物件）
    const pb = getNearbyPebble();
    if (pb) { pickUpPebble(pb); e.preventDefault(); return; }
    // 木頭（與石頭優先級相同，只能二擇一）
    const wd = getNearbyWood();
    if (wd) { pickUpWood(wd); e.preventDefault(); return; }
    // 椰子互動：有刀時可互動，無刀時 tryInteractCoconut 返回 false
    if (tryInteractCoconut()) { e.preventDefault(); return; }
    // 搖晃椰子樹（比無法互動的椰子優先）
    const ct = getNearbyCoconutTree();
    if (ct) { shakeCoconutTree(ct, 700); e.preventDefault(); return; }
    // 無法互動的椰子（無刀時 whole 椰子）：最低優先，目前無動作可執行
  }
});
window.addEventListener('keyup', e => held.delete(e.key));
// 視窗失焦時清空 held，避免「Alt+Tab 切換後按鍵卡住」問題
window.addEventListener('blur', () => held.clear());

// ── 滑鼠 / 觸控點擊移動 ──────────────────────────────────
// 將螢幕座標（canvas邏輯座標）反推為等角格子座標
function screenToIso(sx, sy) {
  const {ox, oy} = mapOrigin();
  // 建議統一使用固定高度（如 0）作為點擊平面，
  // 或者使用一個中間值，避免滑鼠與格子的視覺距離因玩家位置而變動。
  const elev = 15; 
  const adjY = sy - oy + elev;
  const diffX = (sx - ox) / HW;
  const sumXY = adjY / HH;
  return { gx: (diffX + sumXY) / 2, gy: (sumXY - diffX) / 2 };
}

// 根據點擊的等角座標，決定應往哪個方向走一格
function moveTowardIso(isoX, isoY) {
  if (fadeState !== 'idle') return;
  // 相對於玩家目前目標格的偏移
  const dx = isoX - player.tx;
  const dy = isoY - player.ty;
  if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return;

  // 等角座標中四個方向：
  //   dir 0 (right/東北): gx+1, gy-0  → dx>0, dy<0
  //   dir 1 (down/東南):  gx+1, gy+0  → dx>0, dy>0  (實際上 gx↑ = 往右下)
  //   dir 2 (left/西南):  gx-0, gy+1  → dx<0, dy>0
  //   dir 3 (up/西北):    gx-1, gy+0  → dx<0, dy<0
  // 以 45° 分界線切四象限，再挑主要軸
  let stepX = 0, stepY = 0;
  if (Math.abs(dx) >= Math.abs(dy)) {
    stepX = dx > 0 ? 1 : -1;
  } else {
    stepY = dy > 0 ? 1 : -1;
  }

  // 對應 WASD 方向定義：W=(-1,0)dir3, S=(1,0)dir1, A=(0,1)dir2, D=(0,-1)dir0
  if      (stepX === -1) player.dir = 3;
  else if (stepX ===  1) player.dir = 1;
  else if (stepY ===  1) player.dir = 2;
  else if (stepY === -1) player.dir = 0;

  const nx = player.tx + stepX;
  const ny = player.ty + stepY;

  if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) {
    if (boundaryCooldown <= 0) {
      boundaryCooldown = 30;
      let exitSide, edgeCoord;
      if (nx < 0)       { exitSide='left';   edgeCoord=player.ty; }
      else if (nx>=COLS) { exitSide='right';  edgeCoord=player.ty; }
      else if (ny < 0)   { exitSide='top';    edgeCoord=player.tx; }
      else                { exitSide='bottom'; edgeCoord=player.tx; }
      held.clear();
      crossMapBoundary(exitSide, edgeCoord);
    }
    return;
  }
  if (!isWalkable(nx, ny)) return;

  const cT = tileAt(player.tx, player.ty), nT = tileAt(nx, ny);
  if (cT === 0  && nT === -1) addSplash(nx, ny);
  if (cT === -1 && nT ===  0) startBodyDrip(1.0);
  if (cT === 0  && nT ===  1) startBodyDrip(0.65);
  if ((cT === 0 || cT === -1) && nT >= 1) footprintBudget = FOOTPRINT_COUNT;
  if (footprintBudget > 0 && nT >= 1) { addFootprint(nx, ny, stepFoot, player.dir); stepFoot = 1 - stepFoot; footprintBudget--; }
  if (nT === 0) addRipple(nx, ny);
  if (nT === 2) trampleGrass(nx, ny);
  player.tx = nx; player.ty = ny;
}

// 取得事件在 canvas 邏輯座標中的位置（處理CSS縮放）
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cw = canvas.width;  // 1280
  const ch = canvas.height; // 720
  
  // 計算實際縮放比例
  const scale = Math.min(rect.width / cw, rect.height / ch);
  
  // 計算畫布內容在元素內部的實際起始點（扣除黑邊）
  const offsetX = (rect.width - cw * scale) / 2;
  const offsetY = (rect.height - ch * scale) / 2;

  return {
    sx: (clientX - rect.left - offsetX) / scale,
    sy: (clientY - rect.top - offsetY) / scale
  };
}

// ── 滑鼠點擊（桌面）──────────────────────────────────────
// 桌面端行為保持不變：
//   未持石：點擊石頭拾取（近距離）；其他格子移動
//   持石中：點擊任意格子投擲
canvas.addEventListener('click', e => {
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;
  if (fadeState !== 'idle') return;
  if (isDead) return;
  const {sx, sy} = getCanvasPos(e.clientX, e.clientY);

  // 持有鵝卵石時：點擊任意格子觸發投擲（桌面保持原本行為）
  if (playerHoldingPebble && !throwAnim) {
    const iso = screenToIso(sx, sy);
    const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
    if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
      throwPebble(tgx, tgy);
      return;
    }
  }
  // 持有木頭時：點擊任意格子觸發投擲
  if (playerHoldingWood && !throwAnim) {
    const iso = screenToIso(sx, sy);
    const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
    if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
      throwWood(tgx, tgy);
      return;
    }
  }

  if (!playerHoldingPebble) {
    // 嘗試拾取量子錨點
    if (tryPickupQuantumAnchor()) return;
    // 吃附近的肉
    const nearMeat = getNearbyMeat();
    if (nearMeat) { eatMeat(nearMeat); return; }
    // 可放進背包的物件優先：碎片刀 > 椰子纖維 > 切割藤蔓
    const nearbySh0 = getNearbyShellShard();
    if (nearbySh0) {
      const ps = toScreen(nearbySh0.gx, nearbySh0.gy, tileAt(nearbySh0.gx, nearbySh0.gy));
      if (Math.hypot(sx - ps.x, sy - (ps.y - 3)) < 52) { pickUpShellShard(nearbySh0); return; }
    }
    const nearbyY0 = getNearbyYarn();
    if (nearbyY0) {
      const ps = toScreen(nearbyY0.gx, nearbyY0.gy, tileAt(nearbyY0.gx, nearbyY0.gy));
      if (Math.hypot(sx - ps.x, sy - (ps.y - 8)) < 52) { pickUpYarn(nearbyY0); return; }
    }
    const nearbyV0 = getNearbyVine();
    if (nearbyV0) {
      const ps = toScreen(nearbyV0.gx, nearbyV0.gy, tileAt(nearbyV0.gx, nearbyV0.gy));
      if (Math.hypot(sx - ps.x, sy - ps.y) < 52) { pickUpCutVine(nearbyV0); return; }
    }
    // 石頭（比椰子樹優先，但低於背包物件）
    const nearbyPb0 = getNearbyPebble();
    if (nearbyPb0) {
      const ps = toScreen(nearbyPb0.gx, nearbyPb0.gy, tileAt(nearbyPb0.gx, nearbyPb0.gy));
      if (Math.hypot(sx - ps.x, sy - (ps.y - 4)) < 52) { pickUpPebble(nearbyPb0); return; }
    }
    // 木頭（與石頭同優先級，只能二擇一）
    const nearbyWd0 = getNearbyWood();
    if (nearbyWd0) {
      const ps = toScreen(nearbyWd0.gx, nearbyWd0.gy, tileAt(nearbyWd0.gx, nearbyWd0.gy));
      if (Math.hypot(sx - ps.x, sy - (ps.y - 6)) < 58) { pickUpWood(nearbyWd0); return; }
    }
    // 椰子互動（有刀時才成功）
    if (tryInteractCoconut()) return;
    // 馬鞍藤切割（裝備刀時）
    if (tryInteractIpomoea()) return;
    // 搖晃椰子樹（比無法互動的椰子優先）
    const nearCT = getNearbyCoconutTree();
    if (nearCT) {
      shakeCoconutTree(nearCT, 700);
      return;
    }
  }

  if (!playerHoldingPebble) {
    // 拾取附近的編織籃子
    const nearBk = getNearbyBasket();
    if (nearBk) {
      const ps = toScreen(nearBk.gx, nearBk.gy, tileAt(nearBk.gx, nearBk.gy));
      const d = Math.hypot(sx - ps.x, sy - (ps.y - 4));
      if (d < 55) { pickUpBasket(nearBk); return; }
    }
    // 點擊椰子纖維製作籃子
    if (cottonYarnObjects.length >= 2) {
      const iso0 = screenToIso(sx, sy);
      const tgx0 = Math.round(iso0.gx), tgy0 = Math.round(iso0.gy);
      if (tryMakeBasket(tgx0, tgy0)) return;
    }
  }
  const iso = screenToIso(sx, sy);
  moveTowardIso(iso.gx, iso.gy);
});

// ── 觸控雙擊偵測狀態 ─────────────────────────────────────
// 觸控端的互動邏輯（與桌面滑鼠分開）：
//   未持石：單擊→移動；雙擊近距石頭→拾取
//   持石中：單擊→移動；雙擊任意格子→投擲
const DOUBLE_TAP_MS = 320; // 雙擊時間窗口（毫秒）
let lastTapTime   = 0;
let lastTapX      = 0;
let lastTapY      = 0;
const DOUBLE_TAP_DIST = 60; // 兩次點擊距離上限（像素）

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (fadeState !== 'idle') return;
  if (isDead) return;
  const touch = e.changedTouches[0];
  const {sx, sy} = getCanvasPos(touch.clientX, touch.clientY);
  const now = performance.now();

  const timeSinceLast = now - lastTapTime;
  const distFromLast  = Math.hypot(sx - lastTapX, sy - lastTapY);
  const isDoubleTap   = timeSinceLast < DOUBLE_TAP_MS && distFromLast < DOUBLE_TAP_DIST;

  // 記錄本次點擊，供下次判斷
  lastTapTime = now;
  lastTapX = sx;
  lastTapY = sy;

  // 角色還在移動插值中，忽略輸入（避免連點亂跑）
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;

  if (isDoubleTap) {
    // ── 雙擊 ──────────────────────────────────
    if (!playerHoldingPebble) {
      // 未持石：優先嘗試拾取量子錨點
      if (tryPickupQuantumAnchor()) { lastTapTime = 0; return; }
      // 雙擊吃肉
      const nearMeat = getNearbyMeat();
      if (nearMeat) { eatMeat(nearMeat); lastTapTime = 0; return; }
      // 可放進背包的物件優先：碎片刀 > 椰子纖維 > 切割藤蔓
      const nearbySh = getNearbyShellShard();
      if (nearbySh) {
        const ps = toScreen(nearbySh.gx, nearbySh.gy, tileAt(nearbySh.gx, nearbySh.gy));
        if (Math.hypot(sx - ps.x, sy - (ps.y - 3)) < 65) { pickUpShellShard(nearbySh); lastTapTime = 0; return; }
      }
      const nearbyY = getNearbyYarn();
      if (nearbyY) {
        const ps = toScreen(nearbyY.gx, nearbyY.gy, tileAt(nearbyY.gx, nearbyY.gy));
        if (Math.hypot(sx - ps.x, sy - (ps.y - 8)) < 65) { pickUpYarn(nearbyY); lastTapTime = 0; return; }
      }
      const nearbyV = getNearbyVine();
      if (nearbyV) {
        const ps = toScreen(nearbyV.gx, nearbyV.gy, tileAt(nearbyV.gx, nearbyV.gy));
        if (Math.hypot(sx - ps.x, sy - ps.y) < 65) { pickUpCutVine(nearbyV); lastTapTime = 0; return; }
      }
      // 石頭（低於背包物件）
      const nearbyPb = getNearbyPebble();
      if (nearbyPb) {
        const ps = toScreen(nearbyPb.gx, nearbyPb.gy, tileAt(nearbyPb.gx, nearbyPb.gy));
        const d = Math.hypot(sx - ps.x, sy - (ps.y - 4));
        if (d < 65) {
          pickUpPebble(nearbyPb);
          lastTapTime = 0; // 重置，避免三擊誤觸
          return;
        }
      }
      // 木頭
      const nearbyWd = getNearbyWood();
      if (nearbyWd) {
        const ps = toScreen(nearbyWd.gx, nearbyWd.gy, tileAt(nearbyWd.gx, nearbyWd.gy));
        if (Math.hypot(sx - ps.x, sy - (ps.y - 6)) < 68) { pickUpWood(nearbyWd); lastTapTime = 0; return; }
      }
      // 雙擊編織籃子拾取
      const nearBkDt = getNearbyBasket();
      if (nearBkDt) {
        const ps = toScreen(nearBkDt.gx, nearBkDt.gy, tileAt(nearBkDt.gx, nearBkDt.gy));
        if (Math.hypot(sx - ps.x, sy - (ps.y - 4)) < 65) {
          pickUpBasket(nearBkDt); lastTapTime = 0; return;
        }
      }
      // 雙擊椰子纖維製作籃子
      if (cottonYarnObjects.length >= 2) {
        const iso0 = screenToIso(sx, sy);
        const tgx0 = Math.round(iso0.gx), tgy0 = Math.round(iso0.gy);
        if (tryMakeBasket(tgx0, tgy0)) { lastTapTime = 0; return; }
      }
      // 雙擊椰子互動（裝備刀時才成功）
      if (tryInteractCoconut()) { lastTapTime = 0; return; }
    } else {
      // 持石中：雙擊目標格→投擲
      if (!throwAnim) {
        const iso = screenToIso(sx, sy);
        const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
        if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
          throwPebble(tgx, tgy);
          lastTapTime = 0;
          return;
        }
      }
    }
    // 持木頭中：雙擊→投擲
    if (playerHoldingWood && !throwAnim) {
      const iso = screenToIso(sx, sy);
      const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
      if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
        throwWood(tgx, tgy);
        lastTapTime = 0;
        return;
      }
    }
    // 雙擊但未命中石頭/投擲目標：仍執行移動
    const iso = screenToIso(sx, sy);
    moveTowardIso(iso.gx, iso.gy);
  } else {
    // ── 單擊 → 移動（不論是否持石） ──────────────
    const iso = screenToIso(sx, sy);
    const tgx = Math.round(iso.gx);
    const tgy = Math.round(iso.gy);

    // 新增功能：若未持石且點擊身邊的椰子樹，觸發搖晃
    if (!playerHoldingPebble) {
      // 裝備刀時，單擊也可與椰子互動
      if (tryInteractCoconut()) return;
      // 裝備刀時，單擊也可切割馬鞍藤
      if (tryInteractIpomoea()) return;
      // 單擊拾取編織籃子
      const nearBkSt = getNearbyBasket();
      if (nearBkSt) {
        const ps = toScreen(nearBkSt.gx, nearBkSt.gy, tileAt(nearBkSt.gx, nearBkSt.gy));
        if (Math.hypot(sx - ps.x, sy - (ps.y - 4)) < 55) {
          pickUpBasket(nearBkSt); return;
        }
      }
      // 單擊椰子纖維製作籃子
      if (cottonYarnObjects.length >= 2) {
        if (tryMakeBasket(tgx, tgy)) return;
      }
      const nearCT = getNearbyCoconutTree(); // 獲取身邊 1 格內的椰子樹
      // 如果身邊有樹，且點擊的座標 (tgx, tgy) 正好是該樹的位置
      // 注意：搖樹優先於無法互動的椰子（無刀且whole），但低於有刀互動
      if (nearCT && tgx === nearCT.gx && tgy === nearCT.gy) {
        shakeCoconutTree(nearCT, 700);
        return; // 搖晃後直接返回，不執行移動
      }
    }
    // 若不符合搖樹條件，執行原本的移動功能
    moveTowardIso(iso.gx, iso.gy);
  }
}, { passive: false });

// 防止觸控時頁面滾動
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
// ─────────────────────────────────────────────────────────

let boundaryCooldown = 0;


// ████████████████████████████████████████████████████████████
// § 25  主迴圈（update & render）
// ████████████████████████████████████████████████████████████
function update(){
  tickFade();
  tickFlash();
  updateSurvivalStats();
  updateOxygenSystem();
  if (isDead) return; // 死亡後停止更新

  // 移動速度：飢渴任一歸零時減半
  const survivalSlow = (playerThirst <= 0 || playerHunger <= 0);
  // 插值移動：當差值夠小時直接對齊，避免指數衰減永遠無法收斂到解鎖條件
  const snapThreshold = 0.05;
  const lerpSpeed = survivalSlow ? 0.14 : 0.28;
  player.gx += (player.tx - player.gx) * lerpSpeed;
  player.gy += (player.ty - player.gy) * lerpSpeed;
  if (Math.abs(player.tx - player.gx) < snapThreshold) player.gx = player.tx;
  if (Math.abs(player.ty - player.gy) < snapThreshold) player.gy = player.ty;
  if(boundaryCooldown>0) boundaryCooldown--;
  // 過場進行中禁止移動輸入
  const transitioning = (fadeState !== 'idle');
  if(!transitioning&&!(Math.abs(player.tx-player.gx)>0.15||Math.abs(player.ty-player.gy)>0.15)){
    let dx=0, dy=0;
    if(held.has('ArrowUp')||held.has('w')){dx=-1;dy=0;player.dir=3;}
    else if(held.has('ArrowDown')||held.has('s')){dx=1;dy=0;player.dir=1;}
    else if(held.has('ArrowLeft')||held.has('a')){dx=0;dy=1;player.dir=2;}
    else if(held.has('ArrowRight')||held.has('d')){dx=0;dy=-1;player.dir=0;}
    if(dx!==0||dy!==0){
      const nx=player.tx+dx, ny=player.ty+dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS){
        if(boundaryCooldown<=0){
          boundaryCooldown=30;
          // 判斷出口方向
          let exitSide, edgeCoord;
          if (nx < 0)      { exitSide='left';   edgeCoord=player.ty; }
          else if (nx>=COLS){ exitSide='right';  edgeCoord=player.ty; }
          else if (ny < 0)  { exitSide='top';    edgeCoord=player.tx; }
          else               { exitSide='bottom'; edgeCoord=player.tx; }
          held.clear();
          crossMapBoundary(exitSide, edgeCoord);
        }
      } else if(isWalkable(nx,ny)){
        const cT=tileAt(player.tx,player.ty), nT=tileAt(nx,ny);
        if(cT===0 && nT===-1) addSplash(nx, ny);
        if(cT===-1 && nT===0) startBodyDrip(1.0);
        if(cT===0 && nT===1) startBodyDrip(0.65);
        if((cT===0||cT===-1)&&nT>=1) footprintBudget=FOOTPRINT_COUNT;
        if(footprintBudget>0&&nT>=1){ addFootprint(nx,ny,stepFoot,player.dir); stepFoot=1-stepFoot; footprintBudget--; }
        if(nT===0) addRipple(nx,ny); if(nT===2) trampleGrass(nx,ny);
        player.tx=nx; player.ty=ny;
      }
    }
  }
  const curT=tileAt(Math.round(player.gx), Math.round(player.gy));
  if (curT===-1 && player.frame%30===0) {
    let fx=0,fy=0; if(player.dir===0)fy=-1;else if(player.dir===1)fx=1;else if(player.dir===2)fy=1;else fx=-1;
    if(tileAt(Math.round(player.gx)+fx,Math.round(player.gy)+fy)<1) {
      const sb = {gx:Math.round(player.gx)+fx, gy:Math.round(player.gy)+fy, ox:Math.random()*30-15, oy:Math.random()*10-5, r:1+Math.random()*2, alpha:1, born:performance.now(), life:1200+Math.random()*800};
      surfaceBubbles.push(sb);
      const sbKey = `${sb.gx},${sb.gy}`;
      if (!surfaceBubbleMap.has(sbKey)) surfaceBubbleMap.set(sbKey, []);
      surfaceBubbleMap.get(sbKey).push(sb);
    }
  }
  player.frame++; wavePhase+=0.04; const now=performance.now();
  updateExclamation(now);
  updateFootprints(now); updateRipples(now); updateSurfaceBubbles(); updateSplashDrops(now); updateBodyDroplets(now); updateFishes(now);
  updateThrowAnim(now); updatePebbleSplashes(now); updateSecondaryThrows(now); updateFallingCoconuts(now); updateShellFragments(now); updateCoconutSmokes(now);
  updateFloatingWoods(now);
  updateSeagullTimer(now);
}

function render(){
  const now2 = performance.now();

  ctx.fillStyle = bgGradient; ctx.fillRect(0, 0, canvas.width, canvas.height);

  for(let s=0;s<ROWS+COLS-1;s++) for(let gx=0;gx<COLS;gx++){ let gy=s-gx; if(gy>=0&&gy<ROWS) drawTile(gx,gy); }
  // 在玩家同層前，依等角順序繪製鵝卵石物件
  const sortedPb = pebbleObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const pb of sortedPb) drawPebbleObject(pb);
  // 繪製木頭物件（與石頭同層）
  const sortedWd = woodObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const wd of sortedWd) drawWoodObject(wd);
  // 繪製浮木（在水面上）
  drawFloatingWoods(now2);
  // 繪製貝殼（不阻擋，地面裝飾）
  const sortedSh = shellObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const sh of sortedSh) drawShellObject(sh);
  // 繪製貝殼碎片刀（阻擋物件，與石頭同層）
  const sortedShard = shellShards.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const sh of sortedShard) drawShellShard(sh);
  // 繪製切割後的藤蔓（阻擋物件）
  const sortedVines = cutVines.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const cv of sortedVines) drawCutVine(cv);
  // 繪製編織籃子
  const sortedBaskets = basketObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const bk of sortedBaskets) drawBasketObject(bk);
  // 繪製椰子纖維
  const sortedYarns = cottonYarnObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const y of sortedYarns) drawCottonYarn(y);
  drawAllFishes();
  // ── 深度排序：椰子樹、靜止椰子、落下椰子 & 玩家交錯繪製（painter's algorithm）──
  // 關鍵修正：椰子樹與靜止椰子合併成同一個深度列表交錯排序，
  // 避免落在樹「後面格子」的椰子浮在樹的上面
  {
    const playerDepth = player.gx + player.gy;

    // 把椰子樹和靜止椰子合成一個列表，統一依 gx+gy 深度排序
    const treeItems    = coconutTrees.map(ct => ({ depth: ct.gx + ct.gy, type: 'tree', obj: ct }));
    const coconutItems = coconuts.map(c  => ({ depth: c.gx  + c.gy,  type: 'coconut', obj: c }));
    // 低空/降落狀態的海鷗也加入深度排序，避免浮在椰子樹前
    const seagullItems = (seagull && seagull.state !== 'dead' && seagull.altitude < 0.15)
      ? [{ depth: seagull.gx + seagull.gy, type: 'seagull', obj: seagull }]
      : [];
    const staticItems  = [...treeItems, ...coconutItems, ...seagullItems].sort((a, b) => a.depth - b.depth);

    const sortedFalling = fallingCoconuts.slice().sort((a, b) => (a.tgx + a.tgy) - (b.tgx + b.tgy));
    let sIdx = 0, fcIdx = 0;

    // 繪製深度 < playerDepth 的靜態物件（樹＋椰子＋低空海鷗混排）
    while (sIdx < staticItems.length && staticItems[sIdx].depth < playerDepth) {
      const item = staticItems[sIdx++];
      if (item.type === 'tree') drawCoconutTree(item.obj);
      else if (item.type === 'seagull') drawSeagullAt(item.obj, now2);
      else drawCoconut(item.obj);
    }
    // 繪製深度 < playerDepth 的落下椰子
    while (fcIdx < sortedFalling.length && (sortedFalling[fcIdx].tgx + sortedFalling[fcIdx].tgy) < playerDepth) {
      drawFallingCoconut(sortedFalling[fcIdx++], now2);
    }

    // 地面肉物件：一次排序後用深度切點分兩段繪製
    const sortedMeat = meatObjects.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
    let mIdx = 0;
    while (mIdx < sortedMeat.length && (sortedMeat[mIdx].gx + sortedMeat[mIdx].gy) < playerDepth) {
      drawMeatObject(sortedMeat[mIdx++]);
    }

    drawPlayer(player.gx, player.gy, player.frame);
    drawSurvivalIcons();

    // 繪製深度 >= playerDepth 的地面肉物件（在玩家之後）
    while (mIdx < sortedMeat.length) drawMeatObject(sortedMeat[mIdx++]);

    // 繪製深度 >= playerDepth 的靜態物件（樹＋椰子＋低空海鷗混排）
    while (sIdx < staticItems.length) {
      const item = staticItems[sIdx++];
      if (item.type === 'tree') drawCoconutTree(item.obj);
      else if (item.type === 'seagull') drawSeagullAt(item.obj, now2);
      else drawCoconut(item.obj);
    }
    // 繪製深度 >= playerDepth 的落下椰子
    while (fcIdx < sortedFalling.length) drawFallingCoconut(sortedFalling[fcIdx++], now2);
  }
  drawBodyDroplets();
  drawThrowAnim(now2);
  drawSecondaryThrows(now2);
  drawPebbleSplashes();
  drawShellFragments(now2);
  // 量子錨點落地煙霧（獨立於椰子繪製流程，避免錨點煙霧無法顯示）
  drawAnchorSmokes();
  // 吃肉煙霧（獨立繪製，避免因肉物件已移除而無法顯示）
  drawMeatSmokes();
  // 切割藤蔓煙霧（獨立繪製）
  drawVineSmokes();
  // 編織籃子製作提示（箭頭+框框，浮在所有物件上方）
  drawBasketCraftHint();
  // 量子錨點（在所有物件之上）
  drawQuantumAnchor();
  // 海鷗（高空飛行時在最上層；低空/perching 已在深度排序層繪製）
  if (seagull) {
    if (seagull.state === 'dead') {
      // 羽毛特效繪製
      for (const f of seagull.feathers) {
        ctx.save();
        ctx.globalAlpha = Math.max(0, f.life / f.maxLife);
        ctx.translate(f.x, f.y);
        ctx.rotate(f.rotation);
        ctx.fillStyle = f.color;
        ctx.beginPath();
        ctx.ellipse(0, 0, f.w, f.h, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();
      }
    } else if (seagull.altitude >= 0.15) {
      // 高空飛行：永遠在所有地面物件之上
      drawSeagullAt(seagull, now2);
    }
    // altitude < 0.15 的海鷗已在深度排序區塊中繪製，此處不重複
  }
  // 驚嘆號（最頂層）
  drawExclamation();
}

// ── 動態修正 HUD 位置（配合 object-fit:contain 的 letterbox/pillarbox）──
function repositionHUD() {
  const vw = window.innerWidth, vh = window.innerHeight;
  const canvasAR = 1280 / 720;
  const winAR = vw / vh;
  let drawW, drawH, offsetX, offsetY;
  if (winAR > canvasAR) {
    // 左右有黑邊（pillarbox）
    drawH = vh; drawW = vh * canvasAR;
    offsetX = (vw - drawW) / 2; offsetY = 0;
  } else {
    // 上下有黑邊（letterbox）
    drawW = vw; drawH = vw / canvasAR;
    offsetX = 0; offsetY = (vh - drawH) / 2;
  }
  // 右邊距離 = 從視窗右側到 canvas 右側的距離 + 14px 內距
  const rightEdge = (vw - (offsetX + drawW));
  const anchorRight = rightEdge + 14;
  const invRight    = rightEdge + 62;

  const anchorBtn = document.getElementById('anchor-btn');
  const invHud    = document.getElementById('inventory-hud');
  if (anchorBtn) anchorBtn.style.right = anchorRight + 'px';
  if (invHud)    invHud.style.right    = invRight    + 'px';
}
window.addEventListener('resize', repositionHUD);
repositionHUD();

initFirstMap();
(function loop(){ update(); render(); requestAnimationFrame(loop); })();
</script>
