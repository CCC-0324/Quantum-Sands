<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>Quantum Sands - Revised</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1e3a5f;
  display:flex; flex-direction:column;
  align-items:center; justify-content:center;
  height:100vh; overflow:hidden;
  font-family:'Segoe UI', Arial, sans-serif;
}
canvas {
  display:block;
  width:100vw; height:100vh;
  object-fit:contain;
  image-rendering:pixelated;
}
#hud {
  position:absolute; top:14px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:13px; background:rgba(0,0,0,0.55);
  padding:6px 18px; border-radius:20px; white-space:nowrap;
  user-select:none; pointer-events:none;
}
#legend {
  position:absolute; bottom:20px; left:20px;
  background:rgba(10,25,50,0.82);
  border-radius:10px; padding:10px 14px;
  border:1px solid rgba(255,255,255,0.10);
  user-select:none; pointer-events:none;
}
#legend .leg-item {
  display:flex; align-items:center; gap:8px;
  margin:3px 0; font-size:12px; color:#e8eef5;
}
#legend .leg-swatch {
  width:14px; height:14px; border-radius:2px; flex-shrink:0;
  border:1px solid rgba(255,255,255,0.25);
}
/* 背包欄位 HUD */
#inventory-hud {
  position:absolute; top:50px; left:50%; transform:translateX(-50%);
  color:#fff; font-size:13px; background:rgba(0,0,0,0.55);
  padding:5px 14px; border-radius:20px; white-space:nowrap;
  user-select:none; pointer-events:none; display:none;
}
.inv-slot {
  display:inline-block; width:22px; height:22px; line-height:22px;
  text-align:center; vertical-align:middle; margin:0 2px;
  border-radius:4px;
}
.inv-slot.empty {
  background:rgba(255,255,255,0.15); border:1px solid rgba(255,255,255,0.3);
}
.inv-slot.filled {
  background:rgba(255,200,80,0.25); border:1px solid rgba(255,200,80,0.6);
}
/* 淡黑過場覆蓋層（由 JS 控制 opacity） */
#fade-overlay {
  position:absolute; inset:0;
  background:#000; opacity:0; pointer-events:none;
  transition:none;
}
/* 量子錨點傳送按鈕 */
#anchor-btn {
  position:absolute;
  top:14px; right:20px;
  width:44px; height:44px;
  display:none;
  cursor:pointer;
  user-select:none;
  filter: drop-shadow(0 0 6px rgba(180,220,255,0.7));
  transition: filter 0.2s;
  z-index: 10;
}
#anchor-btn:hover {
  filter: drop-shadow(0 0 14px rgba(180,220,255,1));
}
/* 白色閃光覆蓋層 */
#flash-overlay {
  position:absolute; inset:0;
  background:#fff; opacity:0; pointer-events:none;
  transition:none;
}
</style>
</head>
<body>
<div id="hud">🎮 WASD / 方向鍵 / 單擊地圖 移動</div>
<div id="inventory-hud"></div>
<canvas id="gameCanvas"></canvas>

<div id="legend">
  <div class="leg-item"><div class="leg-swatch" style="background:#0b2f52"></div>深層海</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#38bdf8"></div>淺層海</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#f5dfa0"></div>沙灘</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#5cd67a"></div>草地</div>
  <div class="leg-item"><div class="leg-swatch" style="background:#c8cdd4"></div>石地</div>
</div>

<div id="fade-overlay"></div>
<div id="flash-overlay"></div>

<!-- 量子錨點傳送按鈕（等角鑽石外框，右上角） -->
<svg id="anchor-btn" viewBox="-2 -2 54 54" xmlns="http://www.w3.org/2000/svg" title="傳送回錨定地圖">
  <polygon points="25,1 49,25 25,49 1,25"
    fill="rgba(255,255,255,0.07)"
    stroke="rgba(255,255,255,0.85)"
    stroke-width="2.5"
    stroke-linejoin="round"/>
  <polygon points="25,8 42,25 25,42 8,25"
    fill="none"
    stroke="rgba(180,220,255,0.5)"
    stroke-width="1"
    stroke-dasharray="3,4"/>
  <circle cx="25" cy="25" r="4"
    fill="rgba(180,220,255,0.7)"
    stroke="rgba(255,255,255,0.6)"
    stroke-width="1"/>
</svg>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
canvas.width  = 1280;
canvas.height = 720;

const playerSprite = new Image();
playerSprite.src = 'savage.png';
const SPRITE_COLUMNS = 4, SPRITE_ROWS = 4;
let SPRITE_FRAME_W = 0, SPRITE_FRAME_H = 0;
playerSprite.onload = () => {
  SPRITE_FRAME_W = playerSprite.naturalWidth  / SPRITE_COLUMNS;
  SPRITE_FRAME_H = playerSprite.naturalHeight / SPRITE_ROWS;
};

const ROWS = 18, COLS = 20;
const TW = 56, TH = 28, HW = TW/2, HH = TH/2;
const ELEV = { '-1':10, '0':10, '1':10, '2':20, '3':30 };
const BASE_BOTTOM = 1;

function getThick(type) { return BASE_BOTTOM + (ELEV[String(type)] ?? 0); }

const COLOR = {
  '-1': { top:'#0b2f52', left:'#061c33', right:'#092540' },
   '0': { top:'#38bdf8', left:'#0369a1', right:'#0284c7' },
   '1': { top:'#f5dfa0', left:'#b5935a', right:'#d4aa6a' },
   '2': { top:'#5cd67a', left:'#1a7a35', right:'#22a048' },
   '3': { top:'#c8cdd4', left:'#5a6070', right:'#8a909a' },
};

let MAP = [];
let cachedMapSeedNum = 0;

// ── 淡黑過場 ─────────────────────────────────────────────
const fadeOverlay = document.getElementById('fade-overlay');

// ═══════════════════════════════════════════════════════
// ⚓ 量子錨點系統
// ═══════════════════════════════════════════════════════
const flashOverlay  = document.getElementById('flash-overlay');
const anchorBtn     = document.getElementById('anchor-btn');

// 地圖上的錨點物件（同時只有一個）
let quantumAnchor   = null; // { gx, gy, born }

// 錨定地圖快照
let anchorSnapshot  = null; // { MAP, seed, pebbleObjects, pebbleSet, shellObjects, shellShards, shellShardSet, coconutTrees, coconutTreeSet, coconuts, grassClusterSet }
let isAnchorMap     = false; // 目前所在地圖是否為錨定地圖
let anchorReturnPos = null;  // { gx, gy } 傳送回去時玩家位置（拾取錨點的格子）

// 白色閃光狀態
let flashAlpha      = 0;
let flashState      = 'idle'; // 'idle' | 'in' | 'out'
const FLASH_IN      = 0.09;
const FLASH_OUT     = 0.035;

function tickFlash() {
  if (flashState === 'idle') return;
  if (flashState === 'in') {
    flashAlpha = Math.min(1, flashAlpha + FLASH_IN);
    flashOverlay.style.opacity = flashAlpha;
    if (flashAlpha >= 1) flashState = 'out';
  } else {
    flashAlpha = Math.max(0, flashAlpha - FLASH_OUT);
    flashOverlay.style.opacity = flashAlpha;
    if (flashAlpha <= 0) { flashState = 'idle'; flashOverlay.style.opacity = 0; }
  }
}

function startFlash() {
  flashAlpha = 0;
  flashState = 'in';
}

// 頭頂驚嘆號閃爍（3下後消失）
let exclamationState = null; // { born, count, visible }
const EXCL_BLINK_MS  = 280;  // 每次閃爍間隔
const EXCL_TOTAL     = 3;    // 閃爍次數

function startExclamation() {
  exclamationState = { born: performance.now(), count: 0, visible: true };
}

function updateExclamation(now) {
  if (!exclamationState) return;
  const elapsed = now - exclamationState.born;
  const cycle   = Math.floor(elapsed / EXCL_BLINK_MS);
  exclamationState.visible = (cycle % 2 === 0);
  if (cycle >= EXCL_TOTAL * 2) exclamationState = null;
}

function drawExclamation() {
  if (!exclamationState || !exclamationState.visible) return;
  const rGx  = Math.round(player.gx), rGy = Math.round(player.gy);
  const type  = tileAt(rGx, rGy);
  const p     = toScreen(player.gx, player.gy, type);

  // 若飢渴圖示正在顯示，驚嘆號往更高處
  const showingSurvival = (playerThirst < 8 || playerHunger < 8);
  const ix = p.x;
  const iy = showingSurvival ? p.y - 102 : p.y - 78;

  ctx.save();
  // 紅色背景圓
  ctx.beginPath();
  ctx.arc(ix, iy, 9, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(220, 30, 30, 0.90)';
  ctx.shadowColor = 'rgba(255,60,60,0.8)';
  ctx.shadowBlur  = 10;
  ctx.fill();
  ctx.shadowBlur  = 0;
  // 驚嘆號（!）
  ctx.fillStyle   = '#fff';
  ctx.font        = 'bold 13px Arial';
  ctx.textAlign   = 'center';
  ctx.textBaseline= 'middle';
  ctx.fillText('!', ix, iy + 0.5);
  ctx.restore();
}

// 量子錨點繪製（等角鑽石形，帶脈衝光圈）
function drawQuantumAnchor() {
  if (!quantumAnchor) return;
  const { gx, gy, born } = quantumAnchor;
  const type = tileAt(gx, gy);
  const p    = toScreen(gx, gy, type);
  const now  = performance.now();
  const t    = ((now - born) % 2000) / 2000; // 0→1 循環
  const pulse= 0.5 + 0.5 * Math.sin(t * Math.PI * 2);

  const cx = p.x;
  const cy = p.y - 10;

  ctx.save();

  // 外圍脈衝光圈
  const ringR  = 14 + pulse * 10;
  const ringAlpha = 0.55 * (1 - pulse * 0.6);
  ctx.globalAlpha = ringAlpha;
  ctx.strokeStyle = `rgba(120,200,255,1)`;
  ctx.lineWidth   = 1.5;
  ctx.beginPath();
  ctx.ellipse(cx, cy + 4, ringR * 1.0, ringR * 0.5, 0, 0, Math.PI * 2);
  ctx.stroke();

  // 鑽石主體（等角鑽石：上下左右4頂點）
  const dw = 10, dh = 7; // 等角比例
  ctx.globalAlpha = 0.85 + pulse * 0.15;

  // 外層發光
  ctx.shadowColor = `rgba(120,200,255,${0.6 + pulse * 0.4})`;
  ctx.shadowBlur  = 10 + pulse * 8;

  // 填充（藍白漸層）
  const grad = ctx.createLinearGradient(cx - dw, cy - dh * 2, cx + dw, cy + dh * 2);
  grad.addColorStop(0,   `rgba(220,240,255,${0.85 + pulse * 0.15})`);
  grad.addColorStop(0.5, `rgba(100,180,255,${0.70 + pulse * 0.20})`);
  grad.addColorStop(1,   `rgba(60,130,230,${0.85 + pulse * 0.15})`);

  ctx.beginPath();
  ctx.moveTo(cx,      cy - dh * 2.5); // 頂
  ctx.lineTo(cx + dw, cy);            // 右
  ctx.lineTo(cx,      cy + dh * 2.5); // 底
  ctx.lineTo(cx - dw, cy);            // 左
  ctx.closePath();
  ctx.fillStyle = grad;
  ctx.fill();

  // 邊框
  ctx.shadowBlur  = 0;
  ctx.strokeStyle = `rgba(200,235,255,0.9)`;
  ctx.lineWidth   = 1.2;
  ctx.stroke();

  // 高光線（上半部白線，增加寶石感）
  ctx.globalAlpha = 0.5 + pulse * 0.3;
  ctx.strokeStyle = 'rgba(255,255,255,0.7)';
  ctx.lineWidth   = 0.8;
  ctx.beginPath();
  ctx.moveTo(cx - dw * 0.5, cy - dh * 1.0);
  ctx.lineTo(cx,             cy - dh * 2.5);
  ctx.lineTo(cx + dw * 0.5, cy - dh * 1.0);
  ctx.stroke();

  ctx.restore();
}

// 判斷目標格是否有任何地面物件（貝殼/石頭/馬鞍藤/碎片刀/椰子）
function isTileClearForAnchor(gx, gy) {
  if (pebbleSet.has(`${gx},${gy}`)) return false;          // 石頭
  if (shellShardSet.has(`${gx},${gy}`)) return false;      // 碎片刀
  if (shellObjects.some(s => s.gx === gx && s.gy === gy)) return false; // 貝殼
  if (coconuts.some(c => c.gx === gx && c.gy === gy)) return false;    // 椰子
  // 馬鞍藤：與 drawTile 中的判斷邏輯一致（沙地格 + 直4向有草地 + 60%機率 hash）
  const type = tileAt(gx, gy);
  if (type === 1) {
    const adjGrassDirect = [
      tileAt(gx-1,gy), tileAt(gx+1,gy),
      tileAt(gx,gy-1), tileAt(gx,gy+1)
    ].some(n => n === 2);
    if (adjGrassDirect) {
      let hv = (gx * 2246822519 + gy * 3266489917 + cachedMapSeedNum) | 0;
      if (((hv >>> 0) % 100) < 60) {
        hv = Math.imul(hv ^ (hv >>> 15), 0xd168aaad); hv = hv ^ (hv >>> 16);
        const tileHash = (hv >>> 0);
        if ((tileHash % 10) < 3) return false; // 有馬鞍藤
      }
    }
  }
  return true;
}

// 判斷錨點觸發條件：footprintBudget > 0（剛從水走上陸），落點是沙地(1)，距離2~5格，且格子淨空
function checkAnchorThrow(tgx, tgy) {
  if (quantumAnchor) return false;            // 已有錨點
  if (isAnchorMap)   return false;            // 本圖已是錨定地圖
  if (anchorSnapshot) return false;           // 已有錨定地圖
  if (footprintBudget <= 0) return false;     // 不在「剛上岸」狀態
  if (tileAt(tgx, tgy) !== 1) return false;  // 落點必須是沙地
  const dist = Math.round(Math.hypot(tgx - player.tx, tgy - player.ty));
  if (dist < 2 || dist > 5) return false;    // 距離2~5格
  if (!isTileClearForAnchor(tgx, tgy)) return false; // 格子必須淨空
  return true;
}

// 量子錨點專用煙霧（比椰子煙霧更誇張：粒子更多、範圍更大、帶彩色）
function addAnchorSmoke(gx, gy) {
  const particles = [];
  for (let i = 0; i < 38; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 0.8 + Math.random() * 2.8;
    // 顏色：混合藍白、青藍、淡紫三種，製造神秘感
    const colorRoll = Math.random();
    const color = colorRoll < 0.45
      ? `rgba(140,210,255,1)`   // 藍白
      : colorRoll < 0.75
        ? `rgba(80,200,230,1)`  // 青藍
        : `rgba(200,170,255,1)`;// 淡紫
    particles.push({
      ox: (Math.random() - 0.5) * 18,
      oy: (Math.random() - 0.5) * 12 - 6,
      vx: Math.cos(angle) * speed * 0.9,
      vy: Math.sin(angle) * speed * 0.5 - 1.2,
      r: 5 + Math.random() * 11,
      alpha: 0.7 + Math.random() * 0.3,
      color,
    });
  }
  coconutSmokes.push({ gx, gy, born: performance.now(), duration: 1400, particles, isAnchor: true });
}

// 生成量子錨點（石頭落地後呼叫）
function spawnQuantumAnchor(gx, gy) {
  // 移除原本會放上去的石頭（在呼叫處不放）
  quantumAnchor = { gx, gy, born: performance.now() };
  startExclamation();
}

// 嘗試拾取量子錨點
function tryPickupQuantumAnchor() {
  if (!quantumAnchor) return false;
  const dx = Math.abs(quantumAnchor.gx - player.tx);
  const dy = Math.abs(quantumAnchor.gy - player.ty);
  if (dx > 1 || dy > 1) return false;

  // 拾取成功：建立快照、發光、顯示按鈕
  anchorReturnPos = { gx: player.tx, gy: player.ty };
  saveAnchorSnapshot();
  isAnchorMap    = true;
  quantumAnchor  = null;
  startFlash();
  anchorBtn.style.display = 'block';
  return true;
}

// 儲存當前地圖快照
function saveAnchorSnapshot() {
  anchorSnapshot = {
    MAP:           MAP.map(row => [...row]),
    seed:          cachedMapSeedNum,
    pebbleObjects: JSON.parse(JSON.stringify(pebbleObjects)),
    pebbleSetArr:  [...pebbleSet],
    shellObjects:  JSON.parse(JSON.stringify(shellObjects)),
    shellShards:   JSON.parse(JSON.stringify(shellShards)),
    shellShardArr: [...shellShardSet.entries()],
    coconutTrees:  JSON.parse(JSON.stringify(coconutTrees)),
    coconutTreeArr:[...coconutTreeSet],
    coconuts:      JSON.parse(JSON.stringify(coconuts)),
    grassClusterArr:[...grassClusterSet],
  };
}

// 恢復錨定地圖快照（進入錨定地圖時呼叫，取代 resetMapObjects）
function restoreAnchorSnapshot() {
  const s = anchorSnapshot;
  MAP              = s.MAP.map(row => [...row]);
  cachedMapSeedNum = s.seed;

  pebbleObjects    = JSON.parse(JSON.stringify(s.pebbleObjects));
  pebbleSet        = new Set(s.pebbleSetArr);

  shellObjects     = JSON.parse(JSON.stringify(s.shellObjects));
  shellShards      = JSON.parse(JSON.stringify(s.shellShards));
  shellShardSet    = new Map(s.shellShardArr.map(([k, v]) => [k, shellShards.find(sh => `${sh.gx},${sh.gy}` === k) ?? v]));

  coconutTrees     = JSON.parse(JSON.stringify(s.coconutTrees));
  coconutTreeSet   = new Set(s.coconutTreeArr);
  coconuts         = JSON.parse(JSON.stringify(s.coconuts));

  grassClusterSet  = new Set(s.grassClusterArr);

  // 清除純視覺特效（腳印、漣漪等），但保留物件狀態
  footprints.length = 0; ripples.length = 0; surfaceBubbles.length = 0;
  splashDrops.length = 0; bodyDroplets.length = 0; bodyDripActive = false;
  secondaryThrows.length = 0; pebbleSplashes.length = 0;
  fallingCoconuts.length = 0; shellFragments.length = 0;
  throwAnim = null;
  if (coconutCuttingTimer) { clearTimeout(coconutCuttingTimer.timer); coconutCuttingTimer = null; }

  spawnFishesOnMap();
  isAnchorMap = true;
}

// 傳送回錨定地圖
function teleportToAnchor() {
  if (!anchorSnapshot) return;
  startFadeTransition(() => {
    restoreAnchorSnapshot();
    // 玩家位置：回到拾取錨點時的格子
    const sp = anchorReturnPos ?? { gx: Math.floor(COLS / 2), gy: Math.floor(ROWS / 2) };
    let px = sp.gx, py = sp.gy;
    if (!isWalkable(px, py)) {
      const found = findSpawnNear(px, py);
      px = found.x; py = found.y;
    }
    player.gx = px; player.gy = py;
    player.tx = px; player.ty = py;
    // 傳送到錨定地圖後，按鈕變暗（已在此圖）
    anchorBtn.style.opacity = '0.35';
    anchorBtn.style.cursor  = 'default';
    anchorBtn.title = '已在錨定地圖';
  });
}

// 錨點按鈕點擊
anchorBtn.addEventListener('click', () => {
  if (isAnchorMap) return;   // 已在錨定地圖，不需傳送
  if (!anchorSnapshot) return;
  if (fadeState !== 'idle') return;
  teleportToAnchor();
});

// ── 更新快照中可變狀態（玩家仍在錨定地圖時持續同步）──
// 離開前在 crossMapBoundary 呼叫
function updateAnchorSnapshotBeforeLeave() {
  if (!isAnchorMap || !anchorSnapshot) return;
  saveAnchorSnapshot(); // 重新存一份最新狀態
}
let fadeState = 'idle'; // 'idle' | 'fadein' | 'fadeout'
let fadeAlpha  = 0;
const FADE_SPEED = 0.045; // 每幀增減量（~22幀完成）
let pendingTransition = null; // 過場完成後要執行的 callback

function tickFade() {
  if (fadeState === 'idle') return;
  if (fadeState === 'fadein') {
    fadeAlpha = Math.min(1, fadeAlpha + FADE_SPEED);
    fadeOverlay.style.opacity = fadeAlpha;
    if (fadeAlpha >= 1) {
      // 全黑時執行地圖切換
      if (pendingTransition) { pendingTransition(); pendingTransition = null; }
      fadeState = 'fadeout';
    }
  } else if (fadeState === 'fadeout') {
    fadeAlpha = Math.max(0, fadeAlpha - FADE_SPEED);
    fadeOverlay.style.opacity = fadeAlpha;
    if (fadeAlpha <= 0) { fadeState = 'idle'; }
  }
}

// 觸發過場：cb 在全黑那一刻被呼叫（切地圖、移玩家都在此）
function startFadeTransition(cb) {
  if (fadeState !== 'idle') return;
  pendingTransition = cb;
  fadeState = 'fadein';
  fadeAlpha = 0;
}


const footprints = [];
let footprintBudget = 0;
let stepFoot = 0;
const FOOTPRINT_FADE_MS = 1500;
const FOOTPRINT_COUNT   = 7;

function footOffset(dir, foot) {
  const side = foot === 0 ? -1 : 1;
  switch (dir) {
    case 0: return { ox: side * 4,  oy:  side * 2  };
    case 1: return { ox: side * 4,  oy: -side * 2  };
    case 2: return { ox: -side * 4, oy: -side * 2  };
    case 3: return { ox: -side * 4, oy:  side * 2  };
    default: return { ox: 0, oy: 0 };
  }
}

function addFootprint(gx, gy, foot, dir) {
  const type = tileAt(gx, gy);
  if (type < 1) return;
  footprints.push({
    gx, gy, foot, dir, type,
    alpha: 0.70,
    born: performance.now(),
    maxLifetime: FOOTPRINT_FADE_MS * (0.85 + Math.random() * 0.30)
  });
}

function updateFootprints(now) {
  for (let i = footprints.length - 1; i >= 0; i--) {
    const fp = footprints[i];
    const elapsed = now - fp.born;
    const fadeStart = fp.maxLifetime * 0.30;
    if (elapsed >= fp.maxLifetime) {
      footprints.splice(i, 1);
    } else if (elapsed > fadeStart) {
      fp.alpha = 0.70 * (1 - (elapsed - fadeStart) / (fp.maxLifetime - fadeStart));
    }
  }
}

function drawFootprint(fp) {
  const type = tileAt(fp.gx, fp.gy);
  if (type < 1) return;
  const p = toScreen(fp.gx, fp.gy, type);
  const { ox, oy } = footOffset(fp.dir, fp.foot);

  let r = 80, g = 120, b = 160;
  if (type === 1) { r = 155; g = 130; b = 90;  }
  if (type === 2) { r = 55;  g = 95;  b = 75;  }
  if (type === 3) { r = 95;  g = 105; b = 125; }

  ctx.save();
  ctx.globalAlpha = fp.alpha;
  ctx.translate(p.x + ox, p.y + oy - 4);
  const isoAngle = Math.atan2(HH, HW);
  const rotDir = (fp.dir === 0 || fp.dir === 1) ? 1 : -1;
  ctx.rotate(rotDir * isoAngle * 0.5);

  ctx.beginPath();
  ctx.ellipse(0, 0, 6, 3.2, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${r},${g},${b})`;
  ctx.fill();
  ctx.restore();
}

function drawFootprints(gx, gy) {
  for (const fp of footprints) {
    if (fp.gx === gx && fp.gy === gy) drawFootprint(fp);
  }
}

const ripples = [];
const RIPPLE_DURATION = 3000;

function addRipple(gx, gy) {
  const p = toScreen(gx, gy, 0);
  ripples.push({
    x: p.x,
    y: p.y,
    born: performance.now(),
    duration: RIPPLE_DURATION * (0.8 + Math.random() * 0.4)
  });
}

function updateRipples(now) {
  for (let i = ripples.length - 1; i >= 0; i--) {
    if (now - ripples[i].born >= ripples[i].duration) ripples.splice(i, 1);
  }
}

function drawRipplesAt(gx, gy, p) {
  const now = performance.now();
  if (ripples.length === 0) return;

  ctx.save();
  ctx.beginPath();
  ctx.moveTo(p.x, p.y - HH);
  ctx.lineTo(p.x + HW, p.y);
  ctx.lineTo(p.x, p.y + HH);
  ctx.lineTo(p.x - HW, p.y);
  ctx.closePath();
  ctx.clip();

  for (const rp of ripples) {
    const distSq = (rp.x - p.x)**2 + (rp.y - p.y)**2;
    if (distSq > 5000) continue; 

    const t = (now - rp.born) / rp.duration;  
    if (t < 0 || t >= 1) continue;

    const maxRx = HW * 2.2;
    const maxRy = HH * 2.2;
    const rx = maxRx * t;
    const ry = maxRy * t;
    const alpha = 0.55 * (1 - t) * (1 - t);

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.strokeStyle = 'rgba(180, 230, 255, 1)';
    ctx.lineWidth = 1.2 * (1 - t * 0.5);
    ctx.beginPath();
    ctx.ellipse(rp.x, rp.y, rx, ry, 0, 0, Math.PI * 2);
    ctx.stroke();

    if (t > 0.15) {
      const t2 = (t - 0.15) / 0.85;
      const rx2 = maxRx * t2 * 0.6;
      const ry2 = maxRy * t2 * 0.6;
      ctx.globalAlpha = alpha * 0.6;
      ctx.lineWidth = 0.8 * (1 - t2 * 0.5);
      ctx.beginPath();
      ctx.ellipse(rp.x, rp.y, rx2, ry2, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
    ctx.restore();
  }
  ctx.restore();
}

const splashDrops = [];

function addSplash(gx, gy) {
  const p = toScreen(gx, gy, -1);
  const count = 1 + Math.floor(Math.random() * 8);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.5 + Math.random() * 3.5;
    const vx = Math.cos(angle) * speed * 0.7;
    const vy = Math.sin(angle) * speed * 0.35 - (2.5 + Math.random() * 3.5);
    splashDrops.push({
      gx, gy,
      x: p.x + (Math.random() - 0.5) * 12,
      y: p.y + (Math.random() - 0.5) * 6,
      vx, vy,
      gravity: 0.18 + Math.random() * 0.10,
      r: 1.2 + Math.random() * 2.0,
      alpha: 0.85 + Math.random() * 0.15,
      born: performance.now(),
      life: 500 + Math.random() * 400,
      isLanding: false
    });
  }
  splashDrops.push({
    gx, gy,
    x: p.x, y: p.y,
    vx: 0, vy: 0,
    gravity: 0,
    r: 0,
    alpha: 0.7,
    born: performance.now(),
    life: 350,
    isCrown: true,
    maxR: 14
  });
}

function updateSplashDrops(now) {
  for (let i = splashDrops.length - 1; i >= 0; i--) {
    const d = splashDrops[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { splashDrops.splice(i, 1); continue; }
    if (!d.isCrown) {
      d.x += d.vx;
      d.y += d.vy;
      d.vy += d.gravity;
      d.alpha = 0.85 * (1 - elapsed / d.life);
    } else {
      d.r = d.maxR * (elapsed / d.life);
      d.alpha = 0.7 * (1 - elapsed / d.life);
    }
  }
}

function drawSplashDropsAt(gx, gy) {
  for (const d of splashDrops) {
    if (d.gx !== gx || d.gy !== gy) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    if (d.isCrown) {
      ctx.strokeStyle = 'rgba(140, 210, 255, 1)';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.45, 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      ctx.fillStyle = 'rgba(160, 220, 255, 1)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, d.r * 0.65, 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

const bodyDroplets = [];
let bodyDripActive = false;
let bodyDripUntil = 0;
let bodyDripIntensity = 0; 

function startBodyDrip(intensity) {
  bodyDripActive = true;
  bodyDripUntil = performance.now() + (200 + Math.random() * 10);
  bodyDripIntensity = intensity;
}

function updateBodyDroplets(now) {
  if (bodyDripActive && now < bodyDripUntil) {
    const remaining = (bodyDripUntil - now) / 1800;
    const spawnRate = Math.ceil(bodyDripIntensity * remaining * 3);
    if (player.frame % Math.max(1, 4 - spawnRate) === 0) {
      const rGx = Math.round(player.gx), rGy = Math.round(player.gy);
      const type = tileAt(rGx, rGy);
      const p = toScreen(player.gx, player.gy, type);
      const dw = 10;
      const spot = { ox: (Math.random() - 0.5) * dw * 0.4, oy: -12 + Math.random() * 6  };
      bodyDroplets.push({
        x: p.x + spot.ox,
        y: p.y + spot.oy,
        vy: 0.3 + Math.random() * 0.5,
        vx: (Math.random() - 0.5) * 0.3,
        r: 1.0 + Math.random() * 1.5,
        alpha: 0.7 + Math.random() * 0.3,
        born: now,
        life: 400 + Math.random() * 150,
        streakLen: 1 + Math.random() * 1
      });
    }
  } else if (now >= bodyDripUntil) {
    bodyDripActive = false;
  }

  for (let i = bodyDroplets.length - 1; i >= 0; i--) {
    const d = bodyDroplets[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { bodyDroplets.splice(i, 1); continue; }
    d.x += d.vx;
    d.y += d.vy;
    d.vy += 0.08;
    d.alpha = 0.7 * (1 - elapsed / d.life);
  }
}

function drawBodyDroplets() {
  for (const d of bodyDroplets) {
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    const speed = d.vy;
    const stretchY = Math.min(d.streakLen, speed * 2.5);
    ctx.fillStyle = 'rgba(180, 230, 255, 0.9)';
    // TODO: 若要簡化，可移除 strokeStyle + stroke()，水滴僅用 fill 即可，差異幾乎不可見
    ctx.strokeStyle = 'rgba(120, 190, 240, 0.6)';
    ctx.lineWidth = 0.5;
    ctx.beginPath();
    ctx.ellipse(d.x, d.y, d.r * 0.6, d.r + stretchY * 0.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.stroke();
    ctx.restore();
  }
}

const surfaceBubbles = [];
function updateSurfaceBubbles() {
  const now = performance.now();
  for (let i = surfaceBubbles.length - 1; i >= 0; i--) {
    const b = surfaceBubbles[i];
    const elapsed = now - b.born;
    if (elapsed > b.life) {
      surfaceBubbles.splice(i, 1);
    } else {
      b.oy -= 0.15; 
      b.alpha = 1 - (elapsed / b.life);
    }
  }
}

function drawSurfaceBubblesAt(gx, gy, p) {
  for (const b of surfaceBubbles) {
    if (b.gx === gx && b.gy === gy) {
      ctx.save();
      // 氧氣歸零時：紅色脈衝閃爍
      const oxygenCritical = (isDeepSea && playerOxygen <= 0);
      if (oxygenCritical) {
        const pulse = (Math.sin(statusIconPhase * 5) + 1) / 2;
        ctx.globalAlpha = b.alpha * (0.55 + pulse * 0.45);
        ctx.fillStyle   = `rgba(255,${Math.floor(40 + pulse * 30)},${Math.floor(40 + pulse * 20)},1)`;
        ctx.strokeStyle = `rgba(255,100,80,0.9)`;
        ctx.shadowColor = `rgba(255,60,60,${0.7 + pulse * 0.3})`;
        ctx.shadowBlur  = 4 + pulse * 5;
      } else {
        ctx.globalAlpha = b.alpha * 0.6;
        ctx.fillStyle   = '#fff';
        ctx.strokeStyle = 'rgba(255,255,255,0.8)';
      }
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.arc(p.x + b.ox, p.y + b.oy, b.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.stroke();
      ctx.restore();
    }
  }
}

// ═══════════════════════════════════════════════════════
// 🐟 淺海魚群系統 (修正：僅在非交界區活動)
// ═══════════════════════════════════════════════════════
const fishes = [];
const FISH_FLEE_DIST_SQ = 3.5 * 3.5; 
const FISH_NORMAL_SPEED = 0.006;      
const FISH_FLEE_SPEED   = 0.085;      
const FISH_DIVE_INTERVAL_MIN = 4000;  
const FISH_DIVE_INTERVAL_MAX = 9000;
const FISH_DIVE_DURATION_MIN = 2000;
const FISH_DIVE_DURATION_MAX = 5000;
const FISH_MAX_COUNT = 12;

// 鵝卵石落水後的短暫驚嚇座標
let pebbleScarePosGx = -999;
let pebbleScarePosGy = -999;
let pebbleScareUntil = 0;

// 判斷是否為淺海交界
function isShallowBorder(gx, gy) {
  if (tileAt(gx, gy) !== 0) return false;
  const neighbors = [
    tileAt(gx + 1, gy), tileAt(gx - 1, gy),
    tileAt(gx, gy + 1), tileAt(gx, gy - 1)
  ];
  return neighbors.some(t => t !== 0);
}

function spawnFishesOnMap() {
  fishes.length = 0;
  const shallowTiles = [];
  for (let gy = 0; gy < ROWS; gy++)
    for (let gx = 0; gx < COLS; gx++)
      // 修正：必須是淺海且非交界
      if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
  
  const count = Math.min(FISH_MAX_COUNT, Math.floor(shallowTiles.length * 0.05));
  for (let i = 0; i < count; i++) {
    const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
    const angle = Math.random() * Math.PI * 2;
    const now = performance.now();
    fishes.push({
      gx: tile.gx + (Math.random() - 0.5) * 0.7,
      gy: tile.gy + (Math.random() - 0.5) * 0.7,
      angle: angle, targetAngle: angle,
      speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
      diving: false, diveAlpha: 0,
      nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
      diveEndAt: 0,
      bodyLen: 12 + Math.random() * 4, bodyW: 4 + Math.random() * 1.5,
      hue: 200 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
    });
  }
}

function updateFishes(now) {
  for (let i = fishes.length - 1; i >= 0; i--) {
    const f = fishes[i];

    if (f.vanishing) {
      f.diveAlpha -= 0.1;
      if (f.diveAlpha <= 0) {
        fishes.splice(i, 1);
        // 補生至合格區域
        const shallowTiles = [];
        for (let gy = 0; gy < ROWS; gy++)
          for (let gx = 0; gx < COLS; gx++)
            if (MAP[gy][gx] === 0 && !isShallowBorder(gx, gy)) shallowTiles.push({gx, gy});
        if (shallowTiles.length > 0) {
          const tile = shallowTiles[Math.floor(Math.random() * shallowTiles.length)];
          const angle = Math.random() * Math.PI * 2;
          fishes.push({
            gx: tile.gx + (Math.random() - 0.5) * 0.7, gy: tile.gy + (Math.random() - 0.5) * 0.7,
            angle, targetAngle: angle, speed: FISH_NORMAL_SPEED, fleeing: false, vanishing: false,
            diving: false, diveAlpha: 0,
            nextDiveAt: now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN),
            diveEndAt: 0,
            bodyLen: 12 + Math.random() * 4, bodyW: 4 + Math.random() * 1.5,
            hue: 200 + Math.random() * 5, turnAt: now + 1000 + Math.random() * 2000,
          });
        }
      }
      continue;
    }

    const dx = f.gx - player.gx, dy = f.gy - player.gy;
    const distSq = dx * dx + dy * dy;

    // 【優化提示】此處 performance.now() 與外層 updateFishes(now) 的 now 相同，
    // 可直接使用 now 變數以避免重複呼叫；目前差異可忽略但非必要
    const now2 = performance.now();
    let scareDistSq = Infinity;
    if (now2 < pebbleScareUntil) {
      const sdx = f.gx - pebbleScarePosGx, sdy = f.gy - pebbleScarePosGy;
      scareDistSq = sdx * sdx + sdy * sdy;
    }

    if (distSq < FISH_FLEE_DIST_SQ || scareDistSq < FISH_FLEE_DIST_SQ) {
      // 逃離距離更近的威脅
      let fleeFromGx = player.gx, fleeFromGy = player.gy;
      if (scareDistSq < distSq && scareDistSq < FISH_FLEE_DIST_SQ) {
        fleeFromGx = pebbleScarePosGx; fleeFromGy = pebbleScarePosGy;
      }
      f.fleeing = true;
      f.targetAngle = Math.atan2(f.gy - fleeFromGy, f.gx - fleeFromGx);
      f.speed = FISH_FLEE_SPEED;
    } else {
      f.fleeing = false; f.speed = FISH_NORMAL_SPEED;
      if (now > f.turnAt) {
        f.targetAngle = f.angle + (Math.random() - 0.5) * Math.PI * 1.2;
        f.turnAt = now + 1500 + Math.random() * 3000;
      }
    }

    let da = f.targetAngle - f.angle;
    while (da >  Math.PI) da -= Math.PI * 2;
    while (da < -Math.PI) da += Math.PI * 2;
    f.angle += da * (f.fleeing ? 0.25 : 0.04);

    const nx = f.gx + Math.cos(f.angle) * f.speed;
    const ny = f.gy + Math.sin(f.angle) * f.speed;
    const tx = Math.round(nx), ty = Math.round(ny);
    const tileCheck = tileAt(tx, ty);
    const isBorder = isShallowBorder(tx, ty);

    // 修正：若前進方向非淺海或屬交界區
    if (tileCheck === 0 && !isBorder) {
      f.gx = nx; f.gy = ny;
    } else {
      if (f.fleeing) {
        f.vanishing = true; // 逃跑時碰到交界直接消失
      } else {
        f.targetAngle = f.angle + Math.PI + (Math.random() - 0.5) * 0.8;
        f.turnAt = now + 200;
      }
    }


    // 潛水邏輯
    if (!f.diving && now > f.nextDiveAt && !f.fleeing) {
      f.diving = true;
      f.diveEndAt = now + FISH_DIVE_DURATION_MIN + Math.random() * (FISH_DIVE_DURATION_MAX - FISH_DIVE_DURATION_MIN);
    }

    if (f.diving) {
      if (f.fleeing) {
        // 被人追趕，強制結束潛水狀態
        f.diving = false; 
        // 移除 f.diveAlpha = 1.0; 讓它自然浮現
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else if (now > f.diveEndAt) {
        // 自然潛水時間到，結束潛水
        f.diving = false; 
        // 移除 f.diveAlpha = 1.0; 讓它自然浮現
        f.nextDiveAt = now + FISH_DIVE_INTERVAL_MIN + Math.random() * (FISH_DIVE_INTERVAL_MAX - FISH_DIVE_INTERVAL_MIN);
      } else {
        // 正在下潛：逐漸變淡
        f.diveAlpha = Math.max(0.18, f.diveAlpha - 0.008);
      }
    } else {
      // 正在浮起：逐漸變深（包含逃跑消失後重新生成的魚也會走這段）
      f.diveAlpha = Math.min(1.0, f.diveAlpha + 0.005);
    }
  }
}

function drawAllFishes() {
  const sorted = fishes.slice().sort((a, b) => (a.gx + a.gy) - (b.gx + b.gy));
  for (const f of sorted) {
    if (tileAt(Math.round(f.gx), Math.round(f.gy)) !== 0) continue;
    const p = toScreen(f.gx, f.gy, 0);
    const cosA = Math.cos(f.angle), sinA = Math.sin(f.angle);
    const sdx = (cosA - sinA) * HW, sdy = (cosA + sinA) * HH;
    const len = Math.sqrt(sdx * sdx + sdy * sdy) || 1;
    const ux = sdx/len, uy = sdy/len, px = -uy, py = ux;
    const BL = f.bodyLen, BW = f.bodyW;

    ctx.save();
    ctx.globalAlpha = f.diveAlpha * 0.88;
    ctx.fillStyle = `hsla(${f.hue}, 70%, 40%, ${f.diveAlpha})`;
    ctx.strokeStyle = `hsla(${f.hue}, 55%, 50%, ${f.diveAlpha * 0.8})`;
    ctx.lineWidth = 0.6;

    const hx = p.x + ux * BL * 0.5, hy = p.y + uy * BL * 0.5;
    const tx = p.x - ux * BL * 0.5, ty = p.y - uy * BL * 0.5;

    ctx.beginPath();
    ctx.moveTo(hx, hy);
    ctx.bezierCurveTo(hx + px * BW, hy + py * BW, tx + px * BW * 0.6, ty + py * BW * 0.6, tx, ty);
    ctx.bezierCurveTo(tx - px * BW * 0.6, ty - py * BW * 0.6, hx - px * BW, hy - py * BW, hx, hy);
    ctx.fill(); ctx.stroke();

    const fx1 = tx + px * BW * 0.5 - ux * BL * 0.35, fy1 = ty + py * BW * 0.5 - uy * BL * 0.35;
    const fx2 = tx - px * BW * 1.4 - ux * BL * 0.35, fy2 = ty - py * BW * 1.4 - uy * BL * 0.35;
    ctx.beginPath(); ctx.moveTo(tx, ty); ctx.lineTo(fx1, fy1); ctx.lineTo(fx2, fy2); ctx.closePath();
    ctx.fillStyle = `hsla(${f.hue + 10}, 60%, 60%, ${f.diveAlpha * 0.85})`;
    ctx.fill();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════
// 🪨 鵝卵石物件系統
// ═══════════════════════════════════════════════════════
// 持有鵝卵石的精靈圖（之後再換成實際畫好的圖）
const pebbleHeldSprite = new Image();
pebbleHeldSprite.src = 'cssavage.png'; // 持有狀態
const pebbleThrowSprite = new Image();
pebbleThrowSprite.src = 'rcssavage.png'; // 投擲動作狀態

// 椰子樹精靈圖
const coconutTreeSprite = new Image();
coconutTreeSprite.src = 'coconuttree.png';

// 地圖上的鵝卵石物件列表：{ gx, gy, shade, sRx, sRy, angle }
let pebbleObjects = [];
// 快速查詢用 Set（key = "gx,gy"），避免 isWalkable 每次線性掃描
let pebbleSet = new Set();
// 玩家是否正在持有鵝卵石
let playerHoldingPebble = false;

// 建立鵝卵石物件（每張新地圖重新生成）
function buildPebbleObjects() {
  pebbleObjects = [];
  pebbleSet = new Set();
  const mapSeedNum = cachedMapSeedNum;
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 3) continue; // 只在石地上生成
      // 用地圖座標+種子做雜湊，確保每次同種子結果相同
      let h = (gx * 374761393 + gy * 668265263 + mapSeedNum) | 0;
      h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
      // 5% 機率生成
      if ((Math.abs(h) % 100) >= 5) continue;
      const hk2 = Math.abs(Math.imul(h ^ (h >>> 9), 374761393));
      const hk3 = Math.abs(Math.imul(hk2 ^ (hk2 >>> 11), 2246822519));
      // 隨機視覺偏移（不影響格子邏輯位置）
      const ox = ((hk2 % 201) - 100) / 100 * 7;  // ±7 像素
      const oy = ((hk3 % 201) - 100) / 100 * 4;  // ±4 像素
      pebbleObjects.push({
        gx, gy,
        ox, oy,
        sRx: 4,
        sRy: 3,
        angle: 0,
        shade: 171 + (Math.abs(h) % 5)
      });
      pebbleSet.add(`${gx},${gy}`);
    }
  }
}

// 取得玩家附近（切比雪夫距離 1，含斜鄰）的鵝卵石
// 若玩家已持有鵝卵石則一律回傳 null（只能持有一顆）
function getNearbyPebble() {
  if (playerHoldingPebble) return null;
  for (const pb of pebbleObjects) {
    const dx = Math.abs(pb.gx - player.tx);
    const dy = Math.abs(pb.gy - player.ty);
    if (dx <= 1 && dy <= 1) return pb;
  }
  return null;
}

// 拾取鵝卵石
function pickUpPebble(pb) {
  const idx = pebbleObjects.indexOf(pb);
  if (idx !== -1) {
    pebbleObjects.splice(idx, 1);
    pebbleSet.delete(`${pb.gx},${pb.gy}`);
    playerHoldingPebble = true;
    heldPebbleShade = pb.shade; // 記住石頭顏色
  }
}

// ═══════════════════════════════════════════════════════
// 🪨 投擲系統
// ═══════════════════════════════════════════════════════
let throwAnim = null; // 當前投擲動畫狀態

// 投擲動畫持有的靜態鵝卵石資訊（投擲前的shade）
let heldPebbleShade = 170;

// 水花特效（鵝卵石落水）
const pebbleSplashes = [];

function addPebbleSplash(gx, gy) {
  const type = tileAt(gx, gy);
  const p = toScreen(gx, gy, type);
  const count = 8 + Math.floor(Math.random() * 6);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1.2 + Math.random() * 3.0;
    pebbleSplashes.push({
      x: p.x + (Math.random() - 0.5) * 10,
      y: p.y + (Math.random() - 0.5) * 5,
      vx: Math.cos(angle) * speed * 0.7,
      vy: Math.sin(angle) * speed * 0.35 - (2.0 + Math.random() * 3.0),
      gravity: 0.16 + Math.random() * 0.12,
      r: 1.0 + Math.random() * 2.2,
      alpha: 0.9,
      born: performance.now(),
      life: 450 + Math.random() * 350,
    });
  }
  // 水面冠狀
  pebbleSplashes.push({
    x: p.x, y: p.y,
    vx: 0, vy: 0, gravity: 0,
    r: 0, alpha: 0.75,
    born: performance.now(),
    life: 400,
    isCrown: true, maxR: 18,
  });
}

function updatePebbleSplashes(now) {
  for (let i = pebbleSplashes.length - 1; i >= 0; i--) {
    const d = pebbleSplashes[i];
    const elapsed = now - d.born;
    if (elapsed >= d.life) { pebbleSplashes.splice(i, 1); continue; }
    if (!d.isCrown) {
      d.x += d.vx; d.y += d.vy; d.vy += d.gravity;
      d.alpha = 0.9 * (1 - elapsed / d.life);
    } else {
      d.r = d.maxR * (elapsed / d.life);
      d.alpha = 0.75 * (1 - elapsed / d.life);
    }
  }
}

function drawPebbleSplashes() {
  for (const d of pebbleSplashes) {
    if (d.alpha <= 0) continue;
    ctx.save();
    ctx.globalAlpha = Math.max(0, d.alpha);
    if (d.isCrown) {
      if (d.r < 0.5) { ctx.restore(); continue; } // 半徑太小跳過，避免 ellipse(0,0) 崩潰
      ctx.strokeStyle = 'rgba(120, 200, 255, 1)';
      ctx.lineWidth = 1.8;
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, Math.max(0.5, d.r * 0.45), 0, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      if (d.r < 0.5) { ctx.restore(); continue; }
      ctx.fillStyle = 'rgba(150, 215, 255, 1)';
      ctx.beginPath();
      ctx.ellipse(d.x, d.y, d.r, Math.max(0.5, d.r * 0.6), 0, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }
}

// 觸發投擲：目標為 (tgx, tgy)
function throwPebble(tgx, tgy) {
  if (!playerHoldingPebble || throwAnim) return;
  // 投擲方向：讓玩家面向目標
  const dx = tgx - player.gx, dy = tgy - player.gy;
  if (Math.abs(dx) >= Math.abs(dy)) {
    player.dir = dx > 0 ? 1 : 3;
  } else {
    player.dir = dy > 0 ? 2 : 0;
  }

  const startType = tileAt(Math.round(player.gx), Math.round(player.gy));
  const startP = toScreen(player.gx, player.gy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);

  const THROW_DURATION = 520; // ms
  const now = performance.now();

  // 鵝卵石落地後是否沉入水中
  const targetTile = tileAt(tgx, tgy);
  const sinksInWater = (targetTile === 0 || targetTile === -1);

  // 落地視覺偏移（水中不需要，陸地上隨機偏一點）
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;

  // 若目標是椰子樹，石頭終點改為樹冠（椰子叢）高度，而非地面
  const isTargetCoconutTree = coconutTreeSet.has(`${tgx},${tgy}`);
  const groundY = targetP.y + HH + 20; // 同 drawCoconutTree 的 groundY
  const coconutCanopyOffsetY = isTargetCoconutTree ? (groundY - 150 - (targetP.y - 4)) : 0;

  throwAnim = {
    startX: startP.x,
    startY: startP.y - 20, // 從角色手部高度拋出
    endX: targetP.x + landOx,
    endY: targetP.y - 4 + landOy + coconutCanopyOffsetY,
    tgx, tgy,
    landOx, landOy,
    born: now,
    duration: THROW_DURATION,
    done: false,
    sinksInWater,
    shade: heldPebbleShade,
    phase: 'throwing', // 'throwing' | 'landed'
  };

  playerHoldingPebble = false;
}

function updateThrowAnim(now) {
  if (!throwAnim) return;
  if (throwAnim.done) { throwAnim = null; return; }

  const elapsed = now - throwAnim.born;
  const t = Math.min(elapsed / throwAnim.duration, 1);

// 【TODO】若未來要加「投擲中途可被打斷」功能，在此加入 phase 判斷切換點
if (t >= 1) {
  throwAnim.done = true;
  const tgx = throwAnim.tgx, tgy = throwAnim.tgy;
  const type = tileAt(tgx, tgy);

  // 先判斷是否命中椰子樹（優先處理）
  if (handlePebbleLandOnCoconutTree(tgx, tgy, throwAnim.shade, false)) {
    throwAnim = null;
    return;
  }

  // 判斷是否命中海鷗（20%機率）
  const seagullHit = tryHitSeagullWithPebble(tgx, tgy);
  if (seagullHit) {
    // 命中：羽毛噴散、海鷗消失，石頭彈往鄰近格子（與打中石頭時的行為一致）
    const hitLandOx = throwAnim.landOx ?? 0;
    const hitLandOy = throwAnim.landOy ?? 0;
    if (type >= 1) {
      // 陸地上才放石頭再彈走（不放水中）
      const existingHit = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
      if (existingHit && Math.random() < 0.9) {
        launchKnockedPebble(existingHit, tgx, tgy);
      }
      const newPb = {
        gx: tgx, gy: tgy,
        ox: hitLandOx, oy: hitLandOy,
        shade: throwAnim.shade,
        sRx: 4, sRy: 3, angle: 0
      };
      pebbleObjects.push(newPb);
      pebbleSet.add(`${tgx},${tgy}`);
      // 打死海鷗的石頭隨即彈往鄰近格子
      launchKnockedPebble(newPb, tgx, tgy);
    }
    throwAnim = null;
    return;
  }

  // 判斷是否命中貝殼
  handlePebbleHitShell(tgx, tgy, false);

  if (type < 1) {
    // 原有的水花處理
    addPebbleSplash(tgx, tgy);
    pebbleScarePosGx = tgx; 
    pebbleScarePosGy = tgy;
    pebbleScareUntil = now + 1200;
  } else {
    // ── 量子錨點觸發檢查 ──
    if (checkAnchorThrow(tgx, tgy)) {
      // 落地煙霧後生成錨點，石頭不放回地圖
      addAnchorSmoke(tgx, tgy);
      const _tgx = tgx, _tgy = tgy;
      setTimeout(() => { spawnQuantumAnchor(_tgx, _tgy); }, 700);
      throwAnim = null;
      return;
    }

    // 落地在陸地上時的原本邏輯
    const landOx = throwAnim.landOx ?? 0;
    const landOy = throwAnim.landOy ?? 0;

    // ── 打飛判斷：目標格已有石頭時，90% 機率打飛它 ──
    const existing = pebbleObjects.find(p => p.gx === tgx && p.gy === tgy);
    if (existing && Math.random() < 0.9) {
      launchKnockedPebble(existing, tgx, tgy);
    }

    pebbleObjects.push({
      gx: tgx, gy: tgy,
      ox: landOx, oy: landOy,
      shade: throwAnim.shade,
      sRx: 4, sRy: 3, angle: 0
    });
    pebbleSet.add(`${tgx},${tgy}`);

    // 如果落地的格子是草地 (type 2)，觸發搖晃效果
    if (type === 2) {
      trampleGrass(tgx, tgy); 
    }
  }
  
  // 【說明】playerHoldingPebble 已在 throwPebble() 呼叫時設為 false，此處無需再設
  throwAnim = null;
}
}

function drawThrowAnim(now) {
  if (!throwAnim || throwAnim.done) return;
  const elapsed = now - throwAnim.born;
  const t = Math.min(elapsed / throwAnim.duration, 1);

  // 拋物線插值
  const lx = throwAnim.startX + (throwAnim.endX - throwAnim.startX) * t;
  const ly = throwAnim.startY + (throwAnim.endY - throwAnim.startY) * t;
  // 拋物線高度：sin(pi*t) 形成弧形，最高點在中途
  const arcHeight = 55 + Math.abs(throwAnim.endX - throwAnim.startX) * 0.18;
  const arcY = ly - Math.sin(Math.PI * t) * arcHeight;

  // 縮放：飛行中略小，落地前恢復
  const scale = 0.9 + 0.1 * (1 - Math.sin(Math.PI * t) * 0.5);

  const g = throwAnim.shade;
  const r = 3 * scale;
  // 陰影
  ctx.save();
  ctx.globalAlpha = 0.25 * (1 - t * 0.3);
  ctx.beginPath();
  ctx.ellipse(lx + 2, arcY + 4, r * 0.9, r * 0.5, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  ctx.fill();
  ctx.restore();
  // 鵝卵石本體
  ctx.save();
  ctx.beginPath();
  ctx.ellipse(lx, arcY, r, r * 0.67, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
  ctx.fill();
  ctx.strokeStyle = '#000000'; // 邊框顏色
  ctx.lineWidth = 0.2;           // 邊框粗細
  ctx.stroke();                // 執行繪製邊框
  // 高光
  ctx.beginPath();
  ctx.ellipse(lx - r * 0.25, arcY - r * 0.3, r * 0.38, r * 0.28, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fill();
  ctx.restore();
}

// ═══════════════════════════════════════════════════════
// 🪨 被打飛的石頭動畫（二次飛行）
// ═══════════════════════════════════════════════════════
const secondaryThrows = [];

function launchKnockedPebble(pb, fromGx, fromGy) {
  // 從 pebbleObjects 移除被打飛的石頭
  const idx = pebbleObjects.indexOf(pb);
  if (idx !== -1) {
    pebbleObjects.splice(idx, 1);
    pebbleSet.delete(`${pb.gx},${pb.gy}`);
  }

  // 隨機飛往 1~3 格外的鄰近格子（8方向加權）
  const dist = 1 + Math.floor(Math.random() * 3); // 1~3 格
  const angle = Math.random() * Math.PI * 2;
  const stepX = Math.round(Math.cos(angle) * dist);
  const stepY = Math.round(Math.sin(angle) * dist);
  let tgx = fromGx + stepX;
  let tgy = fromGy + stepY;
  // 夾在地圖範圍內
  tgx = Math.max(0, Math.min(COLS - 1, tgx));
  tgy = Math.max(0, Math.min(ROWS - 1, tgy));

  const startType = tileAt(fromGx, fromGy);
  const startP = toScreen(fromGx, fromGy, startType);
  const targetType = tileAt(tgx, tgy);
  const targetP = toScreen(tgx, tgy, targetType);

  const sinksInWater = (targetType === 0 || targetType === -1);
  const landOx = sinksInWater ? 0 : (Math.random() - 0.5) * 14;
  const landOy = sinksInWater ? 0 : (Math.random() - 0.5) * 8;

  // 飛行時間比主投擲短，弧線也矮一些
  const duration = 280 + Math.random() * 120;

  secondaryThrows.push({
    startX: startP.x + (pb.ox ?? 0),
    startY: startP.y + (pb.oy ?? 0) - 4,
    endX: targetP.x + landOx,
    endY: targetP.y - 4 + landOy,
    tgx, tgy, landOx, landOy,
    born: performance.now(),
    duration,
    done: false,
    sinksInWater,
    shade: pb.shade,
  });
}

function updateSecondaryThrows(now) {
  for (let i = secondaryThrows.length - 1; i >= 0; i--) {
    const sa = secondaryThrows[i];
    if (sa.done) { secondaryThrows.splice(i, 1); continue; }
    const elapsed = now - sa.born;
    const t = Math.min(elapsed / sa.duration, 1);
    if (t >= 1) {
      sa.done = true;
      const type = tileAt(sa.tgx, sa.tgy);

      // 命中椰子樹
      if (handlePebbleLandOnCoconutTree(sa.tgx, sa.tgy, sa.shade, true)) continue;

      // 命中貝殼
      handlePebbleHitShell(sa.tgx, sa.tgy, true);

      if (type < 1) {
        // 落水：水花 + 嚇魚
        addPebbleSplash(sa.tgx, sa.tgy);
        pebbleScarePosGx = sa.tgx;
        pebbleScarePosGy = sa.tgy;
        pebbleScareUntil = now + 1200;
      } else {
        // 落陸：放回 pebbleObjects，並繼續連鎖打飛檢查
        const newPb = {
          gx: sa.tgx, gy: sa.tgy,
          ox: sa.landOx, oy: sa.landOy,
          shade: sa.shade,
          sRx: 4, sRy: 3, angle: 0
        };
        // 連鎖：若該格已有石頭，有 50% 機率再打飛（能量衰減，機率降低）
        const existing = pebbleObjects.find(p => p.gx === sa.tgx && p.gy === sa.tgy);
        if (existing && Math.random() < 0.5) {
          launchKnockedPebble(existing, sa.tgx, sa.tgy);
        }
        pebbleObjects.push(newPb);
        pebbleSet.add(`${sa.tgx},${sa.tgy}`);
        if (type === 2) trampleGrass(sa.tgx, sa.tgy);
      }
    }
  }
}

function drawSecondaryThrows(now) {
  for (const sa of secondaryThrows) {
    if (sa.done) continue;
    const elapsed = now - sa.born;
    const t = Math.min(elapsed / sa.duration, 1);
    const lx = sa.startX + (sa.endX - sa.startX) * t;
    const ly = sa.startY + (sa.endY - sa.startY) * t;
    // 弧線比主投擲矮（距離短，弧高也小）
    const arcHeight = (sa.arcScale ?? 1) * (20 + Math.abs(sa.endX - sa.startX) * 0.15);
    const arcY = ly - Math.sin(Math.PI * t) * arcHeight;
    const scale = 0.85 + 0.1 * (1 - Math.sin(Math.PI * t) * 0.5);
    const g = sa.shade;
    const r = 3 * scale;
    // 陰影
    ctx.save();
    ctx.globalAlpha = 0.20 * (1 - t * 0.3);
    ctx.beginPath();
    ctx.ellipse(lx + 2, arcY + 4, r * 0.9, r * 0.5, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    ctx.fill();
    ctx.restore();
    // 石頭本體
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(lx, arcY, r, r * 0.67, 0, 0, Math.PI * 2);
    ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
    ctx.fill();
    ctx.strokeStyle = '#000000';
    ctx.lineWidth = 0.2;
    ctx.stroke();
    ctx.beginPath();
    ctx.ellipse(lx - r * 0.25, arcY - r * 0.3, r * 0.38, r * 0.28, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.28)';
    ctx.fill();
    ctx.restore();
  }
}

// 繪製地圖上的鵝卵石物件
// TODO: getNearbyPebble() 在 drawPebbleObject 中被每個石頭呼叫一次，
//       若石頭數量多時建議改為在 render() 前先快取一次結果，再傳入此函式
function drawPebbleObject(pb) {
  const p = toScreen(pb.gx, pb.gy, tileAt(pb.gx, pb.gy));
  const nearby = getNearbyPebble();
  const isNear = nearby === pb;

  // 套用視覺偏移（ox/oy 為像素偏移，預設 0）
  const ox = pb.ox ?? 0;
  const oy = pb.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  // 鵝卵石本體
  ctx.save();
  ctx.translate(px, py - 4);
  // 陰影（固定在右下方，不隨角度旋轉）
  ctx.beginPath();
  ctx.ellipse(-1.5, 2.5, pb.sRx, pb.sRy * 0.55, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.30)';
  ctx.fill();
  // 主體（使用固定角度，不旋轉，避免上下顛倒）
  ctx.beginPath();
  ctx.ellipse(0, 0, pb.sRx, pb.sRy, 0, 0, Math.PI * 2);
  const g = pb.shade;
  ctx.fillStyle = `rgb(${g}, ${g - 4}, ${g - 5})`;
  ctx.fill();
  ctx.strokeStyle = '#000000'; // 邊框顏色
  ctx.lineWidth = 0.2;           // 邊框粗細
  ctx.stroke();                // 執行繪製邊框
  // 高光（固定在左上方，模擬光源在左上）
  ctx.beginPath();
  ctx.ellipse(-pb.sRx * 0.25, -pb.sRy * 0.3, pb.sRx * 0.38, pb.sRy * 0.28, 0, 0, Math.PI * 2);
  ctx.fillStyle = `rgba(255,255,255,0.28)`;
  ctx.fill();
  ctx.restore();
}

// 繪製玩家持有鵝卵石時的精靈（覆蓋在玩家上方）
// 實際繪製由 drawPlayer 內部判斷，這裡只是定義旗標
// （精靈圖設定：pebbleHeldSprite，格式同 playerSprite，4×4 欄列）

// 🐚 貝殼物件系統
// ═══════════════════════════════════════════════════════
// 地圖上的貝殼列表：{ gx, gy, ox, oy, variant }
// variant 決定貝殼外觀（0~2）
let shellObjects = [];
// 貝殼碎片刀列表：{ gx, gy, ox, oy, angle } — 會阻擋移動，可拾取
let shellShards = [];
let shellShardSet = new Map(); // 快速查詢 "gx,gy" → 碎片刀物件，供 isWalkable / getNearbyShellShard

// 飛濺碎片動畫列表（純視覺，不留下物件）
const shellFragments = []; // { startX, startY, endX, endY, born, duration, angle, size }

// 玩家是否裝備刀子（後台狀態）
let playerEquippedKnife = false;

// ── 背包 & 攜帶容量系統 ──────────────────────────────────
// 預設容量 1（隱藏不顯示），獲得背包後容量增加並顯示 UI
let playerHasBackpack = false;   // 是否已獲得背包
let playerCarryCapacity = 1;     // 最大攜帶容量（預設1，背包後增加）
let playerCarryCount = 0;        // 目前攜帶的物品數量（石頭不計入）

// 獲得背包（備用接口，目前尚未決定取得方式）
function givePlayerBackpack(extraCapacity) {
  playerHasBackpack = true;
  playerCarryCapacity = 1 + (extraCapacity ?? 2); // 背包預設額外+2格
  updateInventoryHUD();
}

// 更新 HUD 上的背包欄位顯示（有背包才顯示）
function updateInventoryHUD() {
  const inv = document.getElementById('inventory-hud');
  if (!inv) return;
  if (!playerHasBackpack) {
    inv.style.display = 'none';
    return;
  }
  inv.style.display = '';
  // 生成格子：已佔用格顯示圖示，空格顯示空框
  let html = '';
  for (let i = 0; i < playerCarryCapacity; i++) {
    if (i < playerCarryCount) {
      // 目前只有碎片刀這一種可攜帶物品
      html += '<span class="inv-slot filled" title="貝殼碎片刀">🔪</span>';
    } else {
      html += '<span class="inv-slot empty"></span>';
    }
  }
  inv.innerHTML = '🎒 ' + html;
}

// 生成貝殼（每張新地圖重新生成）
function buildShellObjects() {
  shellObjects = [];
  shellShards = [];
  shellShardSet = new Map();
  const mapSeedNum = (cachedMapSeedNum ^ 0x5348454C) | 0; // XOR "SHEL" 避免與鵝卵石種子衝突
  for (let gy = 0; gy < ROWS; gy++) {
    for (let gx = 0; gx < COLS; gx++) {
      if (MAP[gy][gx] !== 1) continue; // 只在沙灘生成
      // 鄰近 2 格（切比雪夫距離 ≤ 2）也需都是沙地
      let allSand = true;
      outerShell: for (let dy = -2; dy <= 2; dy++) {
        for (let dx = -2; dx <= 2; dx++) {
          if (dx === 0 && dy === 0) continue;
          if (Math.abs(dx) > 2 || Math.abs(dy) > 2) continue;
          const nx = gx + dx, ny = gy + dy;
          if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) { allSand = false; break outerShell; }
          if (MAP[ny][nx] !== 1) { allSand = false; break outerShell; }
        }
      }
      if (!allSand) continue;
      let h = (gx * 2246822519 + gy * 3266489917 + mapSeedNum) | 0;
      h = Math.imul(h ^ (h >>> 13), 1274126177); h = h ^ (h >>> 16);
      // 10% 機率生成
      if ((Math.abs(h) % 10) >= 1) continue;
      // 不與鵝卵石同格
      if (pebbleSet.has(`${gx},${gy}`)) continue;
      const hk2 = Math.abs(Math.imul(h ^ (h >>> 9), 374761393));
      const hk3 = Math.abs(Math.imul(hk2 ^ (hk2 >>> 11), 2246822519));
      const ox = ((hk2 % 201) - 100) / 100 * 6;
      const oy = ((hk3 % 201) - 100) / 100 * 3;
      const variant = Math.abs(h) % 3; // 0=螺旋, 1=扇貝, 2=蛤蜊
      shellObjects.push({ gx, gy, ox, oy, variant });
    }
  }
}

// 取得玩家附近（切比雪夫距離 1）可拾取的貝殼碎片刀
function getNearbyShellShard() {
  if (playerEquippedKnife) return null; // 已裝備就不再撿
  if (playerCarryCount >= playerCarryCapacity) return null; // 容量已滿不可拾取
  for (const sh of shellShards) {
    const dx = Math.abs(sh.gx - player.tx);
    const dy = Math.abs(sh.gy - player.ty);
    if (dx <= 1 && dy <= 1) return sh;
  }
  return null;
}

// 拾取貝殼碎片刀
function pickUpShellShard(sh) {
  const idx = shellShards.indexOf(sh);
  if (idx !== -1) {
    shellShards.splice(idx, 1);
    shellShardSet.delete(`${sh.gx},${sh.gy}`);
    playerEquippedKnife = true; // 後台標註：裝備刀子
    playerCarryCount++;         // 佔用1格容量
    updateInventoryHUD();
  }
}

// 繪製貝殼物件
function drawShellObject(sh) {
  const p = toScreen(sh.gx, sh.gy, tileAt(sh.gx, sh.gy));
  const ox = sh.ox ?? 0;
  const oy = sh.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  // 統一朝向：螺塔左上、開口朝右橫臥
  // variant 只做極小角度微偏（±0.15 rad，約 ±9°）
  const tiltTable = [0.0, 0.12, -0.10];
  const rotAngle = tiltTable[sh.variant % 3];

  ctx.save();
  ctx.translate(px, py - 2);

  // 陰影（左下偏移，等角投影風格）
  ctx.save();
  ctx.globalAlpha = 0.26;
  ctx.beginPath();
  ctx.ellipse(-1, 5, 7, 2.8, Math.PI * 0.15, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(0,0,0,0.5)';
  ctx.fill();
  ctx.restore();

  ctx.rotate(rotAngle);

  // ── 法螺輪廓（橫臥，開口朝右，螺塔朝左上）──

  // 1. 主殼體（橫向膨大橢圓，偏右）
  ctx.beginPath();
  ctx.ellipse(1, 1, 5.5, 4, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#d4a870';
  ctx.fill();
  ctx.strokeStyle = '#8a5c30';
  ctx.lineWidth = 0.6;
  ctx.stroke();

  // 2. 螺塔中段（左上方，較小橢圓）
  ctx.beginPath();
  ctx.ellipse(-4, -2, 2.8, 2.0, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#c4926a';
  ctx.fill();
  ctx.strokeStyle = '#7a4c28';
  ctx.lineWidth = 0.5;
  ctx.stroke();

  // 3. 螺塔頂尖（最左上，最小）
  ctx.beginPath();
  ctx.ellipse(-6.5, -4, 1.5, 1.1, Math.PI * 0.08, 0, Math.PI * 2);
  ctx.fillStyle = '#b07850';
  ctx.fill();
  ctx.strokeStyle = '#6a3c20';
  ctx.lineWidth = 0.45;
  ctx.stroke();

  // 4. 開口唇（右側弧線）
  ctx.beginPath();
  ctx.moveTo(5.5, -1.5);
  ctx.bezierCurveTo(8, 0, 8, 3, 5.5, 4.5);
  ctx.strokeStyle = '#6a3c20';
  ctx.lineWidth = 0.9;
  ctx.stroke();

  // 5. 橫紋（螺旋層次）
  for (let ri = 0; ri < 3; ri++) {
    const xt = -1.5 + ri * 1.8;
    ctx.beginPath();
    ctx.ellipse(xt, 1, 0.7, 3.5 - ri * 0.5, Math.PI * 0.08, 0, Math.PI);
    ctx.strokeStyle = `rgba(100,58,25,${0.28 - ri * 0.05})`;
    ctx.lineWidth = 0.5;
    ctx.stroke();
  }

  // 6. 高光（左上亮點）
  ctx.beginPath();
  ctx.ellipse(-0.5, -0.5, 2.0, 1.2, Math.PI * 0.1, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,240,200,0.38)';
  ctx.fill();

  ctx.restore();
}

// 繪製貝殼碎片刀（單一三角形，固定朝向）
function drawShellShard(sh) {
  const p = toScreen(sh.gx, sh.gy, tileAt(sh.gx, sh.gy));
  const ox = sh.ox ?? 0;
  const oy = sh.oy ?? 0;
  const px = p.x + ox;
  const py = p.y + oy;

  ctx.save();
  ctx.translate(px, py - 3);

  // 陰影
  ctx.save();

  ctx.fillStyle = 'rgba(0,0,0,0.5)';

  // 固定朝向三角形：尖端右上、底邊左下

// 更新飛濺碎片動畫
function updateShellFragments(now) {
  for (let i = shellFragments.length - 1; i >= 0; i--) {
    const sf = shellFragments[i];
    const elapsed = now - sf.born;
    if (elapsed >= sf.duration) { shellFragments.splice(i, 1); }
  }
}

// 繪製飛濺碎片動畫
function drawShellFragments(now) {
  for (const sf of shellFragments) {
    const elapsed = now - sf.born;
    const t = Math.min(elapsed / sf.duration, 1);
    // 拋物線飛行
    const lx = sf.startX + (sf.endX - sf.startX) * t;
    const ly = sf.startY + (sf.endY - sf.startY) * t;
    const arcY = ly - Math.sin(Math.PI * t) * sf.arcH;
    const alpha = 1 - t * t;

    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.translate(lx, arcY);
    ctx.rotate(sf.angle + t * sf.spin);
    // 小碎片
    ctx.beginPath();
    ctx.moveTo(-sf.size, 0); ctx.lineTo(0, -sf.size * 1.5); ctx.lineTo(sf.size, 0); ctx.lineTo(0, sf.size);
    ctx.closePath();
    ctx.fillStyle = sf.color;
    ctx.fill();
    ctx.strokeStyle = 'rgba(120,90,50,0.5)';
    ctx.lineWidth = 0.4;
    ctx.stroke();
    ctx.restore();
  }
}

// 處理石頭砸中貝殼
function handlePebbleHitShell(tgx, tgy, isSecondary) {
  const shellIdx = shellObjects.findIndex(s => s.gx === tgx && s.gy === tgy);
  if (shellIdx === -1) return false;

  const shell = shellObjects[shellIdx];
  // 移除貝殼
  shellObjects.splice(shellIdx, 1);

  // 生成 3~4 塊飛濺碎片動畫
  const fragCount = 3 + (Math.random() < 0.5 ? 1 : 0);
  const srcType = tileAt(tgx, tgy);
  const srcP = toScreen(tgx, tgy, srcType);
  const now = performance.now();
  const fragColors = ['#f0c89a', '#e8d8b8', '#f5a07a', '#e8e0cc', '#d0c0a0'];

  const dirs8 = [{dx:1,dy:0},{dx:-1,dy:0},{dx:0,dy:1},{dx:0,dy:-1},{dx:1,dy:1},{dx:-1,dy:1},{dx:1,dy:-1},{dx:-1,dy:-1}];

  // 隨機選 1 個鄰近方向，所有碎片往那個扇區飛
  const baseDir = dirs8[Math.floor(Math.random() * dirs8.length)];
  let landGx = Math.max(0, Math.min(COLS - 1, tgx + baseDir.dx));
  let landGy = Math.max(0, Math.min(ROWS - 1, tgy + baseDir.dy));

  // 若目標格是水，找最近的陸地格
  if (tileAt(landGx, landGy) < 1) {
    const fallback = dirs8.find(d => {
      const nx = tgx + d.dx, ny = tgy + d.dy;
      return tileAt(nx, ny) >= 1;
    });
    if (fallback) {
      landGx = Math.max(0, Math.min(COLS - 1, tgx + fallback.dx));
      landGy = Math.max(0, Math.min(ROWS - 1, tgy + fallback.dy));
    }
  }

  const dstP = toScreen(landGx, landGy, tileAt(landGx, landGy));

  for (let i = 0; i < fragCount; i++) {
    const spread = (Math.random() - 0.5) * 18;
    const spreadY = (Math.random() - 0.5) * 10;
    shellFragments.push({
      startX: srcP.x + (Math.random() - 0.5) * 8,
      startY: srcP.y - 3 + (Math.random() - 0.5) * 4,
      endX: dstP.x + spread,
      endY: dstP.y - 3 + spreadY,
      born: now,
      duration: 280 + Math.random() * 150,
      arcH: 18 + Math.random() * 14,
      angle: Math.random() * Math.PI * 2,
      spin: (Math.random() - 0.5) * 8,
      size: 2.5 + Math.random() * 2,
      color: fragColors[Math.floor(Math.random() * fragColors.length)],
    });
  }

  // 50% 機率在鄰近格留下貝殼碎片刀（阻擋）
  if (Math.random() < 0.5) {
    const landType = tileAt(landGx, landGy);
    if (landType >= 1 && !shellShardSet.has(`${landGx},${landGy}`) && !pebbleSet.has(`${landGx},${landGy}`) && !coconutTreeSet.has(`${landGx},${landGy}`)) {
      const newShard = {
        gx: landGx, gy: landGy,
        ox: (Math.random() - 0.5) * 8,
        oy: (Math.random() - 0.5) * 4,
        angle: Math.random() * Math.PI * 2,
      };
      shellShards.push(newShard);
      shellShardSet.set(`${landGx},${landGy}`, newShard);
    }
  }

  return true;
}
