}

function randomSeed() { applySeedStr(Array.from({length:5},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('')); }
function applySeed()  { applySeedStr(document.getElementById('seed-input').value); }
// 產生偏向特定地形（t）的種子，嘗試 30 次選最佳
// TODO: 此函式在主執行緒同步跑 30 次地圖生成，可能造成短暫卡頓（約 10~30ms）
//       未來若需流暢體驗，可改為 Web Worker 非同步執行
function generateBiasedSeed(t) {
  let bS='', mC=-1; for(let i=0;i<30;i++){
    let ts=Array.from({length:5},()=>'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789'[Math.floor(Math.random()*36)]).join('');
    let tm=generateMap(ts), c=0; for(let r=0;r<ROWS;r++) for(let col=0;col<COLS;col++) if(tm[r][col]===t) c++;
    if(c>mC){mC=c;bS=ts;}
  }
  applySeedStr(bS);
}

function tileAt(gx,gy) { if(gx<0||gy<0||gx>=COLS||gy>=ROWS) return -2; return MAP[gy]?MAP[gy][gx]:-2; }
function isWalkable(gx,gy) {
  if (tileAt(gx,gy) < -1) return false;
  // 鵝卵石物件阻擋移動（O(1) Set 查詢）
  if (pebbleSet.has(`${gx},${gy}`)) return false;
  // 椰子樹阻擋移動（O(1) Set 查詢）
  if (coconutTreeSet.has(`${gx},${gy}`)) return false;
  // 貝殼碎片刀阻擋移動
  if (shellShardSet.has(`${gx},${gy}`)) return false;
  return true;
}
function mapOrigin() { return { ox:canvas.width/2.1, oy:Math.floor((canvas.height-(COLS+ROWS)*HH)/2)+45 }; }
function toScreen(fx,fy,type) {
  const {ox,oy}=mapOrigin(); return { x:ox+(fx-fy)*HW, y:oy+(fx+fy)*HH-(ELEV[String(type)]??0) };
}

let wavePhase=0;

// ── 滑鼠懸停格子標示系統 ─────────────────────────────────
let hoverTile = { gx: -1, gy: -1 };

canvas.addEventListener('mousemove', e => {
  const {sx, sy} = getCanvasPos(e.clientX, e.clientY);
  const iso = screenToIso(sx, sy);
  const hgx = Math.round(iso.gx), hgy = Math.round(iso.gy);
  if (hgx >= 0 && hgy >= 0 && hgx < COLS && hgy < ROWS) {
    hoverTile.gx = hgx; hoverTile.gy = hgy;
  } else {
    hoverTile.gx = -1; hoverTile.gy = -1;
  }
});
canvas.addEventListener('mouseleave', () => { hoverTile.gx = -1; hoverTile.gy = -1; });
// ──────────────────────────────────────────────────────────

function drawTile(gx,gy) {
  const type=tileAt(gx,gy); if(type===-2) return;
  const p=toScreen(gx,gy,type), thick=getThick(type);
  ctx.beginPath(); ctx.moveTo(p.x,p.y-HH); ctx.lineTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x-HW,p.y); ctx.closePath();
  if(type===-1){ ctx.fillStyle=`rgb(${13+Math.sin(wavePhase+gx*.7+gy*.5)*10},${26+Math.sin(wavePhase+gx*.7+gy*.5)*20},${71+Math.sin(wavePhase+gx*.7+gy*.5)*10})`; }
  else if(type===0){ ctx.fillStyle=`rgb(28,${Math.floor(150+Math.sin(wavePhase*1.2+gx*.9-gy*.6)*12)},${Math.floor(195+Math.sin(wavePhase*1.2+gx*.9-gy*.6)*12)})`; }
  else { ctx.fillStyle=COLOR[String(type)].top; }
  ctx.fill();
  if(type===2) drawGrassOnTile(gx, gy, p);
  if(type===1) drawSandGrains(gx, gy, p);
  // ── 馬鞍藤繪製邏輯 ──
  // 草地(2)鄰近沙地(1)：馬鞍藤
  // 沙地(1)鄰近草地(2)：馬鞍藤（新增，沙草交界的沙側）
  if (type === 2 || type === 1) {
    const neighbors = [tileAt(gx-1,gy), tileAt(gx+1,gy), tileAt(gx,gy-1), tileAt(gx,gy+1), tileAt(gx-1,gy-1), tileAt(gx+1,gy-1), tileAt(gx-1,gy+1), tileAt(gx+1,gy+1)];
    const adjSand  = neighbors.some(n => n === 1);
    // 草地鄰沙：八方向都算（維持原本）
    // 沙地鄰草：只算四個正方向（更貼近邊界）
    const adjGrass = neighbors.some(n => n === 2);
    const adjGrassDirect = [tileAt(gx-1,gy), tileAt(gx+1,gy), tileAt(gx,gy-1), tileAt(gx,gy+1)].some(n => n === 2);
    if (type === 2 && grassClusterSet.has(`${gx},${gy}`)) {
    } else if ((type === 2 && adjSand) || (type === 1 && adjGrassDirect)) {
      let hv = (gx * 2246822519 + gy * 3266489917 + cachedMapSeedNum) | 0;
      if (((hv >>> 0) % 100) < 60) {
      hv = Math.imul(hv ^ (hv >>> 15), 0xd168aaad); hv = hv ^ (hv >>> 16);
      const tileHash = (hv >>> 0);
      if ((tileHash % 10) < 3) drawIpomoea(p, gx, gy, tileHash);
      }
    }
  }
  if(type>=1) drawFootprints(gx,gy);
  if(type===0) drawRipplesAt(gx, gy, p);
  if(type===-1||type===0) drawSurfaceBubblesAt(gx, gy, p);
  if(type===-1) drawSplashDropsAt(gx, gy);
  // ── 懸停格子高亮邊框 ──
  if (gx === hoverTile.gx && gy === hoverTile.gy) {
    const isThrowMode = playerHoldingPebble && !throwAnim;
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(p.x, p.y - HH);
    ctx.lineTo(p.x + HW, p.y);
    ctx.lineTo(p.x, p.y + HH);
    ctx.lineTo(p.x - HW, p.y);
    ctx.closePath();
    ctx.strokeStyle = isThrowMode ? 'rgba(255, 120, 60, 0.92)' : 'rgba(255, 255, 255, 0)';
    ctx.lineWidth = isThrowMode ? 3.0 : 2.2;
    ctx.lineCap = "round"; // 讓線段末端圓潤一點比較美觀

    // 定義格子的四個頂點
    const top = { x: p.x, y: p.y - HH };
    const right = { x: p.x + HW, y: p.y };
    const bottom = { x: p.x, y: p.y + HH };
    const left = { x: p.x - HW, y: p.y };

    // gap 控制線段的長度，0.3 代表畫出邊長的 30%
    const gap = 0.3; 

    // 開始繪製四個角落的 L 型線段
    ctx.beginPath();

    // 1. 上頂點的角落
    ctx.moveTo(top.x - HW * gap, top.y + HH * gap);
    ctx.lineTo(top.x, top.y);
    ctx.lineTo(top.x + HW * gap, top.y + HH * gap);

    // 2. 下頂點的角落
    ctx.moveTo(bottom.x - HW * gap, bottom.y - HH * gap);
    ctx.lineTo(bottom.x, bottom.y);
    ctx.lineTo(bottom.x + HW * gap, bottom.y - HH * gap);

    // 3. 左頂點的角落
    ctx.moveTo(left.x + HW * gap, left.y - HH * gap);
    ctx.lineTo(left.x, left.y);
    ctx.lineTo(left.x + HW * gap, left.y + HH * gap);

    // 4. 右頂點的角落
    ctx.moveTo(right.x - HW * gap, right.y - HH * gap);
    ctx.lineTo(right.x, right.y);
    ctx.lineTo(right.x - HW * gap, right.y + HH * gap);

    ctx.stroke();
    ctx.restore();
  }
  // ────────────────────────
  ctx.beginPath(); ctx.moveTo(p.x-HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x-HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].left; ctx.fill();
  ctx.beginPath(); ctx.moveTo(p.x+HW,p.y); ctx.lineTo(p.x,p.y+HH); ctx.lineTo(p.x,p.y+HH+thick); ctx.lineTo(p.x+HW,p.y+thick); ctx.closePath(); ctx.fillStyle=COLOR[String(type)].right; ctx.fill();
}

function drawPlayer(gx,gy,frame) {
  const p=toScreen(gx,gy,tileAt(Math.round(gx),Math.round(gy)));
  const isMoving=Math.abs(player.tx-player.gx)>0.01||Math.abs(player.ty-player.gy)>0.01;
  const bob=isMoving?Math.sin(frame*.18)*2.5:0;
  ctx.save(); ctx.globalAlpha=0.22; ctx.fillStyle='#000'; ctx.beginPath(); ctx.ellipse(p.x,p.y,14,5,0,0,Math.PI*2); ctx.fill(); ctx.restore();
  // --- 修改後的邏輯 ---
  let activeSprite, fi;
  if (throwAnim && !throwAnim.done) {
    // 1. 投擲動作期間：使用投擲專用的 rcssavage.png
    activeSprite = (pebbleThrowSprite.complete && pebbleThrowSprite.naturalWidth > 0) 
                   ? pebbleThrowSprite : playerSprite;
    fi = 1; // 投擲動作幀
  } else if (playerHoldingPebble) {
    // 2. 僅持有石頭期間：使用 cssavage.png
    activeSprite = (pebbleHeldSprite.complete && pebbleHeldSprite.naturalWidth > 0) 
                   ? pebbleHeldSprite : playerSprite;
    fi = isMoving ? Math.floor(frame/6)%SPRITE_COLUMNS : 0;
  } else {
    // 3. 一般狀態：使用預設的 savage.png
    activeSprite = playerSprite;
    fi = isMoving ? Math.floor(frame/6)%SPRITE_COLUMNS : 0;
  }
  // ------------------
  if(!activeSprite.complete||SPRITE_FRAME_W===0) return;
  const dh=80, dw=(SPRITE_FRAME_W/SPRITE_FRAME_H)*dh;
  const type=tileAt(Math.round(gx),Math.round(gy));
  if(type===0||type===-1){
    const sd=(type===-1)?40:10, wy=p.y-0.2+(type===-1?-5:0);
    ctx.save(); ctx.beginPath(); ctx.rect(0,0,canvas.width,wy); ctx.clip();
    ctx.imageSmoothingEnabled=false; ctx.drawImage(activeSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10+sd,dw,dh);
    ctx.restore();
  } else {
    ctx.save(); ctx.imageSmoothingEnabled=false; ctx.drawImage(activeSprite,fi*SPRITE_FRAME_W,player.dir*SPRITE_FRAME_H,SPRITE_FRAME_W,SPRITE_FRAME_H,p.x-dw/2,p.y-bob-dh+10,dw,dh);
    ctx.restore();
  }
}

const player={gx:12,gy:8,tx:12,ty:8,frame:0,dir:1};
const held=new Set();
// ── 確保 seed input 不攔截遊戲按鍵 ─────────────────────────
// 當 seed input 有焦點時，WASD / 方向鍵 / 空白鍵 仍交給遊戲處理
document.getElementById('seed-input').addEventListener('keydown', e => {
  const gameKeys = ['w','a','s','d','ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '];
  if (gameKeys.includes(e.key)) {
    e.stopPropagation(); // 不讓 input 的 keydown 冒泡干擾遊戲
    document.getElementById('seed-input').blur(); // 同時移除焦點，還給遊戲
  }
});

// canvas 或畫面點擊時，確保 input 失去焦點，讓鍵盤回到遊戲
canvas.addEventListener('mousedown', () => document.getElementById('seed-input').blur());
canvas.addEventListener('touchstart', () => document.getElementById('seed-input').blur(), { passive: true });

window.addEventListener('keydown', e => {
  // 如果視窗正在顯示 (prompting 為 true)
  if (prompting) {
    if (e.key === 'Enter') {
      // 觸發「是」的按鈕點擊事件
      document.getElementById('btn-yes').click();
      e.preventDefault();
      return;
    }
    if (e.key === 'Escape') {
      // 觸發「暫時不要」的按鈕點擊事件
      document.getElementById('btn-no').click();
      e.preventDefault();
      return;
    }
  }

  // seed input 有焦點時，不處理遊戲移動（讓使用者能正常輸入種子碼）
  if (document.activeElement === document.getElementById('seed-input')) return;

  // 原有的遊戲移動邏輯
  held.add(e.key);
  if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
    e.preventDefault();
  }
  // 空白鍵：拾取鵝卵石 或 貝殼碎片刀 或 搖晃椰子樹（優先順序：石頭 > 碎片刀 > 椰子樹）
  if (e.key === ' ' && !prompting) {
    const pb = getNearbyPebble();
    if (pb) { pickUpPebble(pb); e.preventDefault(); return; }
    const sh = getNearbyShellShard();
    if (sh) { pickUpShellShard(sh); e.preventDefault(); return; }
    const ct = getNearbyCoconutTree();
    if (ct) { shakeCoconutTree(ct, 700); e.preventDefault(); } // 只搖晃，不掉椰子（與滑鼠點擊一致）
  }
});
window.addEventListener('keyup', e => held.delete(e.key));
// 視窗失焦時清空 held，避免「Alt+Tab 切換後按鍵卡住」問題
window.addEventListener('blur', () => held.clear());

// ── 滑鼠 / 觸控點擊移動 ──────────────────────────────────
// 將螢幕座標（canvas邏輯座標）反推為等角格子座標
function screenToIso(sx, sy) {
  const {ox, oy} = mapOrigin();
  // 建議統一使用固定高度（如 0）作為點擊平面，
  // 或者使用一個中間值，避免滑鼠與格子的視覺距離因玩家位置而變動。
  const elev = 15; 
  const adjY = sy - oy + elev;
  const diffX = (sx - ox) / HW;
  const sumXY = adjY / HH;
  return { gx: (diffX + sumXY) / 2, gy: (sumXY - diffX) / 2 };
}

// 根據點擊的等角座標，決定應往哪個方向走一格
function moveTowardIso(isoX, isoY) {
  if (prompting) return;
  // 相對於玩家目前目標格的偏移
  const dx = isoX - player.tx;
  const dy = isoY - player.ty;
  if (Math.abs(dx) < 0.001 && Math.abs(dy) < 0.001) return;

  // 等角座標中四個方向：
  //   dir 0 (right/東北): gx+1, gy-0  → dx>0, dy<0
  //   dir 1 (down/東南):  gx+1, gy+0  → dx>0, dy>0  (實際上 gx↑ = 往右下)
  //   dir 2 (left/西南):  gx-0, gy+1  → dx<0, dy>0
  //   dir 3 (up/西北):    gx-1, gy+0  → dx<0, dy<0
  // 以 45° 分界線切四象限，再挑主要軸
  let stepX = 0, stepY = 0;
  if (Math.abs(dx) >= Math.abs(dy)) {
    stepX = dx > 0 ? 1 : -1;
  } else {
    stepY = dy > 0 ? 1 : -1;
  }

  // 對應 WASD 方向定義：W=(-1,0)dir3, S=(1,0)dir1, A=(0,1)dir2, D=(0,-1)dir0
  if      (stepX === -1) player.dir = 3;
  else if (stepX ===  1) player.dir = 1;
  else if (stepY ===  1) player.dir = 2;
  else if (stepY === -1) player.dir = 0;

  const nx = player.tx + stepX;
  const ny = player.ty + stepY;

  if (nx < 0 || ny < 0 || nx >= COLS || ny >= ROWS) {
    if (boundaryCooldown <= 0) triggerTransitionPrompt(player.tx, player.ty);
    return;
  }
  if (!isWalkable(nx, ny)) return;

  const cT = tileAt(player.tx, player.ty), nT = tileAt(nx, ny);
  if (cT === 0  && nT === -1) addSplash(nx, ny);
  if (cT === -1 && nT ===  0) startBodyDrip(1.0);
  if (cT === 0  && nT ===  1) startBodyDrip(0.65);
  if ((cT === 0 || cT === -1) && nT >= 1) footprintBudget = FOOTPRINT_COUNT;
  if (footprintBudget > 0 && nT >= 1) { addFootprint(nx, ny, stepFoot, player.dir); stepFoot = 1 - stepFoot; footprintBudget--; }
  if (nT === 0) addRipple(nx, ny);
  if (nT === 2) trampleGrass(nx, ny);
  player.tx = nx; player.ty = ny;
}

// 取得事件在 canvas 邏輯座標中的位置（處理CSS縮放）
function getCanvasPos(clientX, clientY) {
  const rect = canvas.getBoundingClientRect();
  const cw = canvas.width;  // 1280
  const ch = canvas.height; // 720
  
  // 計算實際縮放比例
  const scale = Math.min(rect.width / cw, rect.height / ch);
  
  // 計算畫布內容在元素內部的實際起始點（扣除黑邊）
  const offsetX = (rect.width - cw * scale) / 2;
  const offsetY = (rect.height - ch * scale) / 2;

  return {
    sx: (clientX - rect.left - offsetX) / scale,
    sy: (clientY - rect.top - offsetY) / scale
  };
}

// ── 滑鼠點擊（桌面）──────────────────────────────────────
// 桌面端行為保持不變：
//   未持石：點擊石頭拾取（近距離）；其他格子移動
//   持石中：點擊任意格子投擲
canvas.addEventListener('click', e => {
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;
  if (prompting) return;
  const {sx, sy} = getCanvasPos(e.clientX, e.clientY);

  // 持有鵝卵石時：點擊任意格子觸發投擲（桌面保持原本行為）
  if (playerHoldingPebble && !throwAnim) {
    const iso = screenToIso(sx, sy);
    const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
    if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
      throwPebble(tgx, tgy);
      return;
    }
  }

  if (!playerHoldingPebble) {
    const nearCT = getNearbyCoconutTree();
    if (nearCT) {
      // 只需玩家在一格內（由 getNearbyCoconutTree 保證），不依賴滑鼠距離
      shakeCoconutTree(nearCT, 700);
      return;
    }
  }

  if (!playerHoldingPebble) {
    const nearbyPb = getNearbyPebble();
    if (nearbyPb) {
      const ps = toScreen(nearbyPb.gx, nearbyPb.gy, tileAt(nearbyPb.gx, nearbyPb.gy));
      const d = Math.hypot(sx - ps.x, sy - (ps.y - 4));
      if (d < 52) {
        pickUpPebble(nearbyPb);
        return;
      }
    }
  }
  // 未持石且未裝備刀：拾取附近的貝殼碎片刀
  if (!playerHoldingPebble && !playerEquippedKnife) {
    const nearbySh = getNearbyShellShard();
    if (nearbySh) {
      const ps = toScreen(nearbySh.gx, nearbySh.gy, tileAt(nearbySh.gx, nearbySh.gy));
      const d = Math.hypot(sx - ps.x, sy - (ps.y - 3));
      if (d < 52) {
        pickUpShellShard(nearbySh);
        return;
      }
    }
  }
  const iso = screenToIso(sx, sy);
  moveTowardIso(iso.gx, iso.gy);
});

// ── 觸控雙擊偵測狀態 ─────────────────────────────────────
// 觸控端的互動邏輯（與桌面滑鼠分開）：
//   未持石：單擊→移動；雙擊近距石頭→拾取
//   持石中：單擊→移動；雙擊任意格子→投擲
const DOUBLE_TAP_MS = 320; // 雙擊時間窗口（毫秒）
let lastTapTime   = 0;
let lastTapX      = 0;
let lastTapY      = 0;
const DOUBLE_TAP_DIST = 60; // 兩次點擊距離上限（像素）

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  if (prompting) return;
  const touch = e.changedTouches[0];
  const {sx, sy} = getCanvasPos(touch.clientX, touch.clientY);
  const now = performance.now();

  const timeSinceLast = now - lastTapTime;
  const distFromLast  = Math.hypot(sx - lastTapX, sy - lastTapY);
  const isDoubleTap   = timeSinceLast < DOUBLE_TAP_MS && distFromLast < DOUBLE_TAP_DIST;

  // 記錄本次點擊，供下次判斷
  lastTapTime = now;
  lastTapX = sx;
  lastTapY = sy;

  // 角色還在移動插值中，忽略輸入（避免連點亂跑）
  if (Math.abs(player.tx - player.gx) > 0.3 || Math.abs(player.ty - player.gy) > 0.3) return;

  if (isDoubleTap) {
    // ── 雙擊 ──────────────────────────────────
    if (!playerHoldingPebble) {
      // 未持石：雙擊石頭→拾取，或雙擊碎片刀→拾取
      const nearbyPb = getNearbyPebble();
      if (nearbyPb) {
        const ps = toScreen(nearbyPb.gx, nearbyPb.gy, tileAt(nearbyPb.gx, nearbyPb.gy));
        const d = Math.hypot(sx - ps.x, sy - (ps.y - 4));
        if (d < 65) {
          pickUpPebble(nearbyPb);
          lastTapTime = 0; // 重置，避免三擊誤觸
          return;
        }
      }
      // 雙擊碎片刀拾取
      if (!playerEquippedKnife) {
        const nearbySh = getNearbyShellShard();
        if (nearbySh) {
          const ps = toScreen(nearbySh.gx, nearbySh.gy, tileAt(nearbySh.gx, nearbySh.gy));
          const d = Math.hypot(sx - ps.x, sy - (ps.y - 3));
          if (d < 65) {
            pickUpShellShard(nearbySh);
            lastTapTime = 0;
            return;
          }
        }
      }
    } else {
      // 持石中：雙擊目標格→投擲
      if (!throwAnim) {
        const iso = screenToIso(sx, sy);
        const tgx = Math.round(iso.gx), tgy = Math.round(iso.gy);
        if (tgx >= 0 && tgy >= 0 && tgx < COLS && tgy < ROWS) {
          throwPebble(tgx, tgy);
          lastTapTime = 0;
          return;
        }
      }
    }
    // 雙擊但未命中石頭/投擲目標：仍執行移動
    const iso = screenToIso(sx, sy);
    moveTowardIso(iso.gx, iso.gy);
  } else {
    // ── 單擊 → 移動（不論是否持石） ──────────────
    const iso = screenToIso(sx, sy);
    const tgx = Math.round(iso.gx);
    const tgy = Math.round(iso.gy);

    // 新增功能：若未持石且點擊身邊的椰子樹，觸發搖晃
    if (!playerHoldingPebble) {
      const nearCT = getNearbyCoconutTree(); // 獲取身邊 1 格內的椰子樹
      // 如果身邊有樹，且點擊的座標 (tgx, tgy) 正好是該樹的位置
      if (nearCT && tgx === nearCT.gx && tgy === nearCT.gy) {
        shakeCoconutTree(nearCT, 700);
        return; // 搖晃後直接返回，不執行移動
      }
    }
    // 若不符合搖樹條件，執行原本的移動功能
    moveTowardIso(iso.gx, iso.gy);
  }
}, { passive: false });

// 防止觸控時頁面滾動
canvas.addEventListener('touchstart', e => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove',  e => e.preventDefault(), { passive: false });
// ─────────────────────────────────────────────────────────

let prompting=false, boundaryCooldown=0;
function triggerTransitionPrompt(cx,cy){
  prompting=true; held.clear();
  const modal=document.getElementById('transition-modal'); modal.style.display='block';
  document.getElementById('btn-yes').onclick=()=>{ modal.style.display='none'; prompting=false; generateBiasedSeed(MAP[cy][cx]); };
  document.getElementById('btn-no').onclick=()=>{ modal.style.display='none'; prompting=false; boundaryCooldown=60; };
}

function update(){
  // 插值移動：當差值夠小時直接對齊，避免指數衰減永遠無法收斂到解鎖條件
  const snapThreshold = 0.05;
  player.gx += (player.tx - player.gx) * 0.28;
  player.gy += (player.ty - player.gy) * 0.28;
  if (Math.abs(player.tx - player.gx) < snapThreshold) player.gx = player.tx;
  if (Math.abs(player.ty - player.gy) < snapThreshold) player.gy = player.ty;
  if(boundaryCooldown>0) boundaryCooldown--;
  if(!prompting&&!(Math.abs(player.tx-player.gx)>0.15||Math.abs(player.ty-player.gy)>0.15)){
    let dx=0, dy=0;
    if(held.has('ArrowUp')||held.has('w')){dx=-1;dy=0;player.dir=3;}
    else if(held.has('ArrowDown')||held.has('s')){dx=1;dy=0;player.dir=1;}
    else if(held.has('ArrowLeft')||held.has('a')){dx=0;dy=1;player.dir=2;}
    else if(held.has('ArrowRight')||held.has('d')){dx=0;dy=-1;player.dir=0;}
    if(dx!==0||dy!==0){
      const nx=player.tx+dx, ny=player.ty+dy;
      if(nx<0||ny<0||nx>=COLS||ny>=ROWS){ if(boundaryCooldown<=0) triggerTransitionPrompt(player.tx,player.ty); }
      else if(isWalkable(nx,ny)){
        const cT=tileAt(player.tx,player.ty), nT=tileAt(nx,ny);
        if(cT===0 && nT===-1) addSplash(nx, ny);
        if(cT===-1 && nT===0) startBodyDrip(1.0);
        if(cT===0 && nT===1) startBodyDrip(0.65);
        if((cT===0||cT===-1)&&nT>=1) footprintBudget=FOOTPRINT_COUNT;
        if(footprintBudget>0&&nT>=1){ addFootprint(nx,ny,stepFoot,player.dir); stepFoot=1-stepFoot; footprintBudget--; }
        if(nT===0) addRipple(nx,ny); if(nT===2) trampleGrass(nx,ny);
        player.tx=nx; player.ty=ny;
      }
    }
  }
  const curT=tileAt(Math.round(player.gx), Math.round(player.gy));
  if (curT===-1 && player.frame%30===0) {
    let fx=0,fy=0; if(player.dir===0)fy=-1;else if(player.dir===1)fx=1;else if(player.dir===2)fy=1;else fx=-1;
    if(tileAt(Math.round(player.gx)+fx,Math.round(player.gy)+fy)<1) surfaceBubbles.push({gx:Math.round(player.gx)+fx, gy:Math.round(player.gy)+fy, ox:Math.random()*30-15, oy:Math.random()*10-5, r:1+Math.random()*2, alpha:1, born:performance.now(), life:1200+Math.random()*800});
  }
  player.frame++; wavePhase+=0.04; const now=performance.now();
  updateFootprints(now); updateRipples(now); updateSurfaceBubbles(); updateSplashDrops(now); updateBodyDroplets(now); updateFishes(now);
  updateThrowAnim(now); updatePebbleSplashes(now); updateSecondaryThrows(now); updateFallingCoconuts(now); updateShellFragments(now);
}

function render(){
  const now2 = performance.now();

  const sg=ctx.createLinearGradient(0,0,0,canvas.height*.6);
  sg.addColorStop(0,`rgb(15,39,68)`);
  sg.addColorStop(1,`rgb(46,96,128)`);
  ctx.fillStyle=sg; ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let s=0;s<ROWS+COLS-1;s++) for(let gx=0;gx<COLS;gx++){ let gy=s-gx; if(gy>=0&&gy<ROWS) drawTile(gx,gy); }
  // 在玩家同層前，依等角順序繪製鵝卵石物件
  const sortedPb = pebbleObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const pb of sortedPb) drawPebbleObject(pb);
  // 繪製貝殼（不阻擋，地面裝飾）
  const sortedSh = shellObjects.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const sh of sortedSh) drawShellObject(sh);
  // 繪製貝殼碎片刀（阻擋物件，與石頭同層）
  const sortedShard = shellShards.slice().sort((a,b)=>(a.gx+a.gy)-(b.gx+b.gy));
  for(const sh of sortedShard) drawShellShard(sh);
  drawAllFishes();
  // ── 深度排序：椰子樹、靜止椰子、落下椰子 & 玩家交錯繪製（painter's algorithm）──
  // 關鍵修正：椰子樹與靜止椰子合併成同一個深度列表交錯排序，
  // 避免落在樹「後面格子」的椰子浮在樹的上面
  {
    const playerDepth = player.gx + player.gy;

    // 把椰子樹和靜止椰子合成一個列表，統一依 gx+gy 深度排序
    const treeItems    = coconutTrees.map(ct => ({ depth: ct.gx + ct.gy, type: 'tree', obj: ct }));
    const coconutItems = coconuts.map(c  => ({ depth: c.gx  + c.gy,  type: 'coconut', obj: c }));
    const staticItems  = [...treeItems, ...coconutItems].sort((a, b) => a.depth - b.depth);

    const sortedFalling = fallingCoconuts.slice().sort((a, b) => (a.tgx + a.tgy) - (b.tgx + b.tgy));
    let sIdx = 0, fcIdx = 0;

    // 繪製深度 < playerDepth 的靜態物件（樹＋椰子混排）
    while (sIdx < staticItems.length && staticItems[sIdx].depth < playerDepth) {
      const item = staticItems[sIdx++];
      if (item.type === 'tree') drawCoconutTree(item.obj);
      else drawCoconut(item.obj);
    }
    // 繪製深度 < playerDepth 的落下椰子
    while (fcIdx < sortedFalling.length && (sortedFalling[fcIdx].tgx + sortedFalling[fcIdx].tgy) < playerDepth) {
      drawFallingCoconut(sortedFalling[fcIdx++], now2);
    }

    drawPlayer(player.gx, player.gy, player.frame);

    // 繪製深度 >= playerDepth 的靜態物件（樹＋椰子混排）
    while (sIdx < staticItems.length) {
      const item = staticItems[sIdx++];
      if (item.type === 'tree') drawCoconutTree(item.obj);
      else drawCoconut(item.obj);
    }
    // 繪製深度 >= playerDepth 的落下椰子
    while (fcIdx < sortedFalling.length) drawFallingCoconut(sortedFalling[fcIdx++], now2);
  }
  drawBodyDroplets();
  drawThrowAnim(now2);
  drawSecondaryThrows(now2);
  drawPebbleSplashes();
  drawShellFragments(now2);
}

randomSeed();
(function loop(){ update(); render(); requestAnimationFrame(loop); })();
</script>
